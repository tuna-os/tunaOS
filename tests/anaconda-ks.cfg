# TunaOS automated install kickstart — for CI/validation use only.
#
# This kickstart drives an unattended Anaconda installation of a TunaOS
# bootc image onto a single virtio disk (/dev/vda).
#
# Usage:
#   just install-test <iso_file> --kickstart tests/anaconda-ks.cfg
#   ./scripts/install-test.sh <iso_file> --kickstart tests/anaconda-ks.cfg

# --- Locale & keyboard ---
keyboard us
lang en_US.UTF-8
timezone UTC --utc

# --- Network ---
network --bootproto=dhcp --onboot=yes

# --- Root password (test-only, plaintext) ---
rootpw --plaintext tunatest

# --- Disk layout (whole /dev/vda, matches bootc install.block = ["direct"]) ---
ignoredisk --only-use=vda
zerombr
clearpart --all --drives=vda --initlabel

# --- Bootloader ---
bootloader --location=mbr --boot-drive=vda

# --- Partitions: let Anaconda auto-partition for bootc ---
autopart --type=plain --nohome

# --- Post-install: reboot so QEMU exits cleanly ---
reboot --eject
