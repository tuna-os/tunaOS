  # Bootc toolchain built from source (see toolchain/) and published to
  # ghcr.io/tuna-os/bootc-toolchain-<base> as OCI artifacts via ORAS.
  # These pins drive both the toolchain builds and the version tags consumers
  # request. Renovate bumps them; the toolchain workflow rebuilds on bump.
  # renovate: datasource=github-releases depName=bootc-dev/bootc
  bootc: "v1.16.3"
  # renovate: datasource=github-releases depName=coreos/bootupd
  bootupd: "v0.2.35"
  # ostree from source only for bases whose packaged ostree is older than
  # bootc's required libostree (e.g. Debian trixie ships 2025.2 < 2025.3).
  # ostree is built from source (with its vendored composefs submodule) only for
  # bases whose packaged libostree is older than bootc's required 2025.3 — e.g.
  # Debian trixie ships 2025.2. Newer bases (sid) use the packaged libostree.
  # renovate: datasource=github-releases depName=ostreedev/ostree
  ostree: "v2026.2"
