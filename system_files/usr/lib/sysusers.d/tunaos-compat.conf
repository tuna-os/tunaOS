# Compatibility sysusers.d declarations for packages that create users via
# RPM scriptlets without providing their own sysusers.d file.
# These entries ensure bootc container lint is satisfied (sysusers check).
# The users already exist in /etc/passwd from package installation; these
# declarations just provide the declarative equivalent for bootc compliance.

u avahi - "Avahi mDNS/DNS-SD Stack" /var/run/avahi-daemon
g avahi -

u usbmuxd - "USB Multiplexer Daemon" /
g usbmuxd -
