[customizations.installer.kickstart]
contents = """
%post
bootc switch --mutate-in-place --transport registry --enforce-container-sigpolicy ghcr.io/hanthor/bluefin:lts
%end
"""

[customizations.installer.modules]
enable = [
  "org.fedoraproject.Anaconda.Modules.Storage"
]
# SECURITY: Security module enabled for ISO builds. Container signature
# verification is required (see configure_lts_iso_anaconda.sh for image refs).
# Network/Services/Users/Subscription/Timezone disabled as they're configured
# via kickstart (currently commented out; re-enable modules when kickstart is restored).
disable = [
  "org.fedoraproject.Anaconda.Modules.Network",
  "org.fedoraproject.Anaconda.Modules.Services",
  "org.fedoraproject.Anaconda.Modules.Users",
  "org.fedoraproject.Anaconda.Modules.Subscription",
  "org.fedoraproject.Anaconda.Modules.Timezone" 
]
