# registry-map.yaml — Registry and image reference configuration.
#
# Maps logical image names to registry prefixes and paths. Every registry
# hostname can be overridden via environment variable:
#   TUNA_REGISTRY_<key>=mirror.example.com
#
# Every image tag can be overridden:
#   TUNA_IMAGE_TAG_<name>=v2.0
#
# Default paths can be overridden:
#   TUNA_IMAGE_PATH_<name>=my-org/my-fork
#
# This file is the single source of truth for all container image references
# used during builds. Scripts should source scripts/_registry.sh and use
# the registry_ref() function instead of hardcoding registry hostnames.
#
# See RFC-009 for design rationale.

registries:
  ghcr: "ghcr.io"
  quay: "quay.io"
  docker: "docker.io"

images:
  # --- Build inputs (external dependencies) ---
  common:
    registry: ghcr
    path: projectbluefin/common
    tag: latest

  brew:
    registry: ghcr
    path: ublue-os/brew
    tag: latest

  akmods:
    registry: ghcr
    path: ublue-os

  akmods-nvidia-open:
    registry: ghcr
    path: ublue-os/akmods-nvidia-open

  # --- Bootc base images ---
  almalinux-bootc:
    registry: quay
    path: almalinuxorg/almalinux-bootc
    tag: "10"

  almalinux-bootc-kitten:
    registry: quay
    path: almalinuxorg/almalinux-bootc
    tag: "10-kitten"

  centos-bootc:
    registry: quay
    path: centos-bootc/centos-bootc
    tag: stream10

  fedora-bootc:
    registry: quay
    path: fedora/fedora-bootc
    tag: "44"

  # --- Tool images ---
  coreos-chunkah:
    registry: quay
    path: coreos/chunkah
    # SECURITY: Pinned to digest to prevent supply-chain attacks via tag mutation.
    # tag: latest is retained as fallback for setups without the pinned image.
    digest: sha256:33ab77f29c90fb3ec7a3a6b6c84ee2f2bcff1846b3c34a3231092aebd39e673b
    tag: latest

  # --- Tool images (local dev) ---
  # novnc and qemu images are used by local development scripts
  # (lima-novnc.sh, run-vm.sh). Both images currently require
  # authentication or don't exist on public registries.
  #
  # Override with env vars:
  #   NOVNC_IMAGE=docker.io/your/novnc:tag scripts/lima-novnc.sh ...
  #   QEMU_IMAGE=docker.io/your/qemu:tag just run-qcow2 albacore gnome
  #
  # Once publicly-available images are identified, add them here and
  # pin to SHA256 digests.

  # --- ISO bootc target ---
  bluefin-iso:
    registry: ghcr
    path: hanthor/bluefin
    # SECURITY: Pinned to digest. The :lts tag is a floating tag — pinning
    # protects ISO builds from unexpected image changes.
    digest: sha256:fa7d24b646cc345542190b7f68fc70fbd9a4d3143e8cc077db4dca68336c3ae8
    tag: lts
