name: Login to GHCR
description: Logs into GitHub Container Registry
runs:
  using: composite
  steps:
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ github.token }}

    - name: Login to Podman
      run: |
        echo "${{ github.token }}" | podman login -u "${{ github.actor }}" --password-stdin ghcr.io
        echo "${{ github.token }}" | sudo podman login -u "${{ github.actor }}" --password-stdin ghcr.io
      shell: bash
