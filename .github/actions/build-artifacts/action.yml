name: Build Artifacts (ISO + QCOW2 + screenshot)
description: |
  Builds Live ISO (tacklebox), QCOW2 disk image, and boot screenshot
  for a single {variant, flavor} cell. Used by per-stage artifact jobs
  in build-variant.yml to avoid the stage-4 artifact jail.

inputs:
  variant:
    description: 'Variant name (yellowfin, albacore, skipjack, bonito)'
    required: true
  flavor:
    description: 'Flavor name (gnome, kde, gnome-gdx, etc.)'
    required: true
  build_iso:
    description: 'Whether to build an ISO'
    required: false
    default: 'false'
  build_qcow2:
    description: 'Whether to build a QCOW2 disk image'
    required: false
    default: 'false'
  r2_access_key_id:
    description: 'R2 access key ID'
    required: false
    default: ''
  r2_secret_access_key:
    description: 'R2 secret access key'
    required: false
    default: ''
  r2_endpoint:
    description: 'R2 endpoint URL'
    required: false
    default: ''
  r2_bucket:
    description: 'R2 bucket name'
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Maximize build space
      uses: ublue-os/container-storage-action@dc1f4c8f17b672069e921f001132f7cf98a423a6 # main as of 2026-02-11

    - name: Install dependencies
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y just podman jq rclone golang-go git

    - name: Build Live ISO
      if: inputs.build_iso == 'true'
      shell: bash
      env:
        UPLOAD_R2: 'true'
        RCLONE_CONFIG_R2_TYPE: s3
        RCLONE_CONFIG_R2_PROVIDER: Cloudflare
        RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${{ inputs.r2_access_key_id }}
        RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${{ inputs.r2_secret_access_key }}
        RCLONE_CONFIG_R2_REGION: auto
        RCLONE_CONFIG_R2_ENDPOINT: ${{ inputs.r2_endpoint }}
        R2_BUCKET: ${{ inputs.r2_bucket }}
      run: |
        sudo just iso-tacklebox \
          "${{ inputs.variant }}" \
          "${{ inputs.flavor }}" \
          ghcr \
          "${{ inputs.flavor }}-linux-amd64"

    - name: Upload ISO Artifact
      if: inputs.build_iso == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.variant }}-${{ inputs.flavor }}-live-iso
        path: '*.iso'
        if-no-files-found: warn

    - name: Install QEMU for boot verification
      if: inputs.build_iso == 'true'
      shell: bash
      run: |
        sudo apt-get install -y qemu-system-x86 ovmf socat imagemagick

    - name: Boot ISO and capture screenshot
      if: inputs.build_iso == 'true'
      shell: bash
      timeout-minutes: 10
      run: |
        ISO=$(find . -maxdepth 1 -name "*.iso" | head -1)
        echo "==> Booting $ISO in QEMU (headless, KVM)..."

        # Locate UEFI firmware (path varies by Ubuntu version)
        OVMF_CODE=""
        for f in \
          /usr/share/OVMF/OVMF_CODE_4M.fd \
          /usr/share/OVMF/OVMF_CODE.fd \
          /usr/share/edk2/ovmf/OVMF_CODE.fd; do
          [ -f "$f" ] && OVMF_CODE="$f" && break
        done
        OVMF_VARS=""
        for f in \
          /usr/share/OVMF/OVMF_VARS_4M.fd \
          /usr/share/OVMF/OVMF_VARS.fd \
          /usr/share/edk2/ovmf/OVMF_VARS.fd; do
          if [ -f "$f" ]; then
            cp "$f" /tmp/OVMF_VARS.fd
            OVMF_VARS="/tmp/OVMF_VARS.fd"
            break
          fi
        done

        PFLASH=()
        if [ -n "$OVMF_CODE" ] && [ -n "$OVMF_VARS" ]; then
          echo "==> Using UEFI: $OVMF_CODE"
          PFLASH+=(-drive "if=pflash,format=raw,readonly=on,file=$OVMF_CODE")
          PFLASH+=(-drive "if=pflash,format=raw,file=$OVMF_VARS")
        else
          echo "==> OVMF not found, booting in BIOS mode"
        fi

        sudo qemu-system-x86_64 \
          -machine type=q35,accel=kvm \
          -cpu host \
          -m 4G \
          -smp 2 \
          -cdrom "$ISO" \
          -boot d \
          "${PFLASH[@]}" \
          -monitor unix:/tmp/qemu-monitor.sock,server,nowait \
          -serial file:/tmp/serial.log \
          -display none \
          -daemonize

        # Wait for monitor socket
        for i in $(seq 1 30); do
          [ -S /tmp/qemu-monitor.sock ] && break
          sleep 2
        done

        # Wait for live desktop to fully boot (~4 minutes)
        echo "==> Waiting 4 minutes for GNOME desktop to appear..."
        sleep 240

        # Capture screenshot via QEMU monitor
        echo "screendump /tmp/screenshot.ppm" | \
          sudo socat - UNIX-CONNECT:/tmp/qemu-monitor.sock
        sleep 3

        # Convert to PNG
        if sudo test -f /tmp/screenshot.ppm; then
          sudo convert /tmp/screenshot.ppm screenshot.png 2>/dev/null || \
            sudo cp /tmp/screenshot.ppm screenshot.png
          echo "==> Screenshot captured: $(ls -lh screenshot.png)"
        else
          echo "WARNING: screenshot.ppm not found; serial log follows:"
          sudo cat /tmp/serial.log || true
        fi

        # Shut down QEMU
        echo "quit" | sudo socat - UNIX-CONNECT:/tmp/qemu-monitor.sock || true

    - name: Upload boot screenshot
      if: inputs.build_iso == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.variant }}-${{ inputs.flavor }}-boot-screenshot
        path: screenshot.png
        if-no-files-found: warn

    - name: Build QCOW2
      if: inputs.build_qcow2 == 'true'
      shell: bash
      run: |
        sudo scripts/build-qcow2.sh \
          "ghcr.io/${{ github.repository_owner }}/${{ inputs.variant }}:${{ inputs.flavor }}-linux-amd64"
