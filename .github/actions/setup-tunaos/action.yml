name: Setup TunaOS Build Environment
description: Installs podman, yq, just, and actionlint for TunaOS CI builds.

runs:
  using: composite
  steps:
    - name: Install Podman
      run: |
        if ! command -v podman &> /dev/null; then
          sudo apt-get update && sudo apt-get install -y podman
        fi
      shell: bash

    - name: Install yq
      run: |
        if ! command -v yq &> /dev/null; then
          sudo wget https://github.com/mikefarah/yq/releases/download/v4.44.5/yq_linux_amd64 -O /usr/bin/yq
          sudo chmod +x /usr/bin/yq
        fi
      shell: bash

    - name: Setup Homebrew
      uses: Homebrew/actions/setup-homebrew@f830e99d47c69efee99f1ddbf18a8e3144d1b93e

    - name: Install Just
      run: |
        if ! command -v just &> /dev/null; then
          brew install just
        fi
      shell: bash
