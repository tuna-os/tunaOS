name: Setup TunaOS Build Environment
description: Installs podman, yq, just, and actionlint for TunaOS CI builds.

runs:
  using: composite
  steps:
    - name: Install Podman
      run: |
        if ! command -v podman &> /dev/null; then
          sudo apt-get update && sudo apt-get install -y podman
        fi
      shell: bash

    - name: Install yq
      run: |
        if ! command -v yq &> /dev/null; then
          sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/bin/yq
          sudo chmod +x /usr/bin/yq
        fi
      shell: bash

    - name: Setup Homebrew
      uses: Homebrew/actions/setup-homebrew@master

    - name: Install Just
      run: |
        if ! command -v just &> /dev/null; then
          brew install just
        fi
      shell: bash

    # Fix #8: actionlint is installed here and used in the lint job.
    # If you don't have a lint job, remove actionlint from this action.
    - name: Install Actionlint
      run: |
        if ! command -v actionlint &> /dev/null; then
          brew install actionlint
        fi
      shell: bash

    # Fix #8: Actually run actionlint so the install isn't wasted.
    # This lints all workflow files in .github/workflows/.
    - name: Lint Workflows
      run: actionlint
      shell: bash
