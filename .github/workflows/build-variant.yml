name: Unified Build
on:
  workflow_call:
    inputs:
      variant:
        description: 'Variant to build (yellowfin, albacore, skipjack, bonito)'
        required: true
        type: string
      flavor:
        description: 'Flavor (all, base, gnome, kde, niri, etc.)'
        default: 'all'
        type: string

jobs:
  # ── Matrix Generation ───────────────────────────────────────────────────────
  # Reads build-config.yml and emits one matrix per build stage plus the
  # artifact matrix. Each image matrix only contains flavors for that stage,
  # which lets the workflow enforce the dependency chain via `needs`.
  generate_matrix:
    runs-on: ubuntu-latest
    outputs:
      stage1_matrix: ${{ steps.set-matrix.outputs.stage1_matrix }}
      stage2_matrix: ${{ steps.set-matrix.outputs.stage2_matrix }}
      stage3_matrix: ${{ steps.set-matrix.outputs.stage3_matrix }}
      artifact_matrix: ${{ steps.set-matrix.outputs.artifact_matrix }}
      artifact_count: ${{ steps.set-matrix.outputs.artifact_count }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Build Environment
        uses: ./.github/actions/setup-tunaos

      - name: Validate Inputs
        env:
          FILTER_VARIANT: ${{ inputs.variant || 'all' }}
          FILTER_FLAVOR: ${{ inputs.flavor || 'all' }}
        run: |
          VALID_VARIANTS="all $(yq -r '.variants[].id' .github/build-config.yml | tr '\n' ' ')"
          VALID_FLAVORS="all $(yq -r '.variants[].flavors[].id' .github/build-config.yml | sort -u | tr '\n' ' ')"

          variant_pattern=" $FILTER_VARIANT "
          flavor_pattern=" $FILTER_FLAVOR "
          if [[ ! " $VALID_VARIANTS " =~ $variant_pattern ]]; then
            echo "::error::Invalid variant '$FILTER_VARIANT'. Must be one of: $VALID_VARIANTS"
            exit 1
          fi

          if [[ ! " $VALID_FLAVORS " =~ $flavor_pattern ]]; then
            echo "::error::Invalid flavor '$FILTER_FLAVOR'. Must be one of: $VALID_FLAVORS"
            exit 1
          fi

      - name: Generate Matrix
        id: set-matrix
        env:
          FILTER_VARIANT: ${{ inputs.variant || 'all' }}
          FILTER_FLAVOR: ${{ inputs.flavor || 'all' }}
        run: |
          # Flatten config into one entry per {variant, flavor}, applying filters.
          # All inputs are in env vars — no direct interpolation of ${{ inputs.* }}
          # into the script body to prevent shell injection.
          FULL_MATRIX=$(yq -o=json '.' .github/build-config.yml | jq -c --arg event "${{ github.event_name }}" '
            .variants[]
            | select(env.FILTER_VARIANT == "all" or .id == env.FILTER_VARIANT)
            | . as $v
            | .flavors[]
            | select(env.FILTER_FLAVOR == "all" or .id == env.FILTER_FLAVOR)
            | select($event != "pull_request" or (.id == "base" or .id == "gnome"))
            | {
                variant:       $v.id,
                variant_emoji: ($v.emoji // "❓"),
                base_image:    $v.base_image,
                platforms:     (if $event == "pull_request" then "linux/amd64" else ($v.platforms | join(",")) end),
                flavor:        .id,
                stage:         .stage,
                build_iso:     (.build_iso  // false),
                build_qcow2:   (.build_qcow2 // false)
              }
          ' | jq -c -s '.')

          # Helper: emit an image matrix for a given stage number.
          make_image_matrix() {
            local STAGE=$1
            echo "$FULL_MATRIX" | jq -c --argjson stage "$STAGE" '{
              include: map(select(.stage == $stage) | {
                variant:       .variant,
                variant_emoji: .variant_emoji,
                flavor:        .flavor,
                platforms:     .platforms,
                base_image:    .base_image
              })
            }'
          }

          STAGE1_MATRIX=$(make_image_matrix 1)
          STAGE2_MATRIX=$(make_image_matrix 2)
          STAGE3_MATRIX=$(make_image_matrix 3)

          echo "stage1_matrix=$STAGE1_MATRIX" >> $GITHUB_OUTPUT
          echo "stage2_matrix=$STAGE2_MATRIX" >> $GITHUB_OUTPUT
          echo "stage3_matrix=$STAGE3_MATRIX" >> $GITHUB_OUTPUT

          # Artifact matrix: all stages, only entries that need an ISO or QCOW2.
          ARTIFACT_MATRIX=$(echo "$FULL_MATRIX" | jq -c '{
            include: map(
              select(.build_iso == true or .build_qcow2 == true)
              | {
                  variant:       .variant,
                  variant_emoji: .variant_emoji,
                  flavor:        .flavor,
                  build_iso:     .build_iso,
                  build_qcow2:   .build_qcow2,
                  base_image:    .base_image,
                  platform:      "linux/amd64"
                }
            )
          }')
          echo "artifact_matrix=$ARTIFACT_MATRIX" >> $GITHUB_OUTPUT

          ARTIFACT_COUNT=$(echo "$ARTIFACT_MATRIX" | jq '.include | length')
          echo "artifact_count=$ARTIFACT_COUNT" >> $GITHUB_OUTPUT

  # ── Stage 1: Base images ────────────────────────────────────────────────────
  # Builds {variant}:base for every variant in parallel.
  # Nothing else may start until all base images are published.
  build_base:
    name: "S1 | ${{ matrix.variant_emoji }} ${{ matrix.variant }}:${{ matrix.flavor }}"
    needs: generate_matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate_matrix.outputs.stage1_matrix) }}
    uses: ./.github/workflows/reusable-build-image.yml
    with:
      image-name: ${{ matrix.variant }}
      image-variant: ${{ matrix.variant }}
      flavor: ${{ matrix.flavor }}
      platforms: ${{ matrix.platforms }}
      default-tag: ${{ matrix.flavor }}
      publish: ${{ github.event_name != 'pull_request' }}
    secrets: inherit

  # ── Stage 2: base-hwe, base-gdx, and desktop base flavors ──────────────────
  # Runs only after ALL stage-1 jobs pass. Includes:
  #   - base-hwe  (layers on base)
  #   - base-gdx  (layers on base)
  #   - gnome     (layers on base)
  #   - kde       (layers on base)
  #   - niri      (layers on base)
  # All of these run in parallel within stage 2.
  #
  # Note: GHA `needs` waits for the entire prior matrix job to complete, not
  # individual cells. So albacore:gnome must wait for yellowfin:base too — this
  # is a known GHA limitation with dynamic matrices. In practice it adds minimal
  # wall-clock time since all base images build in parallel.
  build_stage2:
    name: "S2 | ${{ matrix.variant_emoji }} ${{ matrix.variant }}:${{ matrix.flavor }}"
    needs: [generate_matrix, build_base]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate_matrix.outputs.stage2_matrix) }}
    uses: ./.github/workflows/reusable-build-image.yml
    with:
      image-name: ${{ matrix.variant }}
      image-variant: ${{ matrix.variant }}
      flavor: ${{ matrix.flavor }}
      platforms: ${{ matrix.platforms }}
      default-tag: ${{ matrix.flavor }}
      publish: ${{ github.event_name != 'pull_request' }}
    secrets: inherit

  # ── Stage 3: Desktop HWE and GDX flavors ───────────────────────────────────
  # Runs only after ALL stage-2 jobs pass. Includes:
  #   - gnome-hwe, kde-hwe, niri-hwe   (layer on base-hwe)
  #   - gnome-gdx, kde-gdx, niri-gdx   (layer on base-gdx)
  #   - gnome-gdx-hwe                  (layers on both)
  # All run in parallel within stage 3.
  build_stage3:
    name: "S3 | ${{ matrix.variant_emoji }} ${{ matrix.variant }}:${{ matrix.flavor }}"
    needs: [generate_matrix, build_stage2]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate_matrix.outputs.stage3_matrix) }}
    uses: ./.github/workflows/reusable-build-image.yml
    with:
      image-name: ${{ matrix.variant }}
      image-variant: ${{ matrix.variant }}
      flavor: ${{ matrix.flavor }}
      platforms: ${{ matrix.platforms }}
      default-tag: ${{ matrix.flavor }}
      publish: ${{ github.event_name != 'pull_request' }}
    secrets: inherit

  # ── Artifact builds (ISO + QCOW2) ──────────────────────────────────────────
  # Runs after all image stages are complete. Only triggered on non-PR events
  # and only when the artifact matrix is non-empty.
  build_artifacts:
    name: "Pkg | ${{ matrix.variant_emoji }} ${{ matrix.variant }}:${{ matrix.flavor }}"
    needs: [generate_matrix, build_stage3]
    if: github.event_name != 'pull_request' && needs.generate_matrix.outputs.artifact_count != '0'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate_matrix.outputs.artifact_matrix) }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build ISO
        if: matrix.build_iso == true
        uses: ublue-os/isogenerator@v1
        with:
          image-name: ${{ matrix.variant }}-${{ matrix.flavor }}
          installer-repo: ghcr.io/${{ github.repository_owner }}/${{ matrix.variant }}:${{ matrix.flavor }}-unchunked-linux-amd64
          flatpaks-list: ${{ github.workspace }}/system_files/etc/ublue-os/system-flatpaks.list
          hook-post-rootfs: ${{ github.workspace }}/iso_files/configure_lts_iso_anaconda.sh
          builder-distro: ${{ matrix.base_image }}

      - name: Build QCOW2
        if: matrix.build_qcow2 == true
        uses: ublue-os/qcow2generator@v1
        with:
          image-name: ${{ matrix.variant }}-${{ matrix.flavor }}
          installer-repo: ghcr.io/${{ github.repository_owner }}/${{ matrix.variant }}:${{ matrix.flavor }}-unchunked-linux-amd64
          builder-distro: ${{ matrix.base_image }}
