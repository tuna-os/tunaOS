name: Unified Build
on:
  workflow_call:
    inputs:
      variant:
        description: 'Variant to build (yellowfin, albacore, skipjack, bonito)'
        required: true
        type: string
      flavor:
        description: 'Flavor (all, base, gnome, kde, niri, etc.)'
        default: 'all'
        type: string

jobs:
  # ── Matrix Generation ───────────────────────────────────────────────────────
  # Reads build-config.yml and emits one matrix per build stage plus the
  # artifact matrix. Each image matrix only contains flavors for that stage,
  # which lets the workflow enforce the dependency chain via `needs`.
  generate_matrix:
    runs-on: ubuntu-latest
    outputs:
      stage1_matrix: ${{ steps.set-matrix.outputs.stage1_matrix }}
      stage2_matrix: ${{ steps.set-matrix.outputs.stage2_matrix }}
      stage3_matrix: ${{ steps.set-matrix.outputs.stage3_matrix }}
      stage4_matrix: ${{ steps.set-matrix.outputs.stage4_matrix }}
      artifact_matrix: ${{ steps.set-matrix.outputs.artifact_matrix }}
      artifact_count: ${{ steps.set-matrix.outputs.artifact_count }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Build Environment
        uses: ./.github/actions/setup-tunaos

      - name: Validate Inputs
        env:
          FILTER_VARIANT: ${{ inputs.variant || 'all' }}
          FILTER_FLAVOR: ${{ inputs.flavor || 'all' }}
        run: |
          VALID_VARIANTS="all $(yq -r '.variants[].id' .github/build-config.yml | tr '\n' ' ')"
          VALID_FLAVORS="all $(yq -r '.variants[].flavors[].id' .github/build-config.yml | sort -u | tr '\n' ' ')"

          variant_pattern=" $FILTER_VARIANT "
          flavor_pattern=" $FILTER_FLAVOR "
          if [[ ! " $VALID_VARIANTS " =~ $variant_pattern ]]; then
            echo "::error::Invalid variant '$FILTER_VARIANT'. Must be one of: $VALID_VARIANTS"
            exit 1
          fi

          if [[ ! " $VALID_FLAVORS " =~ $flavor_pattern ]]; then
            echo "::error::Invalid flavor '$FILTER_FLAVOR'. Must be one of: $VALID_FLAVORS"
            exit 1
          fi

      - name: Generate Matrix
        id: set-matrix
        env:
          FILTER_VARIANT: ${{ inputs.variant || 'all' }}
          FILTER_FLAVOR: ${{ inputs.flavor || 'all' }}
        run: |
          # Flatten config into one entry per {variant, flavor}, applying filters.
          # All inputs are in env vars — no direct interpolation of ${{ inputs.* }}
          # into the script body to prevent shell injection.
          FULL_MATRIX=$(yq -o=json '.' .github/build-config.yml | jq -c --arg event "${{ github.event_name }}" '
            .variants[]
            | select(env.FILTER_VARIANT == "all" or .id == env.FILTER_VARIANT)
            | . as $v
            | .flavors[]
            | select(env.FILTER_FLAVOR == "all" or .id == env.FILTER_FLAVOR)
            | select($event != "pull_request" or .id == "gnome")
            | {
                variant:       $v.id,
                variant_emoji: ($v.emoji // "❓"),
                base_image:    $v.base_image,
                platforms:     (if $event == "pull_request" then "linux/amd64" else ($v.platforms | join(",")) end),
                flavor:        .id,
                stage:         (if $event == "pull_request" then 1 else .stage end),
                build_iso:     (.build_iso  // false),
                build_qcow2:   (.build_qcow2 // false)
              }
          ' | jq -c -s '.')

          # Helper: emit an image matrix for a given stage number.
          make_image_matrix() {
            local STAGE=$1
            echo "$FULL_MATRIX" | jq -c --argjson stage "$STAGE" '{
              include: map(select(.stage == $stage) | {
                variant:       .variant,
                variant_emoji: .variant_emoji,
                flavor:        .flavor,
                platforms:     .platforms,
                base_image:    .base_image
              })
            }'
          }

          STAGE1_MATRIX=$(make_image_matrix 1)
          STAGE2_MATRIX=$(make_image_matrix 2)
          STAGE3_MATRIX=$(make_image_matrix 3)
          STAGE4_MATRIX=$(make_image_matrix 4)

          echo "stage1_matrix=$STAGE1_MATRIX" >> $GITHUB_OUTPUT
          echo "stage2_matrix=$STAGE2_MATRIX" >> $GITHUB_OUTPUT
          echo "stage3_matrix=$STAGE3_MATRIX" >> $GITHUB_OUTPUT
          echo "stage4_matrix=$STAGE4_MATRIX" >> $GITHUB_OUTPUT

          # Artifact matrix: all stages, only entries that need an ISO or QCOW2.
          ARTIFACT_MATRIX=$(echo "$FULL_MATRIX" | jq -c '{
            include: map(
              select(.build_iso == true or .build_qcow2 == true)
              | {
                  variant:       .variant,
                  variant_emoji: .variant_emoji,
                  flavor:        .flavor,
                  build_iso:     .build_iso,
                  build_qcow2:   .build_qcow2,
                  base_image:    .base_image,
                  platform:      "linux/amd64"
                }
            )
          }')
          echo "artifact_matrix=$ARTIFACT_MATRIX" >> $GITHUB_OUTPUT

          ARTIFACT_COUNT=$(echo "$ARTIFACT_MATRIX" | jq '.include | length')
          echo "artifact_count=$ARTIFACT_COUNT" >> $GITHUB_OUTPUT

  # ── Stage 1: Base images ────────────────────────────────────────────────────
  # Builds {variant}:base for every variant in parallel.
  # Nothing else may start until all base images are published.
  build_base:
    name: "S1 | ${{ matrix.variant_emoji }} ${{ matrix.variant }}:${{ matrix.flavor }}"
    needs: generate_matrix
    if: fromJson(needs.generate_matrix.outputs.stage1_matrix).include[0]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate_matrix.outputs.stage1_matrix) }}
    uses: ./.github/workflows/reusable-build-image.yml
    with:
      image-name: ${{ matrix.variant }}
      image-variant: ${{ matrix.variant }}
      flavor: ${{ matrix.flavor }}
      platforms: ${{ matrix.platforms }}
      default-tag: ${{ matrix.flavor }}
      publish: ${{ github.event_name != 'pull_request' }}
      sbom: ${{ github.event_name != 'pull_request' }}
    secrets: inherit

  # ── Stage 2: base-hwe, base-gdx, and desktop base flavors ──────────────────
  # Runs only after ALL stage-1 jobs pass. Includes:
  #   - base-hwe  (layers on base)
  #   - base-gdx  (layers on base)
  #   - gnome     (layers on base)
  #   - kde       (layers on base)
  #   - niri      (layers on base)
  # All of these run in parallel within stage 2.
  build_stage2:
    name: "S2 | ${{ matrix.variant_emoji }} ${{ matrix.variant }}:${{ matrix.flavor }}"
    needs: [generate_matrix, build_base]
    if: github.event_name != 'pull_request' && fromJson(needs.generate_matrix.outputs.stage2_matrix).include[0]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate_matrix.outputs.stage2_matrix) }}
    uses: ./.github/workflows/reusable-build-image.yml
    with:
      image-name: ${{ matrix.variant }}
      image-variant: ${{ matrix.variant }}
      flavor: ${{ matrix.flavor }}
      platforms: ${{ matrix.platforms }}
      default-tag: ${{ matrix.flavor }}
      publish: true
      sbom: true
    secrets: inherit

  # ── Stage 3: Desktop HWE and GDX flavors ───────────────────────────────────
  # Runs only after ALL stage-2 jobs pass. Includes:
  #   - gnome-hwe, kde-hwe, niri-hwe   (layer on base-hwe)
  #   - gnome-gdx, kde-gdx, niri-gdx   (layer on base-gdx)
  # All run in parallel within stage 3.
  build_stage3:
    name: "S3 | ${{ matrix.variant_emoji }} ${{ matrix.variant }}:${{ matrix.flavor }}"
    needs: [generate_matrix, build_stage2]
    if: github.event_name != 'pull_request' && fromJson(needs.generate_matrix.outputs.stage3_matrix).include[0]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate_matrix.outputs.stage3_matrix) }}
    uses: ./.github/workflows/reusable-build-image.yml
    with:
      image-name: ${{ matrix.variant }}
      image-variant: ${{ matrix.variant }}
      flavor: ${{ matrix.flavor }}
      platforms: ${{ matrix.platforms }}
      default-tag: ${{ matrix.flavor }}
      publish: true
      sbom: true
    secrets: inherit

  # ── Stage 4: Combined GDX+HWE flavors ──────────────────────────────────────
  # Runs only after ALL stage-3 jobs pass. Includes:
  #   - gnome-gdx-hwe   (layers on gnome-hwe from stage 3)
  # Must be a separate stage from stage 3 because gnome-gdx-hwe depends on
  # gnome-hwe, which is also built in stage 3.
  build_stage4:
    name: "S4 | ${{ matrix.variant_emoji }} ${{ matrix.variant }}:${{ matrix.flavor }}"
    needs: [generate_matrix, build_stage3]
    if: github.event_name != 'pull_request' && fromJson(needs.generate_matrix.outputs.stage4_matrix).include[0]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate_matrix.outputs.stage4_matrix) }}
    uses: ./.github/workflows/reusable-build-image.yml
    with:
      image-name: ${{ matrix.variant }}
      image-variant: ${{ matrix.variant }}
      flavor: ${{ matrix.flavor }}
      platforms: ${{ matrix.platforms }}
      default-tag: ${{ matrix.flavor }}
      publish: true
      sbom: true
    secrets: inherit

  # ── Artifact builds (ISO + QCOW2) ──────────────────────────────────────────
  # Runs after all image stages are complete. Only triggered on non-PR events
  # and only when the artifact matrix is non-empty.
  # ISOs use the bootc-isos approach (tunaos-first-setup installer), pulling
  # the already-published GHCR image so we don't rebuild from scratch.
  build_artifacts:
    name: "Pkg | ${{ matrix.variant_emoji }} ${{ matrix.variant }}:${{ matrix.flavor }}"
    needs: [generate_matrix, build_stage4]
    if: github.event_name != 'pull_request' && needs.generate_matrix.outputs.artifact_count != '0'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate_matrix.outputs.artifact_matrix) }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Maximize build space
        uses: ublue-os/container-storage-action@main

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y just podman jq rclone golang-go git

      - name: Build Live ISO
        if: matrix.build_iso == true
        env:
          UPLOAD_R2: "true"
          RCLONE_CONFIG_R2_TYPE: s3
          RCLONE_CONFIG_R2_PROVIDER: Cloudflare
          RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          RCLONE_CONFIG_R2_REGION: auto
          RCLONE_CONFIG_R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          sudo just live-iso \
            "${{ matrix.variant }}" \
            "${{ matrix.flavor }}" \
            ghcr \
            "${{ matrix.flavor }}-linux-amd64"

      - name: Upload ISO Artifact
        if: matrix.build_iso == true
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.variant }}-${{ matrix.flavor }}-live-iso
          path: "*.iso"
          if-no-files-found: warn

      - name: Install QEMU for boot verification
        if: matrix.build_iso == true
        run: |
          sudo apt-get install -y qemu-system-x86 ovmf socat imagemagick

      - name: Boot ISO and capture screenshot
        if: matrix.build_iso == true
        timeout-minutes: 10
        run: |
          ISO=$(find . -maxdepth 1 -name "*.iso" | head -1)
          echo "==> Booting $ISO in QEMU (headless, KVM)..."

          # Locate UEFI firmware (path varies by Ubuntu version)
          OVMF_CODE=""
          for f in \
            /usr/share/OVMF/OVMF_CODE_4M.fd \
            /usr/share/OVMF/OVMF_CODE.fd \
            /usr/share/edk2/ovmf/OVMF_CODE.fd; do
            [ -f "$f" ] && OVMF_CODE="$f" && break
          done
          OVMF_VARS=""
          for f in \
            /usr/share/OVMF/OVMF_VARS_4M.fd \
            /usr/share/OVMF/OVMF_VARS.fd \
            /usr/share/edk2/ovmf/OVMF_VARS.fd; do
            if [ -f "$f" ]; then
              cp "$f" /tmp/OVMF_VARS.fd
              OVMF_VARS="/tmp/OVMF_VARS.fd"
              break
            fi
          done

          PFLASH=()
          if [ -n "$OVMF_CODE" ] && [ -n "$OVMF_VARS" ]; then
            echo "==> Using UEFI: $OVMF_CODE"
            PFLASH+=(-drive "if=pflash,format=raw,readonly=on,file=$OVMF_CODE")
            PFLASH+=(-drive "if=pflash,format=raw,file=$OVMF_VARS")
          else
            echo "==> OVMF not found, booting in BIOS mode"
          fi

          sudo qemu-system-x86_64 \
            -machine type=q35,accel=kvm \
            -cpu host \
            -m 4G \
            -smp 2 \
            -cdrom "$ISO" \
            -boot d \
            "${PFLASH[@]}" \
            -monitor unix:/tmp/qemu-monitor.sock,server,nowait \
            -serial file:/tmp/serial.log \
            -display none \
            -daemonize

          # Wait for monitor socket
          for i in $(seq 1 30); do
            [ -S /tmp/qemu-monitor.sock ] && break
            sleep 2
          done

          # Wait for live desktop to fully boot (~4 minutes)
          echo "==> Waiting 4 minutes for GNOME desktop to appear..."
          sleep 240

          # Capture screenshot via QEMU monitor
          echo "screendump /tmp/screenshot.ppm" | \
            sudo socat - UNIX-CONNECT:/tmp/qemu-monitor.sock
          sleep 3

          # Convert to PNG
          if sudo test -f /tmp/screenshot.ppm; then
            sudo convert /tmp/screenshot.ppm screenshot.png 2>/dev/null || \
              sudo cp /tmp/screenshot.ppm screenshot.png
            echo "==> Screenshot captured: $(ls -lh screenshot.png)"
          else
            echo "WARNING: screenshot.ppm not found; serial log follows:"
            sudo cat /tmp/serial.log || true
          fi

          # Shut down QEMU
          echo "quit" | sudo socat - UNIX-CONNECT:/tmp/qemu-monitor.sock || true

      - name: Upload boot screenshot
        if: matrix.build_iso == true
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.variant }}-${{ matrix.flavor }}-boot-screenshot
          path: screenshot.png
          if-no-files-found: warn

      - name: Build QCOW2
        if: matrix.build_qcow2 == true
        run: |
          sudo scripts/build-qcow2.sh \
            "${{ matrix.variant }}" "${{ matrix.flavor }}" \
            "ghcr.io/${{ github.repository_owner }}/${{ matrix.variant }}:${{ matrix.flavor }}-linux-amd64"
