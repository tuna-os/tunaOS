name: Build and Publish ubuntu-bootc
on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "ubuntu-bootc/**"

concurrency:
  group: ubuntu-bootc-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Login to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961bbf29c5a4a4ec0180 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ubuntu-bootc
        uses: docker/build-push-action@ca052f3c08d8d468bbe0c3f2ffba3bea3c80cd76 # v6
        with:
          context: ubuntu-bootc/
          file: ubuntu-bootc/Containerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/tuna-os/ubuntu-bootc:26.04
            ghcr.io/tuna-os/ubuntu-bootc:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
