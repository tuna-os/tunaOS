name: Build Grouper [experimental]
on:
  workflow_dispatch:
    inputs:
      flavor:
        description: 'Flavor (all, base, gnome, kde, niri, etc.)'
        default: 'all'
        type: string

concurrency:
  group: build-grouper-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: 🐟-grouper
    uses: ./.github/workflows/build-variant.yml
    with:
      variant: 'grouper'
      flavor: ${{ inputs.flavor || 'all' }}
    secrets: inherit
