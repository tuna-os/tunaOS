name: Build Flavor
on:
  workflow_dispatch:
    inputs:
      flavor:
        description: 'Flavor to build across all variants (base, gnome, kde, niri, cosmic, xfce, etc.)'
        required: true
        type: string

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      flavor: ${{ steps.validate.outputs.flavor }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate Flavor
        id: validate
        env:
          FLAVOR_INPUT: ${{ github.event.inputs.flavor }}
        run: |
          FLAVOR="$FLAVOR_INPUT"
          # Read valid flavors from build-config.yml
          VALID_FLAVORS=$(yq -r '.variants[].flavors[].id' .github/build-config.yml | sort -u | tr '\n' ' ')
          VALID_FLAVORS="all $VALID_FLAVORS"

          if echo " $VALID_FLAVORS " | grep -q " $FLAVOR "; then
            echo "flavor=$FLAVOR" >> $GITHUB_OUTPUT
            echo "✅ Flavor '$FLAVOR' is valid"
          else
            echo "::error::Invalid flavor '$FLAVOR'. Valid flavors: $VALID_FLAVORS"
            exit 1
          fi

  build:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        variant: [yellowfin, albacore, skipjack, bonito, bonito-rawhide, grouper, marlin, flounder, flounder-sid]
    name: Build ${{ matrix.variant }}:${{ needs.validate.outputs.flavor }}
    uses: ./.github/workflows/build-variant.yml
    with:
      variant: ${{ matrix.variant }}
      flavor: ${{ needs.validate.outputs.flavor }}
    secrets:
      SIGNING_SECRET: ${{ secrets.SIGNING_SECRET }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
