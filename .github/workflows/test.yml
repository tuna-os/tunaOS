name: Test
on:
  pull_request:
    paths:
      - 'scripts/**'
      - 'tests/**'
      - 'build_scripts/**'
      - '.github/scripts/**'
      - '.github/changelogs.py'
      - 'Justfile'
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup TunaOS Build Environment
        uses: projectbluefin/actions/bootc-build/setup-runner@d8f871c0ca7a868339d3c175200a7319492473c7 # v1 as of 2026-07-02
        with:
          storage-backend: ""
          update-podman: "false"
          install-tools: '[]'

      - name: Setup Homebrew
        uses: Homebrew/actions/setup-homebrew@f830e99d47c69efee99f1ddbf18a8e3144d1b93e

      - name: Install just
        run: brew install just

      - name: Install yq
        run: sudo wget -qO /usr/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 && sudo chmod +x /usr/bin/yq

      - name: Install test dependencies
        run: |
          # BATS (bash automated testing system)
          brew install bats-core

          # pytest for Python tests
          pip3 install pytest --break-system-packages 2>/dev/null || pip3 install pytest --user

      - name: Run BATS tests
        run: |
          echo "=== BATS Tests ==="
          FAILED=0
          for f in tests/bats/*.bats; do
            [[ -f "$f" ]] || continue
            echo "  Running: $f"
            bats --formatter tap "$f" || FAILED=1
          done
          exit $FAILED

      - name: Run pytest tests
        run: |
          echo "=== pytest Tests ==="
          python3 -m pytest tests/ tests/pytest/ -v --tb=short

      - name: Test summary
        if: always()
        run: |
          BATS_COUNT=$(find tests/bats -name "*.bats" -type f | wc -l)
          PY_COUNT=$(find tests/pytest -name "*.py" -type f 2>/dev/null | wc -l)
          echo "| Type | Files |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| BATS | ${BATS_COUNT} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| pytest | ${PY_COUNT} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Top-level pytest | $(find tests -maxdepth 1 -name 'test_*.py' -type f | wc -l) |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Run locally: \`just test\`" >> "$GITHUB_STEP_SUMMARY"
