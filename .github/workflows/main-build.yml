name: Unified Build
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  # Scheduled builds always run all variants/flavors on Tuesday at 1am UTC
  schedule:
    - cron: "0 1 * * TUE"
  workflow_dispatch:
    inputs:
      variant:
        description: 'Image variant (all, yellowfin, albacore, skipjack, bonito)'
        default: 'all'
        type: string
      flavor:
        description: 'Flavor (all, base, gnome, kde, niri, etc.)'
        default: 'all'
        type: string

jobs:
  get_variants:
    name: Determine Build Variants
    runs-on: ubuntu-24.04
    outputs:
      variants: ${{ steps.get_variants.outputs.variants }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Parse variants from build-config.yml
        id: get_variants
        run: |
          FILTER_VARIANT="${{ inputs.variant || 'all' }}"

          # If a specific variant is requested (and it's not 'all'), output that one
          if [[ "$FILTER_VARIANT" != "all" ]]; then
            # Verify the requested variant is valid just to be safe
            VALID_VARIANTS=$(yq -r '.variants[].id' .github/build-config.yml | tr '\n' ' ')
            variant_pattern=" $FILTER_VARIANT "
            if [[ ! " $VALID_VARIANTS " =~ $variant_pattern ]]; then
              echo "Error: Invalid variant '$FILTER_VARIANT'."
              exit 1
            fi
            echo "variants=[\"$FILTER_VARIANT\"]" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Otherwise, extract all variant IDs from build-config.yml into a JSON array
          VARIANTS_JSON=$(yq -o=json '.' .github/build-config.yml | jq -c '[.variants[].id]')
          echo "variants=${VARIANTS_JSON}" >> $GITHUB_OUTPUT

  build_variants:
    name: ${{ matrix.variant }} Pipeline
    needs: get_variants
    strategy:
      fail-fast: false
      matrix:
        variant: ${{ fromJson(needs.get_variants.outputs.variants) }}
    uses: ./.github/workflows/build-variant.yml
    with:
      variant: ${{ matrix.variant }}
      flavor: ${{ inputs.flavor || 'all' }}
    secrets: inherit
