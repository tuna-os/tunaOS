name: Unified Build
on:
  pull_request:
    branches:
      - main
  # Scheduled builds always run all variants/flavors on Tuesday at 1am UTC
  schedule:
    - cron: "0 1 * * TUE"
  workflow_dispatch:
    inputs:
      variant:
        description: 'Image variant (all, yellowfin, albacore, skipjack, bonito)'
        default: 'all'
        type: string
      flavor:
        description: 'Flavor (all, gnome, kde, niri, etc.)'
        default: 'all'
        type: string

jobs:
  generate_matrix:
    runs-on: ubuntu-latest
    outputs:
      image_matrix: ${{ steps.set-matrix.outputs.image_matrix }}
      artifact_matrix: ${{ steps.set-matrix.outputs.artifact_matrix }}
      artifact_count: ${{ steps.set-matrix.outputs.artifact_count }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Build Environment
        uses: ./.github/actions/setup-build-env

      # Fix #1: Inputs are passed via env vars to prevent shell injection.
      # Never interpolate ${{ inputs.* }} directly inside a run script body.
      - name: Validate Inputs
        env:
          FILTER_VARIANT: ${{ inputs.variant || 'all' }}
          FILTER_FLAVOR: ${{ inputs.flavor || 'all' }}
        run: |
          VALID_VARIANTS="all yellowfin albacore skipjack bonito"
          VALID_FLAVORS="all gnome gnome-hwe gnome-gdx gnome-gdx-hwe kde kde-hwe kde-gdx niri niri-hwe niri-gdx"

          if [[ ! " $VALID_VARIANTS " =~ " $FILTER_VARIANT " ]]; then
            echo "::error::Invalid variant '$FILTER_VARIANT'. Must be one of: $VALID_VARIANTS"
            exit 1
          fi

          if [[ ! " $VALID_FLAVORS " =~ " $FILTER_FLAVOR " ]]; then
            echo "::error::Invalid flavor '$FILTER_FLAVOR'. Must be one of: $VALID_FLAVORS"
            exit 1
          fi

      # Fix #1 (continued): All inputs consumed as env vars, not interpolated into script.
      # Fix #5: Normalize missing build_iso/build_qcow2 to false via // false in jq.
      # Fix #3: Emit artifact_count separately for a reliable empty-check.
      - name: Generate Matrix
        id: set-matrix
        env:
          FILTER_VARIANT: ${{ inputs.variant || 'all' }}
          FILTER_FLAVOR: ${{ inputs.flavor || 'all' }}
        run: |
          FULL_MATRIX=$(yq -o=json '.' .github/build-config.yml | jq -c '
            .variants[]
            | select(env.FILTER_VARIANT == "all" or .id == env.FILTER_VARIANT)
            | {variant: .id, description: .description, platforms: .platforms, builder_distro: .builder_distro, flavor: .flavors[]}
          ' | jq -c -s '
            map(select(env.FILTER_FLAVOR == "all" or .flavor.id == env.FILTER_FLAVOR))
          ')

          # Matrix for image building
          IMAGE_MATRIX=$(echo "$FULL_MATRIX" | jq -c '{
            include: map({
              variant: .variant,
              flavor: .flavor.id,
              platforms: (.platforms | join(","))
            })
          }')
          echo "image_matrix=$IMAGE_MATRIX" >> $GITHUB_OUTPUT

          # Fix #5: Normalize null build_iso / build_qcow2 to false.
          # Fix #4: artifact_matrix now includes both iso and qcow2 flags so
          #         the build_artifacts job can act on both.
          # Fix #6: builder_distro comes from config, not hardcoded workflow logic.
          ARTIFACT_MATRIX=$(echo "$FULL_MATRIX" | jq -c '{
            include: map(
              {
                variant: .variant,
                flavor: .flavor.id,
                build_iso: (.flavor.build_iso // false),
                build_qcow2: (.flavor.build_qcow2 // false),
                builder_distro: .builder_distro,
                platform: "linux/amd64"
              }
              | select(.build_iso == true or .build_qcow2 == true)
            )
          }')
          echo "artifact_matrix=$ARTIFACT_MATRIX" >> $GITHUB_OUTPUT

          # Fix #3: Emit a count for a reliable non-empty check in job conditions.
          ARTIFACT_COUNT=$(echo "$ARTIFACT_MATRIX" | jq '.include | length')
          echo "artifact_count=$ARTIFACT_COUNT" >> $GITHUB_OUTPUT

  build_images:
    name: Build ${{ matrix.variant }}:${{ matrix.flavor }}
    needs: generate_matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate_matrix.outputs.image_matrix) }}
    uses: ./.github/workflows/reusable-build-image.yml
    with:
      image-name: ${{ matrix.variant }}-${{ matrix.flavor }}
      image-variant: ${{ matrix.variant }}
      flavor: ${{ matrix.flavor }}
      platforms: ${{ matrix.platforms }}
      publish: ${{ github.event_name != 'pull_request' }}
    secrets:
      SIGNING_SECRET: ${{ secrets.SIGNING_SECRET }}

  # Fix #2: Renamed job to build_artifacts to reflect it handles both ISO and QCOW2.
  # Fix #3: Condition now uses artifact_count instead of a fragile string comparison.
  # Fix #4: Job now has separate steps for ISO and QCOW2 builds.
  # Fix #6: builder_distro is sourced from matrix (populated from config), not inline ternary.
  build_artifacts:
    name: Artifacts ${{ matrix.variant }}:${{ matrix.flavor }}
    needs: [generate_matrix, build_images]
    if: github.event_name != 'pull_request' && needs.generate_matrix.outputs.artifact_count != '0'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate_matrix.outputs.artifact_matrix) }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Fix #2: isogenerator is a composite action used at step level — valid.
      # Previously this was used correctly at the step level; retained as-is.
      - name: Build ISO
        if: matrix.build_iso == true
        uses: ublue-os/isogenerator@v1
        with:
          image-name: ${{ matrix.variant }}-${{ matrix.flavor }}
          installer-repo: ghcr.io/${{ github.repository_owner }}/${{ matrix.variant }}-${{ matrix.flavor }}:latest
          flatpaks-list: ${{ github.workspace }}/system_files/etc/ublue-os/system-flatpaks.list
          hook-post-rootfs: ${{ github.workspace }}/iso_files/configure_lts_iso_anaconda.sh
          # Fix #6: builder_distro is now a config field, not a hardcoded ternary.
          builder-distro: ${{ matrix.builder_distro }}

      # Fix #4: QCOW2 builds are now actually executed (were silently skipped before).
      - name: Build QCOW2
        if: matrix.build_qcow2 == true
        uses: ublue-os/qcow2generator@v1
        with:
          image-name: ${{ matrix.variant }}-${{ matrix.flavor }}
          installer-repo: ghcr.io/${{ github.repository_owner }}/${{ matrix.variant }}-${{ matrix.flavor }}:latest
          builder-distro: ${{ matrix.builder_distro }}
