name: Watch Aurora Upstream

on:
  schedule:
    # Every Monday at 08:00 UTC (before the boot report at 09:00)
    - cron: '0 8 * * 1'
  workflow_dispatch:
    inputs:
      lookback_days:
        description: 'How many days back to look for commits'
        required: false
        default: '7'
        type: number

jobs:
  scan:
    name: Find new Zirconium commits
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: read
    outputs:
      matrix: ${{ steps.find.outputs.matrix }}
      count: ${{ steps.find.outputs.count }}
    steps:
      - name: Ensure labels exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          gh label create "upstream-aurora" \
            --repo "$REPO" \
            --description "Ported from ublue-os/aurora" \
            --color "8B5CF6" 2>/dev/null || true
          gh label create "gemini-port" \
            --repo "$REPO" \
            --description "PR generated by Gemini CLI" \
            --color "10B981" 2>/dev/null || true

      - name: Find unprocessed commits
        id: find
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          LOOKBACK_DAYS: ${{ inputs.lookback_days || '7' }}
        run: |
          SINCE=$(date -u -d "${LOOKBACK_DAYS} days ago" +%Y-%m-%dT%H:%M:%SZ)
          echo "Scanning zirconium commits since $SINCE"

          ALL=$(gh api "/repos/ublue-os/aurora/commits?since=${SINCE}&per_page=100" \
            --jq '[.[] |
              select(.commit.author.name != "renovate[bot]") |
              select(.commit.message | test("^(chore\\(deps\\)|ci:|docs:)") | not) |
              {
                sha: .sha,
                short_sha: .sha[:8],
                subject: (.commit.message | split("\n")[0]),
                author: .commit.author.name,
                date: .commit.author.date,
                url: .html_url
              }
            ]')

          # Filter out commits that already have a PR or branch
          FILTERED='[]'
          while IFS= read -r item; do
            SHORT_SHA=$(echo "$item" | jq -r '.short_sha')
            EXISTING=$(gh pr list \
              --repo "$REPO" \
              --search "head:aurora-port/${SHORT_SHA}" \
              --state all \
              --json number --jq 'length' 2>/dev/null || echo "0")
            if [[ "$EXISTING" == "0" ]]; then
              FILTERED=$(echo "$FILTERED" | jq ". + [$item]")
            else
              echo "  Already has PR: $SHORT_SHA"
            fi
          done < <(echo "$ALL" | jq -c '.[]')

          COUNT=$(echo "$FILTERED" | jq 'length')
          MATRIX=$(echo "$FILTERED" | jq -c '{include: .}')

          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "Found $COUNT new commits to process"

  port:
    name: Port ${{ matrix.short_sha }}
    needs: scan
    if: needs.scan.outputs.count != '0'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix: ${{ fromJson(needs.scan.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create branch
        run: git checkout -b "aurora-port/${{ matrix.short_sha }}"

      - name: Fetch diff and write task for Gemini
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ matrix.sha }}
          SHORT_SHA: ${{ matrix.short_sha }}
          SUBJECT: ${{ matrix.subject }}
          AUTHOR: ${{ matrix.author }}
          DATE: ${{ matrix.date }}
          URL: ${{ matrix.url }}
          PROMPT_FILE: .github/prompts/aurora-port.md
        run: |
          COMMIT_JSON=$(gh api "/repos/ublue-os/aurora/commits/${SHA}")
          FULL_MSG=$(echo "$COMMIT_JSON" | jq -r '.commit.message')
          DIFF=$(echo "$COMMIT_JSON" | jq -r '
            .files |
            map("### " + .filename + "\n```diff\n" + (.patch // "(binary or no diff)") + "\n```") |
            join("\n\n")
          ')
          export FULL_MSG DIFF
          mkdir -p .github/upstream-notes
          python3 .github/scripts/write-gemini-task.py

      - name: Run Gemini to port the change
        uses: google-github-actions/run-gemini-cli@v0.1.21
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          prompt: >
            Read GEMINI_TASK.md in the repository root for your complete task and follow the
            instructions there exactly. The task is to port an upstream kde commit from
            ublue-os/aurora into this TunaOS repository. The porting guide and commit
            diff are both in GEMINI_TASK.md. Do not create a PR — just make changes and commit.

      - name: Push branch and open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ matrix.sha }}
          SHORT_SHA: ${{ matrix.short_sha }}
          SUBJECT: ${{ matrix.subject }}
          URL: ${{ matrix.url }}
        run: |
          # Check if Gemini actually made any changes
          if git diff --quiet HEAD; then
            echo "No changes committed by Gemini — skipping PR"
            exit 0
          fi

          git push origin "aurora-port/${SHORT_SHA}"

          PR_BODY=$(printf '%s' \
            "## Automated port from [ublue-os/aurora](https://github.com/ublue-os/aurora)" \
            $'\n\n' \
            "**Upstream commit**: [\`${SHORT_SHA}\`](${URL})" \
            $'\n' \
            "**Subject**: ${SUBJECT}" \
            $'\n\n' \
            "This PR was generated by Gemini CLI. Please review the changes carefully before merging." \
            $'\n\n' \
            "### Review checklist" \
            $'\n' \
            "- [ ] Packages are appropriate for both Fedora and EL10 builds" \
            $'\n' \
            "- [ ] Config files are placed in the correct \`system_files_overrides/niri/\` path" \
            $'\n' \
            "- [ ] No zirconium-specific branding or signing keys were imported" \
            $'\n' \
            "- [ ] \`just fix && just check\` passes" \
          )

          gh pr create \
            --repo "$REPO" \
            --base main \
            --head "aurora-port/${SHORT_SHA}" \
            --title "⬆️ [zirconium port] ${SUBJECT} (${SHORT_SHA})" \
            --label "upstream-aurora,gemini-port" \
            --body "$PR_BODY"
