---
name: Watch Aurora Upstream

# Aurora is Fedora-only KDE. Catch-up flows into build_scripts/kde.sh and
# system_files_overrides/kde/. Thin caller of the shared workflow; all
# logic lives in .github/workflows/watch-upstream.yml.

"on":
  schedule:
    # Every Monday at 08:00 UTC (before the boot report at 09:00)
    - cron: '0 8 * * 1'
  workflow_dispatch:
    inputs:
      lookback_days:
        description: 'How many days back to look for commits'
        required: false
        default: '7'
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  watch:
    uses: ./.github/workflows/watch-upstream.yml
    with:
      upstream_repo: ublue-os/aurora
      upstream_pretty: Aurora
      branch_prefix: aurora-port
      label: upstream-aurora
      flavor: kde
      build_script: build_scripts/kde.sh
      overrides_dir: system_files_overrides/kde
      prompt_file: .github/prompts/aurora-port.md
      lookback_days: ${{ inputs.lookback_days || '7' }}
    secrets:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      COPILOT_PAT: ${{ secrets.COPILOT_PAT }}
