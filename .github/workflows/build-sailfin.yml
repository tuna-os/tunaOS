name: Build Sailfin [experimental]
on:
  workflow_dispatch:
    inputs:
      flavor:
        description: 'Flavor (all, base, gnome, kde, niri, etc.)'
        default: 'all'
        type: string

concurrency:
  group: build-sailfin-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: 🦈-sailfin
    uses: ./.github/workflows/build-variant.yml
    with:
      variant: 'sailfin'
      flavor: ${{ inputs.flavor || 'all' }}
    secrets:
      SIGNING_SECRET: ${{ secrets.SIGNING_SECRET }}
