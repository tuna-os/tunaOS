---
name: Watch upstream (reusable)

# Reusable workflow consolidating the three previously-duplicated
# watch-aurora.yml / watch-bluefin-lts.yml / watch-zirconium.yml files.
# Each of those is now a ~20-line caller passing its specific upstream
# slug + flavor mapping.
#
# Job graph:
#   scan         — list recent commits, filter chore/CI/merge noise,
#                  drop ones that already have a port PR
#   port         — per-commit Gemini port + branch push + PR open
#   port-copilot — bundle remaining unported commits into one Copilot
#                  agent issue (best-effort; degrades cleanly when
#                  COPILOT_PAT is missing/invalid, per
#                  .github/scripts/fire-copilot-batch.py)

"on":
  workflow_call:
    inputs:
      upstream_repo:
        description: 'Upstream owner/repo slug (e.g. ublue-os/aurora)'
        required: true
        type: string
      upstream_pretty:
        description: 'Display name for the upstream (e.g. Aurora)'
        required: true
        type: string
      branch_prefix:
        description: 'Prefix for the port branches (e.g. aurora-port)'
        required: true
        type: string
      label:
        description: 'Issue label applied to opened PRs (e.g. upstream-aurora)'
        required: true
        type: string
      flavor:
        description: 'Build flavor this upstream maps to (e.g. kde, gnome, niri)'
        required: true
        type: string
      build_script:
        description: 'Build script the flavor uses (e.g. build_scripts/kde.sh)'
        required: true
        type: string
      overrides_dir:
        description: 'Per-flavor overrides dir (e.g. system_files_overrides/kde)'
        required: true
        type: string
      prompt_file:
        description: 'Path to the Gemini porting prompt for this upstream'
        required: true
        type: string
      lookback_days:
        description: 'How many days back to scan for commits'
        required: false
        default: '7'
        type: string

jobs:
  scan:
    name: Find new ${{ inputs.upstream_pretty }} commits
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: read
    outputs:
      matrix: ${{ steps.find.outputs.matrix }}
      count: ${{ steps.find.outputs.count }}
    steps:
      - name: Ensure labels exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          gh label create "${{ inputs.label }}" \
            --repo "$REPO" \
            --description "Ported from ${{ inputs.upstream_repo }}" \
            --color "8B5CF6" 2>/dev/null || true
          gh label create "gemini-port" \
            --repo "$REPO" \
            --description "PR generated by Gemini CLI" \
            --color "10B981" 2>/dev/null || true

      - name: Find unprocessed commits
        id: find
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          LOOKBACK_DAYS: ${{ inputs.lookback_days }}
          UPSTREAM_REPO: ${{ inputs.upstream_repo }}
          BRANCH_PREFIX: ${{ inputs.branch_prefix }}
        run: |
          SINCE=$(date -u -d "${LOOKBACK_DAYS} days ago" +%Y-%m-%dT%H:%M:%SZ)
          echo "Scanning ${UPSTREAM_REPO} commits since $SINCE"

          ALL=$(gh api "/repos/${UPSTREAM_REPO}/commits?since=${SINCE}&per_page=100" \
            --jq '[.[] |
              select(.commit.author.name != "renovate[bot]") |
              # Skip commits that obviously do not apply to TunaOS so we do not
              # a Gemini call on them. Catches:
              #   - non-code conventional-commit types: chore/docs/style/build/test/revert/ci
              #     (with or without a scope), e.g. `chore(ci):`, `docs:`, `build(deps):`
              #   - code-type commits whose scope is CI/release/deps/etc., e.g.
              #     `fix(ci):`, `fix(workflow):`, `feat(release):`
              #   - merge commits (the underlying changes already arrive as
              #     individual commits in the same window)
              select(.commit.message | test("^(chore|docs|style|build|test|revert|ci)(\\([^)]+\\))?:") | not) |
              select(.commit.message | test("^(fix|feat|perf|refactor)\\((ci|deps|actions|workflow|workflows|github|release|readme|version|deps-dev)\\):") | not) |
              select(.commit.message | test("^Merge (pull request|branch|remote-tracking branch|tag)") | not) |
              {
                sha: .sha,
                short_sha: .sha[:8],
                subject: (.commit.message | split("\n")[0]),
                author: .commit.author.name,
                date: .commit.author.date,
                url: .html_url
              }
            ]')

          # Filter out commits that already have a PR or branch
          FILTERED='[]'
          while IFS= read -r item; do
            SHORT_SHA=$(echo "$item" | jq -r '.short_sha')
            EXISTING=$(gh pr list \
              --repo "$REPO" \
              --search "head:${BRANCH_PREFIX}/${SHORT_SHA}" \
              --state all \
              --json number --jq 'length' 2>/dev/null || echo "0")
            if [[ "$EXISTING" == "0" ]]; then
              FILTERED=$(echo "$FILTERED" | jq ". + [$item]")
            else
              echo "  Already has PR: $SHORT_SHA"
            fi
          done < <(echo "$ALL" | jq -c '.[]')

          COUNT=$(echo "$FILTERED" | jq 'length')
          # Cap to 3 per run to stay within API quotas
          FILTERED=$(echo "$FILTERED" | jq '.[0:3]')
          MATRIX=$(echo "$FILTERED" | jq -c '{include: .}')

          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "Found $COUNT new commits to process"

  port:
    name: Port ${{ matrix.short_sha }}
    needs: scan
    if: needs.scan.outputs.count != '0'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix: ${{ fromJson(needs.scan.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create branch
        run: git checkout -b "${{ inputs.branch_prefix }}/${{ matrix.short_sha }}"

      - name: Fetch diff and write task for Gemini
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ matrix.sha }}
          SHORT_SHA: ${{ matrix.short_sha }}
          SUBJECT: ${{ matrix.subject }}
          AUTHOR: ${{ matrix.author }}
          DATE: ${{ matrix.date }}
          URL: ${{ matrix.url }}
          UPSTREAM_REPO: ${{ inputs.upstream_repo }}
          PROMPT_FILE: ${{ inputs.prompt_file }}
          BUILD_SCRIPT: ${{ inputs.build_script }}
          OVERRIDES_DIR: ${{ inputs.overrides_dir }}
        run: |
          COMMIT_JSON=$(gh api "/repos/${UPSTREAM_REPO}/commits/${SHA}")
          FULL_MSG=$(echo "$COMMIT_JSON" | jq -r '.commit.message')
          DIFF=$(echo "$COMMIT_JSON" | jq -r '
            .files |
            map("### " + .filename + "\n```diff\n" + (.patch // "(binary or no diff)") + "\n```") |
            join("\n\n")
          ')
          export FULL_MSG DIFF
          mkdir -p .github/upstream-notes
          python3 .github/scripts/write-gemini-task.py

      - name: Check EL10 package availability
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHORT_SHA: ${{ matrix.short_sha }}
          URL: ${{ matrix.url }}
          UPSTREAM_REPO: ${{ inputs.upstream_repo }}
          FLAVOR: ${{ inputs.flavor }}
        run: python3 .github/scripts/check-el10-packages.py

      - name: Run Gemini to port the change
        id: gemini
        continue-on-error: true
        uses: google-github-actions/run-gemini-cli@f77273f4c914e4bf38440cf36a0369cb64a37489 # v0.1.22
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          gemini_model: gemini-2.5-flash
          prompt: >
            Read GEMINI_TASK.md in the repository root for your complete task and follow the
            instructions there exactly. The task is to port an upstream ${{ inputs.flavor }}
            commit from ${{ inputs.upstream_repo }} into this TunaOS repository. The porting
            guide and commit diff are both in GEMINI_TASK.md. Do not create a PR — just
            make changes and commit.

      - name: Push branch and open PR
        if: steps.gemini.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ matrix.sha }}
          SHORT_SHA: ${{ matrix.short_sha }}
          SUBJECT: ${{ matrix.subject }}
          URL: ${{ matrix.url }}
          UPSTREAM_REPO: ${{ inputs.upstream_repo }}
          BRANCH_PREFIX: ${{ inputs.branch_prefix }}
          LABEL: ${{ inputs.label }}
          FLAVOR: ${{ inputs.flavor }}
          OVERRIDES_DIR: ${{ inputs.overrides_dir }}
          UPSTREAM_PRETTY: ${{ inputs.upstream_pretty }}
        run: |
          if git diff --quiet HEAD; then
            echo "No changes committed — skipping PR"
            exit 0
          fi

          git push origin "${BRANCH_PREFIX}/${SHORT_SHA}"

          PR_BODY=$(printf '%s' \
            "## Automated port from [${UPSTREAM_REPO}](https://github.com/${UPSTREAM_REPO})" \
            $'\n\n' \
            "**Upstream commit**: [\`${SHORT_SHA}\`](${URL})" \
            $'\n' \
            "**Subject**: ${SUBJECT}" \
            $'\n' \
            "**Generated by**: Gemini CLI" \
            $'\n\n' \
            "Please review the changes carefully before merging." \
            $'\n\n' \
            "### Review checklist" \
            $'\n' \
            "- [ ] Packages are appropriate for the relevant build (upstream may be Fedora-only)" \
            $'\n' \
            "- [ ] Config files are placed in the correct \`${OVERRIDES_DIR}/\` path" \
            $'\n' \
            "- [ ] No upstream-specific branding or signing keys were imported" \
            $'\n' \
            "- [ ] \`just fix && just check\` passes" \
          )

          gh pr create \
            --repo "$REPO" \
            --base main \
            --head "${BRANCH_PREFIX}/${SHORT_SHA}" \
            --title "⬆️ [${UPSTREAM_PRETTY} port] ${SUBJECT} (${SHORT_SHA})" \
            --label "${LABEL},gemini-port" \
            --body "$PR_BODY"

  port-copilot:
    name: Batch unported commits to Copilot agent
    needs: [scan, port]
    if: always() && needs.scan.outputs.count != '0'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Bundle unported commits and fire Copilot agent
        env:
          GH_TOKEN: ${{ secrets.COPILOT_PAT }}
          REPO: ${{ github.repository }}
          MATRIX: ${{ needs.scan.outputs.matrix }}
          BRANCH_PREFIX: ${{ inputs.branch_prefix }}
          PROMPT_FILE: ${{ inputs.prompt_file }}
          UPSTREAM_REPO: ${{ inputs.upstream_repo }}
          FLAVOR: ${{ inputs.flavor }}
          BUILD_SCRIPT: ${{ inputs.build_script }}
          OVERRIDES_DIR: ${{ inputs.overrides_dir }}
          LABEL: ${{ inputs.label }}
        run: python3 .github/scripts/fire-copilot-batch.py
