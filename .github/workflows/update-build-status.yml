name: Update README build status

on:
  workflow_dispatch:
  schedule:
    # Nightly variant builds start around 04:00 UTC and can take several hours.
    - cron: '30 13 * * *'

permissions:
  actions: read
  contents: write

concurrency:
  group: update-readme-build-status
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install yq
        run: |
          sudo wget -qO /usr/bin/yq https://github.com/mikefarah/yq/releases/download/v4.53.3/yq_linux_amd64
          sudo chmod +x /usr/bin/yq

      - name: Refresh build status table
        env:
          GH_TOKEN: ${{ github.token }}
        run: .github/scripts/update-build-status.sh

      - name: Commit changed snapshot
        run: |
          if git diff --quiet -- README.md; then
            echo 'Build status is unchanged.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add README.md
          git commit -m 'docs: refresh build matrix status [skip ci]'
          git push

