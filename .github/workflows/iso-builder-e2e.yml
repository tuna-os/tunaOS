# E2E for the browser ISO builder: Playwright drives the real WASM
# engine (real registry pulls through the relay). The walkthrough
# screenshots double as the user-guide imagery — the artifact from this
# workflow is what docs/iso-builder-guide.md embeds; refresh via the
# workflow_dispatch and commit the artifact when the UI changes.
name: ISO Builder E2E

on:
  pull_request:
    paths:
      - 'prototype/iso-builder/**'
      - '.github/workflows/iso-builder-e2e.yml'
  workflow_dispatch:
    inputs:
      full:
        description: 'Also run the full in-browser ISO build + QEMU boot proof'
        type: boolean
        default: false
  schedule:
    # Weekly: the app talks to live infrastructure (relay, GHCR) that
    # can drift under it.
    - cron: '40 5 * * 1'

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: install deps + chromium
        working-directory: prototype/iso-builder/e2e
        run: |
          npm ci || npm install --no-audit --no-fund
          npx playwright install --with-deps chromium

      - name: run e2e (inspect flow, real network)
        working-directory: prototype/iso-builder/e2e
        run: npx playwright test --grep-invert @full

      - name: upload walkthrough screenshots
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: iso-builder-walkthrough
          path: docs/iso-builder/
          if-no-files-found: warn

  # The definitive proof, on demand: the browser (headless, on the runner)
  # pulls the image, authors the ISO in WASM, and the artifact must boot
  # in QEMU through the tbox live path to a login prompt. Runs in CI only
  # — the multi-GB pull + build churn is too much for dev laptops.
  full-build-boot:
    if: github.event_name == 'workflow_dispatch' && inputs.full
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # main as of 2026-06-09
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: false

      - name: install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends qemu-system-x86 ovmf podman
          cd prototype/iso-builder/e2e
          npm ci || npm install --no-audit --no-fund
          npx playwright install --with-deps chromium

      - name: build tbox initramfs from the image
        run: |
          git clone --depth 1 https://github.com/tuna-os/tacklebox /tmp/tacklebox
          sudo podman run --rm             -v /tmp/tacklebox/src/dracut/90tbox-live:/usr/lib/dracut/modules.d/90tbox-live:ro             -v /tmp/tacklebox/src/dracut/95tbox-root:/usr/lib/dracut/modules.d/95tbox-root:ro             -v "$PWD/prototype/iso-builder/app:/out"             ghcr.io/tuna-os/sailfin:base sh -c             'kver=$(ls /usr/lib/modules | head -1); dracut --force --no-hostonly --reproducible --add "tbox-live tbox-root" --kver "$kver" /out/initramfs-sailfin-tbox.img'
          sudo chown "$(id -u)" prototype/iso-builder/app/initramfs-sailfin-tbox.img

      - name: full in-browser build
        working-directory: prototype/iso-builder/e2e
        env:
          TBOX_E2E_FULL: '1'
          TBOX_E2E_KEEP: '1'
          TBOX_E2E_INITRD_URL: http://127.0.0.1:8931/initramfs-sailfin-tbox.img
          TBOX_E2E_ISO_OUT: ${{ github.workspace }}/browser-e2e.iso
          TBOX_E2E_ISO_COPY: ${{ runner.temp }}/browser-e2e.iso
        run: |
          npx playwright test --grep @full
          ls -la "${{ runner.temp }}/browser-e2e.iso"

      - name: boot the browser-built ISO (QEMU/OVMF, tbox live path)
        run: |
          chmod +x /tmp/tacklebox/scripts/test-live-boot.sh
          sudo /tmp/tacklebox/scripts/test-live-boot.sh "${{ runner.temp }}/browser-e2e.iso" 900

      - name: upload evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: browser-iso-boot-evidence
          path: |
            qemu-live-boot.log
            docs/iso-builder/05-building.png
            docs/iso-builder/06-done.png
          if-no-files-found: warn
