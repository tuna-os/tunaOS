name: LUKS E2E

# Full disk-encryption end-to-end test for every variant x desktop-flavor
# combo that has a published image (build_image — so image-only variants like
# sailfin, which the browser builder makes ISOs from, are covered too, not
# just build_iso). For each cell we build a *dev* ISO (ENABLE_SSHD=1 — the live
# env needs SSH to drive the install), then scripts/iso-e2e.sh --luks:
#   1. boots the live ISO under QEMU with an emulated TPM 2.0 (swtpm),
#   2. installs via fisherman (the same backend every TunaOS installer
#      frontend uses) with a recipe.json requesting encryption.type=tpm2-luks,
#   3. reboots the installed disk with the *same* TPM and confirms the
#      encrypted root auto-unlocks (reaching the login target proves it).
#
# This is expensive (a dev ISO build + two QEMU boots per cell), so it only
# runs on demand or monthly — never per push. Modelled on iso-e2e.yml and
# projectbluefin/dakota-iso's luks-*-qemu recipes.

on:
  workflow_dispatch:
    inputs:
      variant:
        description: "Variant filter (or 'all')"
        required: false
        default: "all"
        type: string
      flavor:
        description: "Flavor filter (or 'all')"
        required: false
        default: "all"
        type: string
  schedule:
    # Full variant x installable-desktop sweep on the first day of each month.
    - cron: "0 7 1 * *"

permissions:
  contents: read
  packages: read

jobs:
  # Build the {variant, flavor} matrix from build-config.yml (every variant x
  # desktop flavor with a published image), narrowed by the dispatch filters.
  generate-matrix:
    name: Generate matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install yq
        run: |
          sudo curl -fsSL -o /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Generate matrix
        id: gen
        env:
          FILTER_VARIANT: ${{ inputs.variant || 'all' }}
          FILTER_FLAVOR: ${{ inputs.flavor || 'all' }}
        run: |
          set -euo pipefail
          json="$(yq -o=json '.' .github/build-config.yml)"
          # Every variant x desktop flavor that has a published image
          # (build_image, NOT build_iso): the browser ISO builder makes ISOs
          # from any image, so image-only variants (sailfin, guppy,
          # flounder-sid) need boot+install coverage too. Restrict to the
          # plain desktop tags (gnome/kde/cosmic/niri/xfce) — -nvidia takes
          # the identical LUKS path in headless QEMU (no GPU), and base has no
          # graphical login target to gate on.
          matrix="$(echo "$json" | jq -c \
            --arg fv "$FILTER_VARIANT" --arg ff "$FILTER_FLAVOR" \
            '{include: [ .variants[] | .id as $v | .flavors[]
               | select(.build_image == true)
               | select(.id | test("^(gnome|kde|cosmic|niri|xfce)$"))
               | {variant: $v, flavor: .id}
               | select($fv == "all" or .variant == $fv)
               | select($ff == "all" or .flavor == $ff) ]}')"
          count="$(echo "$matrix" | jq '.include | length')"
          echo "Matrix has ${count} cell(s)"
          echo "$matrix" | jq .
          if [[ "$count" -eq 0 ]]; then
            echo "::error::No matching variant/flavor cells"
            exit 1
          fi
          echo "matrix=${matrix}" >> "$GITHUB_OUTPUT"

          # Keep the scheduled coverage auditable. A variant with no desktop
          # image cannot be exercised by this ISO-based E2E; list it
          # explicitly instead of silently dropping it.
          {
            echo "## LUKS E2E coverage"
            echo
            echo "Testing **${count}** installable variant/flavor combinations."
            echo
            echo "| Base variant | ISO desktop flavors |"
            echo "|---|---|"
            echo "$json" | jq -r '
              .variants[]
              | [.id, ([.flavors[] | select(.build_image == true) | select(.id | test("^(gnome|kde|cosmic|niri|xfce)$")) | .id] | join(", "))]
              | select(.[1] != "")
              | "| `\(.[0])` | \(.[1]) |"'
            echo
            echo "### Variants not testable by this workflow"
            echo
            echo "$json" | jq -r '
              [.variants[]
               | select([.flavors[] | select(.build_image == true) | select(.id | test("^(gnome|kde|cosmic|niri|xfce)$"))] | length == 0)
               | "- `\(.id)`: no desktop image (`build_image: true`)"]
              | if length == 0 then "- None" else .[] end'
          } >> "$GITHUB_STEP_SUMMARY"

  luks:
    name: LUKS ${{ matrix.variant }}:${{ matrix.flavor }}
    needs: generate-matrix
    runs-on: ubuntu-24.04
    # 90 min was sized for the old local-only bootc install (no network
    # pull). fisherman now does a full image pull over the QEMU guest's NAT
    # networking (see docs/ci-troubleshooting.md §4 bug #19) — slower than a
    # host-level pull — on top of build + boot + install + reboot + boot
    # verification. 150 min gives that real headroom.
    timeout-minutes: 150
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix: ${{ fromJSON(needs.generate-matrix.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      # The dev ISO and install disk are large; reclaim ~25 GB first.
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/boost /opt/hostedtoolcache/CodeQL || true
          df -h /

      - name: Maximize build space
        uses: ublue-os/container-storage-action@dc1f4c8f17b672069e921f001132f7cf98a423a6 # main as of 2026-02-11

      # ubuntu-24.04 exposes /dev/kvm as root:kvm 0660; widen so the QEMU child
      # (and its swtpm) can open it. Without KVM the LUKS boot is far too slow.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | \
            sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm || true
          ls -la /dev/kvm 2>/dev/null && echo "KVM available" || echo "Warning: no /dev/kvm — TCG (slow)"

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            just podman jq \
            qemu-system-x86 qemu-utils ovmf swtpm socat sshpass imagemagick \
            systemd-boot-efi mtools squashfs-tools xorriso dosfstools gdisk

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            podman login ghcr.io -u "${{ github.actor }}" --password-stdin

      # Build a dev (SSHD-enabled) live ISO for this cell. dev=1 wires the
      # liveuser SSH login that iso-e2e.sh --luks drives the install over.
      - name: Build dev ISO
        env:
          VARIANT: ${{ matrix.variant }}
          FLAVOR: ${{ matrix.flavor }}
        run: |
          export TACKLEBOX_FROM_SOURCE=1
          just iso "${VARIANT}" "${FLAVOR}" ghcr "" 1
          ISO=$(find .build -maxdepth 3 -name "*.iso" | head -1)
          [[ -n "$ISO" ]] || { echo "::error::dev ISO not produced"; exit 1; }
          echo "ISO_PATH=${ISO}" >> "$GITHUB_ENV"

      - name: Clone fisherman (under-test)
        run: git clone --depth 1 --branch dev https://github.com/tuna-os/fisherman /tmp/fisherman

      - name: Build fisherman in a golang container
        run: |
          # Build inside golang:1.26 so we avoid the runner's root-owned
          # ~/go and ~/.cache (earlier sudo steps) and the apt Go 1.24 vs
          # fisherman's go.mod (1.26) mismatch entirely.
          GOVER=$(awk '/^go /{print $2; exit}' /tmp/fisherman/fisherman/go.mod)
          sudo podman run --rm -v /tmp/fisherman:/src:z -w /src/fisherman \
            "docker.io/library/golang:${GOVER}" \
            go build -buildvcs=false -o /src/fisherman-bin ./cmd/fisherman
          sudo chown "$(id -u)" /tmp/fisherman/fisherman-bin
          cp /tmp/fisherman/fisherman-bin /tmp/fisherman-bin
          echo "FISHERMAN_OVERRIDE=/tmp/fisherman-bin" >> "$GITHUB_ENV"

      - name: LUKS install + unlock verification
        env:
          VARIANT: ${{ matrix.variant }}
          FLAVOR: ${{ matrix.flavor }}
        run: |
          mkdir -p luks-out
          # -E: sudo resets the environment by default, which drops VARIANT/
          # FLAVOR (env: above) — iso-e2e.sh needs them to build the fisherman
          # recipe's image ref. Without -E it silently falls back to parsing
          # them from the ISO filename, which has a "tunaos-" project prefix
          # the fallback doesn't account for, producing a bogus image ref.
          sudo -E env FISHERMAN_OVERRIDE="$FISHERMAN_OVERRIDE" \
            ./scripts/iso-e2e.sh "${ISO_PATH}" --luks \
            --output luks-out \
            --timeout 1200
          # Gate = encrypted install + passphrase unlock to login. TPM2
          # auto-unlock is a POST-INSTALL step (ujust enable-luks-tpm2), tested
          # separately per docs/LUKS-TPM.md — not asserted at install.
          grep -qx 'TUNAOS_LUKS_E2E_INSTALL_STARTED luks=1' luks-out/luks-evidence.log
          grep -qx 'TUNAOS_LUKS_E2E_ENCRYPTED_DISK_CONFIRMED' luks-out/luks-evidence.log
          grep -qx 'TUNAOS_LUKS_E2E_PASS encrypted=1 passphrase_unlock=1 installed_boot=1' luks-out/luks-evidence.log

      - name: Collect evidence
        if: always()
        run: |
          sudo chown -R "$USER:$(id -gn)" luks-out 2>/dev/null || true
          for ppm in luks-out/*.ppm; do
            [[ -f "$ppm" ]] || continue
            convert "$ppm" "${ppm%.ppm}.png" || true
          done

      - name: Upload LUKS evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: luks-e2e-${{ matrix.variant }}-${{ matrix.flavor }}
          path: |
            luks-out/serial.log
            luks-out/live-serial.log
            luks-out/luks-evidence.log
            luks-out/*.png
          if-no-files-found: warn
          retention-days: 14
