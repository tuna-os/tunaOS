name: Build Live ISOs (bootc-isos)
on:
  workflow_dispatch:
    inputs:
      variant:
        description: 'Variant to build'
        required: true
        default: 'yellowfin'
        type: choice
        options:
          - yellowfin
          - albacore
          - bonito
          - skipjack
      flavor:
        description: 'Flavor to build'
        required: true
        default: 'gnome'
      upload_r2:
        description: 'Upload to R2'
        required: false
        default: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Maximize build space
        uses: ublue-os/container-storage-action@v1

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y just podman jq rclone golang-go

      - name: Build Live ISO
        env:
          UPLOAD_R2: ${{ github.event.inputs.upload_r2 }}
          RCLONE_CONFIG_R2_TYPE: s3
          RCLONE_CONFIG_R2_PROVIDER: Cloudflare
          RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID_2025 }}
          RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY_2025 }}
          RCLONE_CONFIG_R2_REGION: auto
          RCLONE_CONFIG_R2_ENDPOINT: ${{ secrets.R2_ENDPOINT_2025 }}
        run: |
          # First build the image (if not already in registry, but we build it here for safety)
          just build ${{ github.event.inputs.variant }} ${{ github.event.inputs.flavor }} chunk=0

          # Then build the live ISO
          just live-iso ${{ github.event.inputs.variant }} ${{ github.event.inputs.flavor }} local latest

      - name: Install Lima
        run: |
          curl -L https://github.com/lima-vm/lima/releases/download/v0.20.1/lima-0.20.1-Linux-x86_64.tar.gz | sudo tar -C /usr/local -xz
          # Start qemu if needed, but limactl should handle it if qemu is installed
          sudo apt-get install -y qemu-system-x86

      - name: Verify Live ISO
        run: |
          ISO_FILE=$(find . -maxdepth 1 -name "*.iso" | head -n 1)
          just verify-live-iso "$ISO_FILE"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.variant }}-${{ github.event.inputs.flavor }}-live-iso
          path: "*.iso"
