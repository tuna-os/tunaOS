name: Build Live ISOs (bootc-isos)
on:
  workflow_dispatch:
    inputs:
      variant:
        description: 'Variant to build'
        required: true
        default: 'skipjack'
        type: choice
        options:
          - yellowfin
          - albacore
          - bonito
          - skipjack
      flavor:
        description: 'Flavor to build'
        required: true
        default: 'gnome'
        type: string
      upload_r2:
        description: 'Upload to Cloudflare R2'
        required: false
        default: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Maximize build space
        uses: ublue-os/container-storage-action@main

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y just podman jq rclone golang-go git

      - name: Build OS image
        run: |
          sudo just build \
            variant="${{ github.event.inputs.variant }}" \
            flavor="${{ github.event.inputs.flavor }}" \
            is_ci=1 \
            tag="${{ github.event.inputs.flavor }}"

      - name: Build Live ISO
        env:
          UPLOAD_R2: ${{ github.event.inputs.upload_r2 }}
          RCLONE_CONFIG_R2_TYPE: s3
          RCLONE_CONFIG_R2_PROVIDER: Cloudflare
          RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID_2025 }}
          RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY_2025 }}
          RCLONE_CONFIG_R2_REGION: auto
          RCLONE_CONFIG_R2_ENDPOINT: ${{ secrets.R2_ENDPOINT_2025 }}
        run: |
          sudo just live-iso \
            variant="${{ github.event.inputs.variant }}" \
            flavor="${{ github.event.inputs.flavor }}" \
            repo=local \
            tag="${{ github.event.inputs.flavor }}"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.variant }}-${{ github.event.inputs.flavor }}-live-iso
          path: "*.iso"
          if-no-files-found: error
