name: Weekly Boot Screenshot Report

on:
  schedule:
    - cron: "0 10 * * 1" # Every Monday at 10:00 UTC
  workflow_dispatch:

permissions:
  issues: write
  actions: read
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure boot-report label exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create "boot-report" \
            --description "Weekly boot screenshot reports" \
            --color "0075ca" \
            --repo "${{ github.repository }}" 2>/dev/null || true

      - name: Ensure screenshots branch exists
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          if gh api "/repos/${REPO}/git/refs/heads/screenshots" &>/dev/null; then
            echo "Screenshots branch already exists."
            exit 0
          fi
          echo "Creating orphan screenshots branch..."
          TREE_SHA=$(printf '{"tree":[{"path":"README.md","mode":"100644","type":"blob","content":"# Boot Screenshots\\n\\nBoot screenshots captured by CI, committed here so they can be embedded in weekly report issues.\\n"}]}' | \
            gh api --method POST "/repos/${REPO}/git/trees" --input - --jq '.sha')
          COMMIT_SHA=$(gh api --method POST "/repos/${REPO}/git/commits" \
            -f "message=Initialize screenshots branch" \
            -f "tree=${TREE_SHA}" --jq '.sha')
          gh api --method POST "/repos/${REPO}/git/refs" \
            -f "ref=refs/heads/screenshots" \
            -f "sha=${COMMIT_SHA}"
          echo "Screenshots branch created."

      - name: Collect screenshots and create report
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          mkdir -p screenshots

          # Variant/flavor combinations that produce ISO boot screenshots
          COMBOS=(
            "yellowfin gnome"
            "yellowfin gnome-hwe"
            "yellowfin kde"
            "albacore gnome"
            "albacore gnome-hwe"
            "albacore kde"
            "skipjack gnome"
            "bonito gnome"
          )

          # Variant/flavor combinations that produce QCOW2 boot screenshots
          QCOW2_COMBOS=(
            "yellowfin gnome"
            "yellowfin kde"
            "yellowfin niri"
            "yellowfin cosmic"
            "albacore gnome"
            "albacore kde"
            "albacore niri"
            "albacore cosmic"
            "skipjack gnome"
            "skipjack kde"
            "skipjack niri"
            "skipjack cosmic"
            "bonito gnome"
            "bonito kde"
            "bonito niri"
            "bonito cosmic"
          )

          declare -A ISO_DATES ISO_RUN_IDS
          declare -A QCOW2_DATES QCOW2_RUN_IDS

          fetch_screenshot() {
            local KEY="$1" ARTIFACT_NAME="$2" DEST_FILE="$3"

            local ARTIFACT
            ARTIFACT=$(gh api \
              "/repos/${REPO}/actions/artifacts?name=${ARTIFACT_NAME}&per_page=1" \
              --jq '.artifacts[0] // empty')
            [[ -n "$ARTIFACT" ]] || return 1

            local DATE RUN_ID
            DATE=$(echo "$ARTIFACT" | jq -r '.created_at')
            RUN_ID=$(echo "$ARTIFACT" | jq -r '.workflow_run.id')

            local TMP_DIR="screenshots/.dl/${KEY}/${ARTIFACT_NAME}"
            mkdir -p "$TMP_DIR"
            if gh run download "$RUN_ID" --repo "$REPO" --name "$ARTIFACT_NAME" \
                 --dir "$TMP_DIR" 2>/dev/null && [[ -f "$TMP_DIR/screenshot.png" ]]; then
              mv "$TMP_DIR/screenshot.png" "$DEST_FILE"
              echo "DATE=${DATE}"
              echo "RUN_ID=${RUN_ID}"
              return 0
            fi
            return 1
          }

          echo "==> Fetching ISO boot screenshots..."
          for COMBO in "${COMBOS[@]}"; do
            read -r VARIANT FLAVOR <<< "$COMBO"
            KEY="${VARIANT}-${FLAVOR}"
            echo "  -> $KEY (ISO)"
            RESULT=$(fetch_screenshot "$KEY" "${KEY}-boot-screenshot" "screenshots/${KEY}-iso.png" 2>&1) && {
              ISO_DATES[$KEY]=$(echo "$RESULT" | grep '^DATE=' | cut -d= -f2-)
              ISO_RUN_IDS[$KEY]=$(echo "$RESULT" | grep '^RUN_ID=' | cut -d= -f2-)
              echo "     ${ISO_DATES[$KEY]}"
            } || {
              ISO_DATES[$KEY]="N/A"
              ISO_RUN_IDS[$KEY]=""
              echo "     no artifact"
            }
          done

          echo "==> Fetching QCOW2 boot screenshots..."
          for COMBO in "${QCOW2_COMBOS[@]}"; do
            read -r VARIANT FLAVOR <<< "$COMBO"
            KEY="${VARIANT}-${FLAVOR}"
            echo "  -> $KEY (QCOW2)"
            RESULT=$(fetch_screenshot "$KEY" "${KEY}-qcow2-boot-screenshot" "screenshots/${KEY}-qcow2.png" 2>&1) && {
              QCOW2_DATES[$KEY]=$(echo "$RESULT" | grep '^DATE=' | cut -d= -f2-)
              QCOW2_RUN_IDS[$KEY]=$(echo "$RESULT" | grep '^RUN_ID=' | cut -d= -f2-)
              echo "     ${QCOW2_DATES[$KEY]}"
            } || {
              QCOW2_DATES[$KEY]="N/A"
              QCOW2_RUN_IDS[$KEY]=""
              echo "     no artifact"
            }
          done

          # Push screenshots to the screenshots branch via the Contents API.
          # raw.githubusercontent.com URLs render inline in GitHub markdown without auth.
          TODAY=$(date -u +"%Y-%m-%d")
          declare -A ISO_IMG_URLS QCOW2_IMG_URLS

          commit_screenshot() {
            local SRC="$1" PATH_IN_REPO="$2" KEY="$3" TYPE="$4"
            [[ -f "$SRC" ]] || return 1
            echo "==> Committing ${KEY} (${TYPE}) to screenshots branch..."
            local EXISTING_SHA
            EXISTING_SHA=$(gh api "/repos/${REPO}/contents/${PATH_IN_REPO}?ref=screenshots" \
              --jq '.sha' 2>/dev/null || echo "")
            local B64
            B64=$(mktemp)
            base64 -w0 "$SRC" > "$B64"
            jq -n \
              --arg msg "Boot screenshot: ${KEY} ${TYPE} ${TODAY}" \
              --rawfile content "$B64" \
              --arg branch "screenshots" \
              --arg sha "$EXISTING_SHA" \
              'if $sha != "" then
                {message: $msg, content: ($content | rtrimstr("\n")), branch: $branch, sha: $sha}
              else
                {message: $msg, content: ($content | rtrimstr("\n")), branch: $branch}
              end' | \
              gh api --method PUT "/repos/${REPO}/contents/${PATH_IN_REPO}" --input - > /dev/null
            rm "$B64"
          }

          for COMBO in "${COMBOS[@]}"; do
            read -r VARIANT FLAVOR <<< "$COMBO"
            KEY="${VARIANT}-${FLAVOR}"
            ISO_PATH="boot/${TODAY}/${KEY}-iso.png"
            if commit_screenshot "screenshots/${KEY}-iso.png" "$ISO_PATH" "$KEY" "iso"; then
              ISO_IMG_URLS[$KEY]="https://raw.githubusercontent.com/${REPO}/screenshots/${ISO_PATH}"
            fi
          done

          for COMBO in "${QCOW2_COMBOS[@]}"; do
            read -r VARIANT FLAVOR <<< "$COMBO"
            KEY="${VARIANT}-${FLAVOR}"
            QCOW2_PATH="boot/${TODAY}/${KEY}-qcow2.png"
            if commit_screenshot "screenshots/${KEY}-qcow2.png" "$QCOW2_PATH" "$KEY" "qcow2"; then
              QCOW2_IMG_URLS[$KEY]="https://raw.githubusercontent.com/${REPO}/screenshots/${QCOW2_PATH}"
            fi
          done

          # Build the report
          REPORT=$(mktemp)
          printf '# 🖥️ Weekly Boot Screenshot Report\n\n' >> "$REPORT"
          printf '**Generated:** %s\n\n' "$(date -u +"%Y-%m-%d %H:%M UTC")" >> "$REPORT"
          printf 'Each variant shows ISO and QCOW2 boot screenshots side by side.\n\n' >> "$REPORT"
          printf '%s\n\n' '---' >> "$REPORT"

          # Merge ISO and QCOW2 combos, deduplicating while preserving order
          ALL_COMBOS=("${COMBOS[@]}")
          for COMBO in "${QCOW2_COMBOS[@]}"; do
            [[ " ${COMBOS[*]} " != *" ${COMBO} "* ]] && ALL_COMBOS+=("$COMBO")
          done

          SEEN_KEYS=()
          for COMBO in "${ALL_COMBOS[@]}"; do
            read -r VARIANT FLAVOR <<< "$COMBO"
            KEY="${VARIANT}-${FLAVOR}"

            ISO_DATE="${ISO_DATES[$KEY]:-N/A}"
            ISO_RUN="${ISO_RUN_IDS[$KEY]:-}"
            QCOW2_DATE="${QCOW2_DATES[$KEY]:-N/A}"
            QCOW2_RUN="${QCOW2_RUN_IDS[$KEY]:-}"

            fmt_date() { [[ "$1" != "N/A" ]] && date -u -d "$1" +"%Y-%m-%d %H:%M UTC" 2>/dev/null || echo "not available"; }
            ISO_FMT=$(fmt_date "$ISO_DATE")
            QCOW2_FMT=$(fmt_date "$QCOW2_DATE")

            printf $'## `%s` / `%s`\n\n' "$VARIANT" "$FLAVOR" >> "$REPORT"
            printf $'**Image:** `ghcr.io/%s/%s:%s`\n\n' "$REPO_OWNER" "$VARIANT" "$FLAVOR" >> "$REPORT"

            ISO_URL="${ISO_IMG_URLS[$KEY]:-}"
            QCOW2_URL="${QCOW2_IMG_URLS[$KEY]:-}"

            if [[ -n "$ISO_URL" && -n "$QCOW2_URL" ]]; then
              # Both available — show side by side
              ISO_LINK=""
              [[ -n "$ISO_RUN" && "$ISO_RUN" != "null" ]] && ISO_LINK=" ([run](https://github.com/${REPO}/actions/runs/${ISO_RUN}))"
              QCOW2_LINK=""
              [[ -n "$QCOW2_RUN" && "$QCOW2_RUN" != "null" ]] && QCOW2_LINK=" ([run](https://github.com/${REPO}/actions/runs/${QCOW2_RUN}))"

              printf '| **ISO Boot** | **QCOW2 Boot** |\n' >> "$REPORT"
              printf '|:---:|:---:|\n' >> "$REPORT"
              printf '| `%s`%s | `%s`%s |\n' "$ISO_FMT" "$ISO_LINK" "$QCOW2_FMT" "$QCOW2_LINK" >> "$REPORT"
              printf '| ![%s ISO boot](%s) | ![%s QCOW2 boot](%s) |\n\n' \
                "$KEY" "$ISO_URL" "$KEY" "$QCOW2_URL" >> "$REPORT"

            elif [[ -n "$ISO_URL" ]]; then
              ISO_LINK=""
              [[ -n "$ISO_RUN" && "$ISO_RUN" != "null" ]] && ISO_LINK=" ([run](https://github.com/${REPO}/actions/runs/${ISO_RUN}))"
              printf '**ISO Boot:** `%s`%s\n\n' "$ISO_FMT" "$ISO_LINK" >> "$REPORT"
              printf '![%s ISO boot](%s)\n\n' "$KEY" "$ISO_URL" >> "$REPORT"
              printf '_QCOW2 boot screenshot not available._\n\n' >> "$REPORT"

            elif [[ -n "$QCOW2_URL" ]]; then
              QCOW2_LINK=""
              [[ -n "$QCOW2_RUN" && "$QCOW2_RUN" != "null" ]] && QCOW2_LINK=" ([run](https://github.com/${REPO}/actions/runs/${QCOW2_RUN}))"
              printf '_ISO boot screenshot not available._\n\n' >> "$REPORT"
              printf '**QCOW2 Boot:** `%s`%s\n\n' "$QCOW2_FMT" "$QCOW2_LINK" >> "$REPORT"
              printf '![%s QCOW2 boot](%s)\n\n' "$KEY" "$QCOW2_URL" >> "$REPORT"

            else
              printf '_No screenshots available for this build._\n\n' >> "$REPORT"
            fi

            printf '%s\n\n' '---' >> "$REPORT"
          done

          ISSUE_URL=$(gh issue create \
            --repo "$REPO" \
            --title "🖥️ Weekly Boot Report — ${TODAY}" \
            --label "boot-report" \
            --body-file "$REPORT")
          echo "==> Report complete: ${ISSUE_URL}"
