name: Weekly Boot Screenshot Report

on:
  schedule:
    - cron: "0 10 * * 1" # Every Monday at 10:00 UTC
  workflow_dispatch:

permissions:
  issues: write
  actions: read
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure boot-report label exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create "boot-report" \
            --description "Weekly boot screenshot reports" \
            --color "0075ca" \
            --repo "${{ github.repository }}" 2>/dev/null || true

      - name: Ensure screenshots branch exists
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          if gh api "/repos/${REPO}/git/refs/heads/screenshots" &>/dev/null; then
            echo "Screenshots branch already exists."
            exit 0
          fi
          echo "Creating orphan screenshots branch..."
          TREE_SHA=$(echo '{"tree":[]}' | \
            gh api --method POST "/repos/${REPO}/git/trees" --input - --jq '.sha')
          COMMIT_SHA=$(gh api --method POST "/repos/${REPO}/git/commits" \
            -f "message=Initialize screenshots branch" \
            -f "tree=${TREE_SHA}" --jq '.sha')
          gh api --method POST "/repos/${REPO}/git/refs" \
            -f "ref=refs/heads/screenshots" \
            -f "sha=${COMMIT_SHA}"
          echo "Screenshots branch created."

      - name: Collect screenshots and create report
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          mkdir -p screenshots

          # Variant/flavor combinations that produce boot screenshots
          COMBOS=(
            "yellowfin gnome"
            "yellowfin gnome-hwe"
            "albacore gnome"
            "albacore gnome-hwe"
            "skipjack gnome"
            "bonito gnome"
          )

          declare -A ARTIFACT_DATES
          declare -A RUN_IDS

          for COMBO in "${COMBOS[@]}"; do
            read -r VARIANT FLAVOR <<< "$COMBO"
            KEY="${VARIANT}-${FLAVOR}"
            ARTIFACT_NAME="${KEY}-boot-screenshot"

            echo "==> Fetching artifact: $ARTIFACT_NAME"

            ARTIFACT=$(gh api \
              "/repos/${REPO}/actions/artifacts?name=${ARTIFACT_NAME}&per_page=1" \
              --jq '.artifacts[0] // empty')

            if [[ -z "$ARTIFACT" ]]; then
              echo "    No artifact found."
              ARTIFACT_DATES[$KEY]="N/A"
              RUN_IDS[$KEY]=""
              continue
            fi

            ARTIFACT_DATES[$KEY]=$(echo "$ARTIFACT" | jq -r '.created_at')
            RUN_IDS[$KEY]=$(echo "$ARTIFACT" | jq -r '.workflow_run.id')

            echo "    Run: ${RUN_IDS[$KEY]} | Date: ${ARTIFACT_DATES[$KEY]}"

            if gh run download "${RUN_IDS[$KEY]}" \
              --repo "$REPO" \
              --name "$ARTIFACT_NAME" \
              --dir "screenshots/${KEY}/" 2>/dev/null; then
              if [[ -f "screenshots/${KEY}/screenshot.png" ]]; then
                mv "screenshots/${KEY}/screenshot.png" "screenshots/${KEY}.png"
                echo "    Screenshot extracted."
              else
                echo "    screenshot.png not found in artifact."
              fi
            else
              echo "    Failed to download artifact."
            fi
          done

          # Push each screenshot to the screenshots branch via the Contents API.
          # raw.githubusercontent.com URLs are permanently accessible and render
          # inline in GitHub markdown without any authentication.
          TODAY=$(date -u +"%Y-%m-%d")
          declare -A IMG_URLS

          for COMBO in "${COMBOS[@]}"; do
            read -r VARIANT FLAVOR <<< "$COMBO"
            KEY="${VARIANT}-${FLAVOR}"
            SRC="screenshots/${KEY}.png"
            [[ -f "$SRC" ]] || continue

            PATH_IN_REPO="boot/${TODAY}/${KEY}.png"
            echo "==> Committing ${KEY} to screenshots branch..."

            EXISTING_SHA=$(gh api \
              "/repos/${REPO}/contents/${PATH_IN_REPO}?ref=screenshots" \
              --jq '.sha' 2>/dev/null || echo "")

            # Use jq to safely encode the binary content and build the payload
            PAYLOAD=$(jq -n \
              --arg msg "Boot screenshot: ${KEY} ${TODAY}" \
              --arg content "$(base64 -w0 "$SRC")" \
              --arg branch "screenshots" \
              --arg sha "$EXISTING_SHA" \
              'if $sha != "" then
                {message: $msg, content: $content, branch: $branch, sha: $sha}
              else
                {message: $msg, content: $content, branch: $branch}
              end')

            gh api --method PUT "/repos/${REPO}/contents/${PATH_IN_REPO}" \
              --input - <<< "$PAYLOAD" > /dev/null

            IMG_URLS[$KEY]="https://raw.githubusercontent.com/${REPO}/screenshots/${PATH_IN_REPO}"
            echo "    ${IMG_URLS[$KEY]}"
          done

          # Build the report body then create the issue in one shot
          REPORT=$(mktemp)

          printf '# 🖥️ Weekly Boot Screenshot Report\n\n' >> "$REPORT"
          printf '**Generated:** %s\n\n' "$(date -u +"%Y-%m-%d %H:%M UTC")" >> "$REPORT"
          printf 'Scroll through each variant below to verify the desktop loaded correctly.\n\n' >> "$REPORT"
          printf '%s\n\n' '---' >> "$REPORT"

          for COMBO in "${COMBOS[@]}"; do
            read -r VARIANT FLAVOR <<< "$COMBO"
            KEY="${VARIANT}-${FLAVOR}"
            RAW_DATE="${ARTIFACT_DATES[$KEY]:-N/A}"
            RUN_ID="${RUN_IDS[$KEY]:-}"

            if [[ "$RAW_DATE" != "N/A" ]]; then
              FORMATTED_DATE=$(date -u -d "$RAW_DATE" +"%Y-%m-%d %H:%M UTC" 2>/dev/null || echo "$RAW_DATE")
            else
              FORMATTED_DATE="No recent build found"
            fi

            printf $'## `%s` / `%s`\n\n' "$VARIANT" "$FLAVOR" >> "$REPORT"
            printf $'**Image:** `ghcr.io/%s/%s:%s`  \n' "$REPO_OWNER" "$VARIANT" "$FLAVOR" >> "$REPORT"

            if [[ -n "$RUN_ID" && "$RUN_ID" != "null" ]]; then
              printf '**Date:** %s ([workflow run](https://github.com/%s/actions/runs/%s))\n\n' \
                "$FORMATTED_DATE" "$REPO" "$RUN_ID" >> "$REPORT"
            else
              printf '**Date:** %s\n\n' "$FORMATTED_DATE" >> "$REPORT"
            fi

            IMG_URL="${IMG_URLS[$KEY]:-}"
            if [[ -n "$IMG_URL" ]]; then
              printf '![%s boot screenshot](%s)\n\n' "$KEY" "$IMG_URL" >> "$REPORT"
            else
              printf '_No screenshot available for this build._\n\n' >> "$REPORT"
            fi

            printf '%s\n\n' '---' >> "$REPORT"
          done

          ISSUE_URL=$(gh issue create \
            --repo "$REPO" \
            --title "🖥️ Weekly Boot Report — ${TODAY}" \
            --label "boot-report" \
            --body-file "$REPORT")
          echo "==> Report complete: ${ISSUE_URL}"
