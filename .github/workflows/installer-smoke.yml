# Installer GUI smoke (tunaOS#678 phase 1): per-desktop proof that the
# live ISO autologins and the installer frontend actually starts.
#
# For each flavor: build the dev ISO (SSH enabled), boot it under OVMF,
# wait for TUNAOS_LIVE_READY, then over SSH assert the installer process
# is running (flatpak run org.tunaos.Installer* / bootc-installer) and
# capture a desktop screenshot as reviewable evidence.
#
# Phase 2 (per-DE install path) extends the LUKS E2E matrix; phase 3
# (VLM screen assertions) is blocked on a CI-reachable VLM endpoint.
name: Installer Smoke

on:
  workflow_dispatch:
    inputs:
      variant:
        description: "Variant"
        required: false
        default: "yellowfin"
        type: string
      flavors:
        description: "Comma-separated flavors"
        required: false
        default: "kde,cosmic,niri,xfce"
        type: string
  schedule:
    # Weekly, after the Tuesday image builds settle.
    - cron: "0 9 * * 3"

permissions:
  contents: read
  packages: read

jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - id: gen
        env:
          FLAVORS: ${{ inputs.flavors || 'kde,cosmic,niri,xfce' }}
          VARIANT: ${{ inputs.variant || 'yellowfin' }}
        run: |
          M=$(jq -cn --arg v "$VARIANT" --arg f "$FLAVORS" \
            '{include: ($f | split(",") | map({variant: $v, flavor: .}))}')
          echo "matrix=$M" >> "$GITHUB_OUTPUT"
          echo "$M" | jq .

  smoke:
    name: ${{ matrix.variant }}:${{ matrix.flavor }}
    needs: generate-matrix
    runs-on: ubuntu-latest
    timeout-minutes: 75
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          submodules: recursive

      - name: free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # main as of 2026-06-09
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: false

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y just podman jq golang-go git socat imagemagick sshpass tesseract-ocr \
            qemu-system-x86 qemu-utils ovmf \
            systemd-boot-efi xorriso mtools squashfs-tools dosfstools gdisk
          sudo wget -qO /usr/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 && sudo chmod +x /usr/bin/yq

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build dev ISO
        env:
          VARIANT: ${{ matrix.variant }}
          FLAVOR: ${{ matrix.flavor }}
        run: |
          export TACKLEBOX_FROM_SOURCE=1
          just iso "${VARIANT}" "${FLAVOR}" ghcr "" 1
          ISO=$(find .build -maxdepth 3 -name "*.iso" | head -1)
          [[ -n "$ISO" ]] || { echo "::error::dev ISO not produced"; exit 1; }
          echo "ISO_PATH=${ISO}" >> "$GITHUB_ENV"

      - name: Boot live env (SSH mode, keep VM)
        env:
          VARIANT: ${{ matrix.variant }}
          FLAVOR: ${{ matrix.flavor }}
        run: |
          mkdir -p smoke-out
          sudo -E ./scripts/iso-e2e.sh "$ISO_PATH" --ssh-only --keep-vm \
            --timeout 1200 --output smoke-out

      - name: Assert live desktop session + installer frontend
        env:
          FLAVOR: ${{ matrix.flavor }}
        run: |
          SSH="sshpass -p live ssh -p 2222 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null liveuser@127.0.0.1"
          # GROUND TRUTH = the compositor process is actually running. The
          # old check accepted "a wayland socket + any liveuser session",
          # which a bare greetd VT with a stale socket satisfies — so Niri
          # falling through to a TTY still PASSED (run 29645108966: gate
          # green, screenshot showed a black console). pgrep -x the exact
          # compositor binary is the only signal that survives that.
          COMPS="niri xfwl4 cosmic-comp kwin_wayland gnome-shell xfwm4 sway Hyprland labwc wayfire"
          session_ok=0; COMP=""
          for i in $(seq 1 36); do
            COMP=$($SSH "for p in $COMPS; do pgrep -x \"\$p\" >/dev/null 2>&1 && { echo \"\$p\"; break; }; done" 2>/dev/null || true)
            if [ -n "$COMP" ]; then session_ok=1; break; fi
            sleep 10
          done
          if [ "$session_ok" -ne 1 ]; then
            echo "::error::${FLAVOR}: no compositor process running (stuck at greeter or TTY?)"
            echo "--- loginctl / runtime / user manager:"
            $SSH 'loginctl list-sessions; ls /run/user/$(id -u)/ 2>/dev/null; systemctl --user status 2>/dev/null | head' 2>/dev/null || true
            echo "--- greetd journal:"
            $SSH 'sudo journalctl -u greetd --no-pager 2>/dev/null | tail -40' 2>/dev/null || true
            echo "--- SELinux mode + AVC denials (compositor/greetd):"
            $SSH 'getenforce 2>/dev/null; sudo journalctl -b --no-pager 2>/dev/null | grep -iE "avc: *denied" | grep -iE "niri|greet|xfwl|wayland|xdm" | tail -30 || true' 2>/dev/null || true
            echo "--- DM install + labels + session exec:"
            $SSH 'command -v greetd niri xfwl4 startxfce4 2>/dev/null; rpm -q greetd 2>/dev/null; ls -Z /usr/bin/greetd /usr/bin/niri /usr/bin/xfwl4 2>/dev/null; systemctl get-default; systemctl is-active greetd 2>/dev/null; cat /etc/greetd/config.toml 2>/dev/null' 2>/dev/null || true
            echo "--- compositor procs:"
            $SSH 'ps -eo pid,user,comm | grep -iE "niri|xfwl|cosmic|greet|wayland|gnome-shell|kwin|xfce" || true' 2>/dev/null || true
            exit 1
          fi
          echo "== ${FLAVOR}: compositor running: ${COMP}"

          # Then the DESKTOP-MATCHED installer frontend must actually be running.
          # The old check (`pgrep -af "Installer|..."`) ran through `bash -c`, so
          # the pattern matched its OWN command line and passed unconditionally —
          # it never verified anything (run 29645820128 "installer processes:
          # 2330 bash -c pgrep -af ..."). Assert the specific app id for this
          # desktop via `flatpak ps`, with a self-match-proof pgrep fallback.
          case "${FLAVOR}" in
            kde)    APP=org.tunaos.InstallerKde ;;
            cosmic) APP=org.tunaos.InstallerCosmic ;;
            niri)   APP=org.tunaos.InstallerNiri ;;
            xfce)   APP=org.tunaos.InstallerXfce ;;
            *)      APP=org.bootcinstaller.Installer ;;
          esac
          echo "expecting installer frontend: ${APP}"
          PROCS=""
          for i in $(seq 1 18); do
            # flatpak ps is authoritative (app id, not a substring guess); the
            # bracket trick ([o]rg) keeps the fallback from matching itself.
            PROCS=$($SSH "flatpak ps --columns=application 2>/dev/null | grep -Fx '${APP}' || pgrep -af '[o]rg\.(tunaos|bootcinstaller)\.Installer' || true" 2>/dev/null || true)
            [ -n "$PROCS" ] && break
            sleep 10
          done
          echo "installer frontend: ${PROCS:-<none>}"
          if [ -z "$PROCS" ]; then
            echo "::error::${FLAVOR}: installer frontend ${APP} is not running in the live session"
            echo "--- running flatpaks:"; $SSH 'flatpak ps 2>/dev/null; flatpak list --app --columns=application 2>/dev/null' 2>/dev/null || true
            echo "--- autostart + session procs:"; $SSH 'ls -la /etc/xdg/autostart/ 2>/dev/null | head; ps -eo pid,comm | grep -iE "install|bwrap|flatpak" || true' 2>/dev/null || true
            exit 1
          fi

      # Capturing frames proves nothing on its own, so this also asserts the
      # installer RENDERS (non-blank), ADVANCES (frames differ), and WHICH
      # spec'd screens it reached (OCR vs tests/installer-screens.yaml) — the
      # signal that catches feature drift between the five independent
      # frontend forks. Must run before the screenshot step kills QEMU.
      - name: Installer walkthrough + verification
        env:
          FLAVOR: ${{ matrix.flavor }}
        run: |
          # Smithay compositors (niri, xfwl4) cannot render without virgl, so a
          # GPU-less runner shows blank frames legitimately — enforce only where
          # rendering is possible; elsewhere still record screens for the matrix.
          STRICT=""
          case "${FLAVOR}" in kde|cosmic|gnome) STRICT="--strict" ;; esac
          if sudo test -S smoke-out/monitor.sock; then
            set +e
            sudo python3 scripts/installer-walkthrough.py \
              smoke-out/monitor.sock smoke-out 8 "${FLAVOR}" $STRICT \
              2>&1 | tee "smoke-out/walkthrough-${FLAVOR}.tap"
            rc=${PIPESTATUS[0]}
            set -e
            sudo chown -R "$(id -u)" smoke-out 2>/dev/null || true
            exit "$rc"
          else
            echo "::warning::no QEMU monitor socket — walkthrough skipped"
          fi

      # The installer's own stderr is the one thing this workflow never
      # captured, and it is exactly what distinguishes "no window" causes.
      # cosmic launches, connects to Wayland, then loses its GPU path:
      #   libEGL warning: failed to get driver name for fd -1
      #   MESA: error: ZINK: failed to choose pdev
      #   libEGL warning: egl: failed to create dri2 screen
      # Reproduced on real hardware; there it survived by falling back to
      # Vulkan llvmpipe. Under plain virtio-vga that fallback may not exist,
      # which would leave a live process with no surface — precisely the state
      # observed in run 29684495194. Without this capture the gate can only
      # report "process running, nothing on screen".
      - name: Capture installer stderr and session journal
        if: always()
        env:
          FLAVOR: ${{ matrix.flavor }}
        run: |
          SSH="sshpass -p live ssh -p 2222 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null liveuser@127.0.0.1"
          out="smoke-out/installer-stderr-${FLAVOR}.log"
          {
            echo "=== user journal (installer + portal + flatpak) ==="
            $SSH 'journalctl --user -b --no-pager 2>/dev/null | grep -iE "installer|flatpak|portal|wgpu|EGL|MESA|wayland|vulkan" | tail -120' 2>/dev/null || true
            echo
            echo "=== system journal (compositor / greetd / GPU) ==="
            $SSH 'sudo journalctl -b --no-pager 2>/dev/null | grep -iE "EGL|MESA|drm|vulkan|llvmpipe|virtio|cosmic|niri|xfwl4" | tail -80' 2>/dev/null || true
            echo
            echo "=== rendering capability in the live session ==="
            $SSH 'ls -l /dev/dri/ 2>/dev/null; echo "--- eglinfo/vulkaninfo ---"; (eglinfo 2>&1 | head -20) || true; (vulkaninfo --summary 2>&1 | head -20) || true' 2>/dev/null || true
            echo
            echo "=== windows the compositor actually has ==="
            $SSH 'pgrep -xl "cosmic-comp|niri|xfwl4|kwin_wayland" 2>/dev/null || pgrep -l -x cosmic-comp || pgrep -l -x niri || pgrep -l -x xfwl4 || pgrep -l -x kwin_wayland || echo "(no compositor matched)"; ps -eo pid,comm,args | grep -iE "[I]nstaller" || echo "(no installer process)"' 2>/dev/null || true
          } > "$out" 2>&1
          echo "--- captured $(wc -l < "$out") lines ---"
          tail -30 "$out"

      - name: Screenshot desktop evidence
        if: always()
        run: |
          # Prefer the QEMU monitor screendump; fall back to grim/scrot over
          # SSH inside the live session (ssh-only mode has no monitor sock).
          shot="smoke-out/installer-${{ matrix.flavor }}"
          # The QEMU monitor sock is root-owned (iso-e2e.sh runs under sudo),
          # so the screendump command must go through sudo too — otherwise
          # 'Permission denied' on the socket and no screenshot.
          if sudo test -S smoke-out/monitor.sock; then
            echo "screendump $(pwd)/${shot}.ppm" | sudo socat - UNIX-CONNECT:smoke-out/monitor.sock || true
            sleep 3
            sudo chown "$(id -u)" "${shot}.ppm" 2>/dev/null || true
            [ -f "${shot}.ppm" ] && convert "${shot}.ppm" "${shot}.png" || true
          fi
          if [ ! -f "${shot}.png" ]; then
            SSH="sshpass -p live ssh -p 2222 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null liveuser@127.0.0.1"
            $SSH 'XDG_RUNTIME_DIR=/run/user/$(id -u) grim /tmp/s.png 2>/dev/null || scrot /tmp/s.png 2>/dev/null || true' || true
            $SSH 'cat /tmp/s.png' > "${shot}.png" 2>/dev/null || true
            [ -s "${shot}.png" ] || rm -f "${shot}.png"
          fi
          sudo pkill -f qemu-system || true

      - name: Fix evidence ownership
        if: always()
        run: sudo chown -R "$(id -u)" smoke-out 2>/dev/null || true

      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: installer-smoke-${{ matrix.variant }}-${{ matrix.flavor }}
          path: |
            smoke-out/*.png
            smoke-out/*.json
            smoke-out/*.tap
            smoke-out/serial.log
          if-no-files-found: warn

  # Publishes the walkthrough-*.png frames captured above to docs, the same
  # way installer-screenshots.yml already does for its gnome/cosmic full-install
  # flow. That workflow only covers two flavors because it drives a hardcoded
  # sendkey choreography (scripts/run-walkthrough.sh) written for one page
  # layout; this job reuses installer-walkthrough.py instead, which already
  # runs across all four independent frontend forks with per-frontend
  # navigation handling (KDE's Enter-key fix, tab-count widening, etc.), so it
  # is the only harness that actually generalizes across kde/cosmic/niri/xfce.
  publish-screenshots:
    name: Publish installer screenshots
    needs: smoke
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Download walkthrough artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: installer-smoke-*
          merge-multiple: true
          path: /tmp/installer-smoke

      - name: Stage walkthrough frames
        id: stage
        run: |
          mkdir -p docs/images/installer
          count=0
          # installer-walkthrough.py names frames walkthrough-<flavor>-NN.png;
          # rename to smoke-<flavor>_NN.png so gen-screenshot-gallery.sh's
          # prefix grouping treats each flavor as its own flow. The smoke-
          # prefix keeps this distinct from installer-screenshots.yml's
          # cosmic_NN_name.png (that one walks a full install to a bootable
          # disk on gnome/cosmic only; this one is launch-smoke evidence
          # across all four frontends) — same R2 path convention, different
          # source, so they must not collide on cosmic's filenames.
          : > /tmp/staged-basenames.txt
          for png in /tmp/installer-smoke/walkthrough-*.png; do
            [[ -f "$png" ]] || continue
            base="$(basename "$png" .png)"
            # walkthrough-kde-03 -> smoke-kde_03
            renamed="$(echo "$base" | sed -E 's/^walkthrough-([a-z]+)-([0-9]+)$/smoke-\1_\2/')"
            cp "$png" "docs/images/installer/${renamed}.png"
            echo "$renamed" >> /tmp/staged-basenames.txt
            count=$((count + 1))
          done
          echo "staged=${count}" >> "$GITHUB_OUTPUT"
          echo "Staged ${count} screenshot(s)"

      # tunaos.org's InstallerWalkthrough component reads these:
      # screenshots/installer/<name>-latest.png on download.tunaos.org.
      - name: Publish captures to R2
        if: steps.stage.outputs.staged != '0'
        env:
          RCLONE_CONFIG_R2_TYPE: s3
          RCLONE_CONFIG_R2_PROVIDER: Cloudflare
          RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          RCLONE_CONFIG_R2_REGION: auto
          RCLONE_CONFIG_R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          if [[ -z "${RCLONE_CONFIG_R2_ACCESS_KEY_ID:-}" ]]; then
            echo "::notice::R2 credentials not configured; skipping publish."
            exit 0
          fi
          sudo apt-get install -y -qq rclone 2>/dev/null || true
          while IFS= read -r base; do
            [[ -n "$base" ]] || continue
            png="docs/images/installer/${base}.png"
            [[ -f "$png" ]] || continue
            rclone copyto --s3-no-check-bucket --log-level ERROR \
              "$png" "R2:${{ secrets.R2_BUCKET }}/screenshots/installer/${base}-latest.png"
          done < /tmp/staged-basenames.txt
          echo "Published capture(s) to R2"

      - name: Regenerate screenshot gallery
        if: steps.stage.outputs.staged != '0'
        run: bash scripts/gen-screenshot-gallery.sh

      - name: Commit and push
        if: steps.stage.outputs.staged != '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/images/installer docs/SCREENSHOTS.md
          if git diff --cached --quiet; then
            echo "No screenshot changes to commit"
            exit 0
          fi
          git commit -m "docs: refresh installer frontend walkthrough screenshots ($(date +%Y-%m-%d)) [skip ci]"
          git pull --rebase origin main
          git push origin HEAD:main
