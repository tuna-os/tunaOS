# Installer GUI smoke (tunaOS#678 phase 1): per-desktop proof that the
# live ISO autologins and the installer frontend actually starts.
#
# For each flavor: build the dev ISO (SSH enabled), boot it under OVMF,
# wait for TUNAOS_LIVE_READY, then over SSH assert the installer process
# is running (flatpak run org.tunaos.Installer* / bootc-installer) and
# capture a desktop screenshot as reviewable evidence.
#
# Phase 2 (per-DE install path) extends the LUKS E2E matrix; phase 3
# (VLM screen assertions) is blocked on a CI-reachable VLM endpoint.
name: Installer Smoke

on:
  workflow_dispatch:
    inputs:
      variant:
        description: "Variant"
        required: false
        default: "yellowfin"
        type: string
      flavors:
        description: "Comma-separated flavors"
        required: false
        default: "kde,cosmic,niri,xfce"
        type: string
  schedule:
    # Weekly, after the Tuesday image builds settle.
    - cron: "0 9 * * 3"

permissions:
  contents: read
  packages: read

jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - id: gen
        env:
          FLAVORS: ${{ inputs.flavors || 'kde,cosmic,niri,xfce' }}
          VARIANT: ${{ inputs.variant || 'yellowfin' }}
        run: |
          M=$(jq -cn --arg v "$VARIANT" --arg f "$FLAVORS" \
            '{include: ($f | split(",") | map({variant: $v, flavor: .}))}')
          echo "matrix=$M" >> "$GITHUB_OUTPUT"
          echo "$M" | jq .

  smoke:
    name: ${{ matrix.variant }}:${{ matrix.flavor }}
    needs: generate-matrix
    runs-on: ubuntu-latest
    timeout-minutes: 75
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive

      - name: free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # main as of 2026-06-09
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: false

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y just podman jq golang-go git socat imagemagick sshpass \
            qemu-system-x86 qemu-utils ovmf \
            systemd-boot-efi xorriso mtools squashfs-tools dosfstools gdisk
          sudo wget -qO /usr/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 && sudo chmod +x /usr/bin/yq

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build dev ISO
        env:
          VARIANT: ${{ matrix.variant }}
          FLAVOR: ${{ matrix.flavor }}
        run: |
          export TACKLEBOX_FROM_SOURCE=1
          just iso "${VARIANT}" "${FLAVOR}" ghcr "" 1
          ISO=$(find .build -maxdepth 3 -name "*.iso" | head -1)
          [[ -n "$ISO" ]] || { echo "::error::dev ISO not produced"; exit 1; }
          echo "ISO_PATH=${ISO}" >> "$GITHUB_ENV"

      - name: Boot live env (SSH mode, keep VM)
        env:
          VARIANT: ${{ matrix.variant }}
          FLAVOR: ${{ matrix.flavor }}
        run: |
          mkdir -p smoke-out
          sudo -E ./scripts/iso-e2e.sh "$ISO_PATH" --ssh-only --keep-vm \
            --timeout 1200 --output smoke-out

      - name: Assert live desktop session + installer frontend
        env:
          FLAVOR: ${{ matrix.flavor }}
        run: |
          SSH="sshpass -p live ssh -p 2222 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null liveuser@127.0.0.1"
          # A real graphical session must exist FIRST — the old check only
          # pgrep'd for the installer process, which passed even when COSMIC
          # sat at the greeter and Niri fell through to a TTY (run
          # 29640376787). Require an active graphical session for liveuser
          # (loginctl) AND a Wayland/X socket in its runtime dir.
          session_ok=0
          for i in $(seq 1 36); do
            SESS=$($SSH 'loginctl list-sessions --no-legend 2>/dev/null; ls /run/user/$(id -u)/wayland-* /tmp/.X11-unix/X* 2>/dev/null' 2>/dev/null || true)
            # "active" graphical session or a live wayland/X socket
            # The real desktop session process must be running — a wayland
            # socket alone is satisfied by a greeter (cosmic-greeter) or an
            # orphan socket (tunaOS#678). Require the actual compositor for
            # the flavor, and reject if parked at a greeter.
            COMP=$($SSH 'pgrep -af "niri|cosmic-comp|cosmic-session|kwin_wayland|gnome-shell|xfwm4|xfce4-session" || true' 2>/dev/null || true)
            GREETER=$($SSH 'pgrep -af "cosmic-greeter|sddm-greeter|gtkgreet|dms-greeter|agreety" || true' 2>/dev/null || true)
            if [ -n "$COMP" ] && [ -z "$GREETER" ] && echo "$SESS" | grep -qE "wayland-|/tmp/.X11-unix/X"; then
              session_ok=1; echo "compositor: $COMP"; break
            fi
            [ -n "$GREETER" ] && echo "still at greeter: $GREETER"
            sleep 10
          done
          if [ "$session_ok" -ne 1 ]; then
            echo "::error::${FLAVOR}: no active graphical session for liveuser (stuck at greeter or TTY?)"
            $SSH 'loginctl list-sessions; ls /run/user/$(id -u)/ 2>/dev/null; systemctl --user status 2>/dev/null | head' 2>/dev/null || true
            exit 1
          fi
          echo "== ${FLAVOR}: graphical session active for liveuser"

          # Then the installer frontend must be running in that session.
          for i in $(seq 1 18); do
            PROCS=$($SSH 'pgrep -af "Installer|bootc-installer|flatpak run" || true' 2>/dev/null || true)
            [ -n "$PROCS" ] && break
            sleep 10
          done
          echo "installer processes: $PROCS"
          if [ -z "$PROCS" ]; then
            echo "::error::${FLAVOR}: no installer frontend process in the live session"
            exit 1
          fi

      - name: Screenshot desktop evidence
        if: always()
        run: |
          # Prefer the QEMU monitor screendump; fall back to grim/scrot over
          # SSH inside the live session (ssh-only mode has no monitor sock).
          shot="smoke-out/installer-${{ matrix.flavor }}"
          # The QEMU monitor sock is root-owned (iso-e2e.sh runs under sudo),
          # so the screendump command must go through sudo too — otherwise
          # 'Permission denied' on the socket and no screenshot.
          if sudo test -S smoke-out/monitor.sock; then
            echo "screendump $(pwd)/${shot}.ppm" | sudo socat - UNIX-CONNECT:smoke-out/monitor.sock || true
            sleep 3
            sudo chown "$(id -u)" "${shot}.ppm" 2>/dev/null || true
            [ -f "${shot}.ppm" ] && convert "${shot}.ppm" "${shot}.png" || true
          fi
          if [ ! -f "${shot}.png" ]; then
            SSH="sshpass -p live ssh -p 2222 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null liveuser@127.0.0.1"
            $SSH 'XDG_RUNTIME_DIR=/run/user/$(id -u) grim /tmp/s.png 2>/dev/null || scrot /tmp/s.png 2>/dev/null || true' || true
            $SSH 'cat /tmp/s.png' > "${shot}.png" 2>/dev/null || true
            [ -s "${shot}.png" ] || rm -f "${shot}.png"
          fi
          sudo pkill -f qemu-system || true

      - name: Fix evidence ownership
        if: always()
        run: sudo chown -R "$(id -u)" smoke-out 2>/dev/null || true

      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: installer-smoke-${{ matrix.variant }}-${{ matrix.flavor }}
          path: |
            smoke-out/*.png
            smoke-out/serial.log
          if-no-files-found: warn

  publish-docs:
    name: Publish installer screenshots to docs
    needs: smoke
    if: always() && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Download all installer screenshots
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: installer-smoke-*
          path: shots
          merge-multiple: true

      - name: Collect PNGs
        id: collect
        run: |
          mkdir -p out
          found=0
          for f in $(find shots -name "installer-*.png"); do
            cp "$f" "out/$(basename "$f")"; found=1
          done
          echo "found=$found" >> "$GITHUB_OUTPUT"
          ls -la out || true

      - name: Checkout docs site
        if: steps.collect.outputs.found == '1'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: tuna-os/docs
          token: ${{ secrets.DOCS_PUSH_TOKEN || secrets.GITHUB_TOKEN }}
          path: docs-repo

      - name: Update installer walkthrough page
        if: steps.collect.outputs.found == '1'
        run: |
          DEST="docs-repo/docs/tunaos/installer-walkthrough"
          mkdir -p "$DEST/img"
          cp out/installer-*.png "$DEST/img/"
          DATE="$(date -u +%Y-%m-%d)"
          {
            echo "---"
            echo "sidebar_label: Installer Walkthrough"
            echo "---"
            echo
            echo "# Installer Walkthrough"
            echo
            echo "Live-session screenshots of the TunaOS installer for each desktop,"
            echo "captured automatically by the \`installer-smoke\` CI (last updated ${DATE})."
            echo "Each proves the installer frontend autostarts in a real live boot."
            echo
            for png in "$DEST"/img/installer-*.png; do
              de="$(basename "$png" .png | sed 's/installer-//')"
              echo "## ${de^^}"
              echo
              echo "![${de} installer](./img/installer-${de}.png)"
              echo
            done
          } > "$DEST/index.md"
          cat "$DEST/index.md"

      - name: Open docs PR
        if: steps.collect.outputs.found == '1'
        working-directory: docs-repo
        env:
          GH_TOKEN: ${{ secrets.DOCS_PUSH_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "tunaos-ci"
          git config user.email "ci@tunaos.org"
          BR="ci/installer-screenshots-$(date -u +%Y%m%d%H%M)"
          git checkout -b "$BR"
          git add docs/tunaos/installer-walkthrough
          git diff --cached --quiet && { echo "no changes"; exit 0; }
          git commit -m "docs: refresh installer walkthrough screenshots (CI)"
          git push origin "$BR"
          gh pr create --title "docs: installer walkthrough screenshots (automated)" \
            --body "Auto-generated by the installer-smoke workflow — per-desktop live-session installer screenshots." \
            --head "$BR" || echo "PR create skipped (token scope?)"
