name: Weekly QCOW2 Boot Screenshots

on:
  schedule:
    - cron: "0 23 * * 0" # Every Sunday at 23:00 UTC (ready for Monday report)
  workflow_dispatch:
    inputs:
      variant:
        description: "Variant to test (leave blank for all: yellowfin, albacore, skipjack, bonito)"
        required: false
        default: ""
        type: string
      flavor:
        description: "Flavor to test (leave blank for all: gnome, kde, niri, cosmic)"
        required: false
        default: ""
        type: string

permissions:
  contents: read

jobs:
  screenshot:
    name: ${{ matrix.variant }}/${{ matrix.flavor }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - {variant: yellowfin, flavor: gnome}
          - {variant: yellowfin, flavor: kde}
          - {variant: yellowfin, flavor: niri}
          - {variant: yellowfin, flavor: cosmic}
          - {variant: albacore, flavor: gnome}
          - {variant: albacore, flavor: kde}
          - {variant: albacore, flavor: niri}
          - {variant: albacore, flavor: cosmic}
          - {variant: skipjack, flavor: gnome}
          - {variant: skipjack, flavor: kde}
          - {variant: skipjack, flavor: niri}
          - {variant: skipjack, flavor: cosmic}
          - {variant: bonito, flavor: gnome}
          - {variant: bonito, flavor: kde}
          - {variant: bonito, flavor: niri}
          - {variant: bonito, flavor: cosmic}
    steps:
      - name: Check matrix filter
        id: filter
        env:
          INPUT_VARIANT: ${{ github.event.inputs.variant }}
          INPUT_FLAVOR: ${{ github.event.inputs.flavor }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" && \
                -n "$INPUT_VARIANT" && \
                "$INPUT_VARIANT" != "${{ matrix.variant }}" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi
          if [[ "$EVENT_NAME" == "workflow_dispatch" && \
                -n "$INPUT_FLAVOR" && \
                "$INPUT_FLAVOR" != "${{ matrix.flavor }}" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        if: steps.filter.outputs.skip != 'true'

      - name: Log in to GHCR
        if: steps.filter.outputs.skip != 'true'
        uses: ./.github/actions/ghcr-login

      - name: Install dependencies
        if: steps.filter.outputs.skip != 'true'
        run: sudo apt-get update -q && sudo apt-get install -y qemu-utils qemu-system-x86 ovmf socat imagemagick

      - name: Build QCOW2 from published image
        if: steps.filter.outputs.skip != 'true'
        timeout-minutes: 45
        run: |
          sudo scripts/build-qcow2.sh \
            "ghcr.io/${{ github.repository_owner }}/${{ matrix.variant }}:${{ matrix.flavor }}-linux-amd64"

      - name: Boot QCOW2 and capture screenshot
        if: steps.filter.outputs.skip != 'true'
        timeout-minutes: 10
        run: |
          QCOW2=$(find . -maxdepth 1 -name "*.qcow2" | head -1)
          echo "==> Booting $QCOW2 in QEMU (headless, KVM)..."

          OVMF_CODE=""
          for f in \
            /usr/share/OVMF/OVMF_CODE_4M.fd \
            /usr/share/OVMF/OVMF_CODE.fd \
            /usr/share/edk2/ovmf/OVMF_CODE.fd; do
            [ -f "$f" ] && OVMF_CODE="$f" && break
          done
          OVMF_VARS=""
          for f in \
            /usr/share/OVMF/OVMF_VARS_4M.fd \
            /usr/share/OVMF/OVMF_VARS.fd \
            /usr/share/edk2/ovmf/OVMF_VARS.fd; do
            if [ -f "$f" ]; then
              cp "$f" /tmp/OVMF_VARS.fd
              OVMF_VARS="/tmp/OVMF_VARS.fd"
              break
            fi
          done

          PFLASH=()
          if [ -n "$OVMF_CODE" ] && [ -n "$OVMF_VARS" ]; then
            echo "==> Using UEFI: $OVMF_CODE"
            PFLASH+=(-drive "if=pflash,format=raw,readonly=on,file=$OVMF_CODE")
            PFLASH+=(-drive "if=pflash,format=raw,file=$OVMF_VARS")
          else
            echo "==> OVMF not found, booting in BIOS mode"
          fi

          sudo qemu-system-x86_64 \
            -machine type=q35,accel=kvm \
            -cpu host \
            -m 4G \
            -smp 2 \
            -drive "file=${QCOW2},format=qcow2,if=virtio" \
            "${PFLASH[@]}" \
            -monitor unix:/tmp/qemu-monitor.sock,server,nowait \
            -serial file:/tmp/serial.log \
            -display none \
            -daemonize

          for i in $(seq 1 30); do
            [ -S /tmp/qemu-monitor.sock ] && break
            sleep 2
          done

          echo "==> Waiting 4 minutes for desktop to load..."
          sleep 240

          echo "screendump /tmp/screenshot.ppm" | \
            sudo socat - UNIX-CONNECT:/tmp/qemu-monitor.sock
          sleep 3

          if sudo test -f /tmp/screenshot.ppm; then
            sudo convert /tmp/screenshot.ppm screenshot.png 2>/dev/null || \
              sudo cp /tmp/screenshot.ppm screenshot.png
            echo "==> Screenshot captured: $(ls -lh screenshot.png)"
          else
            echo "WARNING: screenshot.ppm not found; serial log follows:"
            sudo cat /tmp/serial.log || true
          fi

          echo "quit" | sudo socat - UNIX-CONNECT:/tmp/qemu-monitor.sock || true

      - name: Upload QCOW2 boot screenshot
        if: steps.filter.outputs.skip != 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.variant }}-${{ matrix.flavor }}-qcow2-boot-screenshot
          path: screenshot.png
          if-no-files-found: warn

      # Publish the QCOW2 boot-state screenshot (display-manager / first-boot)
      # to R2 under screenshots/boot/ — useful for the boot report and
      # debugging. The *desktop* screenshots the landing pages show come from
      # weekly-desktop-screenshots.yml (live ISO, autologged-in to the desktop).
      # Runs only when a screenshot was captured; skips cleanly when R2 creds
      # are absent (e.g. forks).
      - name: Publish screenshot to R2
        if: steps.filter.outputs.skip != 'true' && hashFiles('screenshot.png') != ''
        env:
          RCLONE_CONFIG_R2_TYPE: s3
          RCLONE_CONFIG_R2_PROVIDER: Cloudflare
          RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          RCLONE_CONFIG_R2_REGION: auto
          RCLONE_CONFIG_R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          if [[ -z "${RCLONE_CONFIG_R2_ACCESS_KEY_ID:-}" ]]; then
            echo "::notice::R2 credentials not configured; skipping screenshot publish."
            exit 0
          fi
          sudo apt-get install -y -q rclone
          DATE=$(date +%Y%m%d)
          DEST="R2:${{ secrets.R2_BUCKET }}/screenshots/boot"
          BASE="${{ matrix.variant }}-${{ matrix.flavor }}"
          # Dated archive copy + a stable "latest" boot-state shot.
          rclone copyto --s3-no-check-bucket --log-level INFO \
            screenshot.png "${DEST}/${BASE}-${DATE}.png"
          rclone copyto --s3-no-check-bucket --log-level INFO \
            screenshot.png "${DEST}/${BASE}-latest.png"
          echo "==> Published ${BASE}-latest.png to R2."
