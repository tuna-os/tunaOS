name: Publish Live ISOs to R2

on:
  schedule:
    # Runs every Sunday at 22:00 UTC (before the Monday 06:00 UTC smoke test)
    - cron: '0 22 * * 0'
  workflow_dispatch:
    inputs:
      variant:
        description: 'Variant to build (all = build everything with build_iso: true)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - yellowfin
          - albacore
          - skipjack
          - bonito
          - grouper
      flavor:
        description: 'Flavor to build (all = build everything with build_iso: true)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - gnome
          - gnome-hwe
          - kde
          - cosmic
          - niri
          - xfce
      skip_upload:
        description: 'Build ISOs but skip uploading to R2 (dry run / testing)'
        required: false
        default: false
        type: boolean

jobs:
  generate-matrix:
    name: Generate ISO matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}
      count: ${{ steps.build.outputs.count }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install yq
        run: sudo wget -qO /usr/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 && sudo chmod +x /usr/bin/yq

      - name: Build matrix from build-config.yml
        id: build
        env:
          WANT_VARIANT: ${{ inputs.variant || 'all' }}
          WANT_FLAVOR: ${{ inputs.flavor || 'all' }}
        run: |
          MATRIX=$(yq -o json .github/build-config.yml | jq -c \
            --arg v "$WANT_VARIANT" --arg f "$WANT_FLAVOR" '{
              include: [
                .variants[] | . as $var |
                .flavors[] |
                select(.build_iso == true) |
                select($v == "all" or $var.id == $v) |
                select($f == "all" or .id == $f) |
                {variant: $var.id, flavor: .id}
              ]
            }')
          COUNT=$(echo "$MATRIX" | jq '.include | length')
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "Building $COUNT ISO(s):"
          echo "$MATRIX" | jq -r '.include[] | "  \(.variant):\(.flavor)"'

  build-and-publish:
    name: ${{ matrix.variant }}:${{ matrix.flavor }}
    needs: generate-matrix
    if: ${{ needs.generate-matrix.outputs.count != '0' }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    permissions:
      contents: write
      packages: read
    # Builds the ISO from the promoted :<flavor> image, boot-gates it in
    # QEMU, and only publishes (R2 + GitHub Release) if the gate passes.
    uses: ./.github/workflows/reusable-build-artifacts.yml
    with:
      variant: ${{ matrix.variant }}
      flavor: ${{ matrix.flavor }}
      image-tag: ${{ matrix.flavor }}
      upload-r2: ${{ inputs.skip_upload != true }}
      attach-release: ${{ inputs.skip_upload != true }}
    secrets:
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
