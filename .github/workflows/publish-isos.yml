name: Publish Live ISOs to R2

on:
  schedule:
    # Runs on the 1st and 15th of every month at 00:00 UTC
    - cron: '0 0 1,15 * *'
  workflow_dispatch:
    inputs:
      variant:
        description: 'Variant to build (all = build everything with build_iso: true)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - yellowfin
          - albacore
          - skipjack
          - bonito
      flavor:
        description: 'Flavor to build (all = build everything with build_iso: true)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - gnome
          - gnome-hwe
          - kde
          - cosmic
          - niri
      skip_upload:
        description: 'Build ISOs but skip uploading to R2 (dry run / testing)'
        required: false
        default: false
        type: boolean

jobs:
  generate-matrix:
    name: Generate ISO matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}
      count: ${{ steps.build.outputs.count }}
    steps:
      - uses: actions/checkout@v4

      - name: Install yq
        run: sudo wget -qO /usr/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 && sudo chmod +x /usr/bin/yq

      - name: Build matrix from build-config.yml
        id: build
        env:
          WANT_VARIANT: ${{ inputs.variant || 'all' }}
          WANT_FLAVOR: ${{ inputs.flavor || 'all' }}
        run: |
          MATRIX=$(yq -o json .github/build-config.yml | jq -c \
            --arg v "$WANT_VARIANT" --arg f "$WANT_FLAVOR" '{
              include: [
                .variants[] | . as $var |
                .flavors[] |
                select(.build_iso == true) |
                select($v == "all" or $var.id == $v) |
                select($f == "all" or .id == $f) |
                {variant: $var.id, flavor: .id}
              ]
            }')
          COUNT=$(echo "$MATRIX" | jq '.include | length')
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "Building $COUNT ISO(s):"
          echo "$MATRIX" | jq -r '.include[] | "  \(.variant):\(.flavor)"'

  build-and-publish:
    name: ${{ matrix.variant }}:${{ matrix.flavor }}
    needs: generate-matrix
    if: ${{ needs.generate-matrix.outputs.count != '0' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ublue-os/container-storage-action@main

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y just podman jq rclone golang-go git
          sudo wget -qO /usr/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 && sudo chmod +x /usr/bin/yq

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Live ISO (from published GHCR image)
        env:
          GITHUB_REPOSITORY_OWNER: tuna-os
        run: |
          sudo GITHUB_REPOSITORY_OWNER=tuna-os \
            just live-iso "${{ matrix.variant }}" "${{ matrix.flavor }}" ghcr "${{ matrix.flavor }}"

      - name: Upload ISO to Cloudflare R2
        if: ${{ inputs.skip_upload != true }}
        env:
          RCLONE_CONFIG_R2_TYPE: s3
          RCLONE_CONFIG_R2_PROVIDER: Cloudflare
          RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          RCLONE_CONFIG_R2_REGION: auto
          RCLONE_CONFIG_R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          ISO=$(find . -maxdepth 1 -name "${{ matrix.variant }}-${{ matrix.flavor }}-*.iso" | head -1)
          if [[ -z "$ISO" ]]; then
            echo "ERROR: No ISO found for ${{ matrix.variant }}-${{ matrix.flavor }}"
            exit 1
          fi
          echo "==> Uploading $ISO to R2..."
          rclone copy --log-level INFO --checksum --s3-no-check-bucket \
            "$ISO" R2:${{ secrets.R2_BUCKET }}/live-isos/
          echo "==> Upload complete: $(basename "$ISO")"
          LATEST="${{ matrix.variant }}-${{ matrix.flavor }}-latest.iso"
          rclone copyto --log-level INFO --s3-no-check-bucket \
            "$ISO" "R2:${{ secrets.R2_BUCKET }}/live-isos/${LATEST}"
          echo "==> Latest link updated."

      - name: Upload ISO as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.variant }}-${{ matrix.flavor }}-iso
          path: "*.iso"
          if-no-files-found: error
          retention-days: 7
