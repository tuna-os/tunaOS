name: Generate Release

permissions:
  contents: write

on:
  workflow_run:
    workflows: ["Build TunaOS NVIDIA"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      target:
        description: 'Target to generate changelog for'
        required: true
        default: 'lts'
        type: choice
        options:
          - lts
          - dx
          - nvidia
          - main

jobs:
  generate-release:
    runs-on: ubuntu-latest
    # Only run if the workflow was successful and on lts branch
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'lts')
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyYAML

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo jq

      - name: Determine target
        id: target
        env:
          TARGET: ${{ inputs.target }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "target=${TARGET}" >> $GITHUB_OUTPUT
          else
            echo "target=lts" >> $GITHUB_OUTPUT
          fi

      - name: Generate changelog
        uses: tuna-os/changelog-action@0f9fc8c023d1f28f69e31ad64e2161d308a56284 # master as of 2026-03-24 (org fork of hanthor/changelog-action)
        with:
          stream: ${{ steps.target.outputs.target }}
          family: tunaos-lts
          output-env: ./output.env

      - name: Read changelog outputs
        id: changelog
        run: |
          # Source the output.env file to get TAG and TITLE
          if [ -f output.env ]; then
            cat output.env >> $GITHUB_OUTPUT
          else
            echo "output.env not found; assuming changelog generation was skipped"
            echo "skip_release=true" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        if: steps.changelog.outputs.skip_release != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.changelog.outputs.TAG }}"
          TITLE="${{ steps.changelog.outputs.TITLE }}"

          # Check if release already exists
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists, skipping creation"
            exit 0
          fi

          # Create the release
          gh release create "$TAG" \
            --title "$TITLE" \
            --notes-file changelog.md \
            --target main

      - name: Upload changelog artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: changelog
          path: |
            changelog.md
            output.env
