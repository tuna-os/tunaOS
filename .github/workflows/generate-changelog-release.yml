name: Generate Release

on:
  schedule:
    - cron: '05 11 * * *' # 11:05 UTC daily
  workflow_dispatch:
    inputs:
      stream:
        description: "Image flavor/stream to generate changelog for (e.g. gnome, kde)"
        type: string
        default: "gnome"
        required: false
      handwritten:
        description: "Optional handwritten note to include at the top of the changelog"
        type: string
        required: false
      dry_run:
        description: "Generate changelog but do not publish a GitHub Release"
        type: boolean
        default: false
        required: false

jobs:
  generate-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        stream: ${{ github.event_name == 'workflow_dispatch' && fromJson(format('["{0}"]', inputs.stream)) || fromJson('["gnome"]') }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Filter available images
        id: images
        env:
          STREAM: ${{ matrix.stream }}
        run: |
          # Only pass images that have both today's AND yesterday's stream tag to
          # the changelog action. Builds that failed won't have a dated tag and
          # would otherwise abort the entire release run.
          CURR=$(date -u +%Y%m%d)
          PREV=$(date -u -d "yesterday" +%Y%m%d)
          CANDIDATES="yellowfin albacore skipjack bonito"
          AVAILABLE=""
          for img in $CANDIDATES; do
            CURR_REF="docker://ghcr.io/tuna-os/${img}:${STREAM}-${CURR}"
            PREV_REF="docker://ghcr.io/tuna-os/${img}:${STREAM}-${PREV}"
            if skopeo inspect --raw "${CURR_REF}" >/dev/null 2>&1 && \
               skopeo inspect --raw "${PREV_REF}" >/dev/null 2>&1; then
              AVAILABLE="${AVAILABLE} ${img}"
            else
              echo "Skipping ${img}: missing ${STREAM}-${CURR} or ${STREAM}-${PREV} tag"
            fi
          done
          AVAILABLE="${AVAILABLE# }"
          echo "images=${AVAILABLE}" >> "$GITHUB_OUTPUT"
          if [ -z "$AVAILABLE" ]; then
            echo "No images have both tags — skipping changelog generation"
          else
            echo "Images with both tags: ${AVAILABLE}"
          fi

      - name: Generate changelog
        if: steps.images.outputs.images != ''
        uses: hanthor/changelog-action@master
        with:
          registry: "ghcr.io/tuna-os/"
          cosign-key: "https://raw.githubusercontent.com/tuna-os/tunaOS/main/cosign.pub"
          images: ${{ steps.images.outputs.images }}
          stream: ${{ matrix.stream }}
          handwritten: ${{ inputs.handwritten }}
          output: changelog.md
          output-env: output.env
          verbose: "true"

      - name: Read changelog outputs
        id: changelog
        run: |
          if [ -f output.env ]; then
            source output.env
            echo "TITLE=${TITLE}" >> $GITHUB_OUTPUT
            echo "TAG=${TAG}" >> $GITHUB_OUTPUT
          else
            echo "output.env not found — changelog generation was skipped"
            echo "skip_release=true" >> $GITHUB_OUTPUT
          fi

      - name: Upload changelog artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: changelog-${{ matrix.stream }}
          path: |
            changelog.md
            output.env

      - name: Create GitHub Release
        if: |
          steps.changelog.outputs.skip_release != 'true' &&
          inputs.dry_run != true &&
          (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.changelog.outputs.TAG }}
          TITLE: ${{ steps.changelog.outputs.TITLE }}
        run: |
          if [ -z "$TAG" ]; then
            echo "No TAG in output.env — skipping release creation"
            exit 0
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — skipping"
            exit 0
          fi

          # Read changelog content for release body
          NOTES=$(cat changelog.md)

          gh release create "$TAG" \
            --title "$TITLE" \
            --notes "$NOTES" \
            --latest

