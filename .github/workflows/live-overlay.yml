# Live-overlay parity artifacts (tunaOS#673): run the production
# live_customize (installer flatpak preseed, autologin, polkit, ready
# marker) in a container of each published flavor image and publish the
# result as ghcr.io/tuna-os/live-overlay:<variant>-<flavor>.
#
# The pushed image's layers ABOVE the base image are exactly the
# customize delta — the browser ISO builder applies those extra layers
# onto its unpacked base tree (same digests, same content), giving
# browser-built ISOs the identical live payload CI media carry.
name: Live Overlay Artifacts

on:
  workflow_dispatch:
    inputs:
      variant:
        description: "Variant id, or 'all'"
        required: false
        default: "all"
        type: string
      flavors:
        description: "Single desktop flavor id (gnome/kde/cosmic/niri/xfce), or 'all'"
        required: false
        default: "all"
        type: string
  schedule:
    # Weekly, after image builds.
    - cron: "30 9 * * 3"

permissions:
  contents: read
  packages: write

jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
      count: ${{ steps.gen.outputs.count }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install yq
        run: sudo wget -qO /usr/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 && sudo chmod +x /usr/bin/yq
      - id: gen
        env:
          WANT_VARIANT: ${{ inputs.variant || 'all' }}
          WANT_FLAVOR: ${{ inputs.flavors || 'all' }}
        run: |
          # Overlays carry the per-desktop live payload (installer flatpak,
          # autologin, polkit) the browser ISO builder grafts in as
          # live-overlay:<variant>-<flavor>. Filter on build_image (NOT
          # build_iso): the browser builds ISOs from any published *image*,
          # including image-only variants CI never cuts an ISO for — sailfin
          # is exactly that case, so it had no overlay and booted with no
          # installer. Restrict to the plain desktop tags the browser offers
          # (gnome/kde/cosmic/niri/xfce, no -nvidia/-hwe); new variants are
          # picked up automatically instead of the old yellowfin-only default.
          MATRIX=$(yq -o json .github/build-config.yml | jq -c \
            --arg v "$WANT_VARIANT" --arg f "$WANT_FLAVOR" '{
              include: [
                .variants[] as $var | $var.flavors[]
                | select(.build_image == true)
                | select(.id | test("^(gnome|kde|cosmic|niri|xfce)$"))
                | select($v == "all" or $var.id == $v)
                | select($f == "all" or .id == $f)
                | {variant: $var.id, flavor: .id}
              ]
            }')
          COUNT=$(echo "$MATRIX" | jq '.include | length')
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "Building $COUNT overlay(s):"
          echo "$MATRIX" | jq -r '.include[] | "  \(.variant):\(.flavor)"'

  overlay:
    name: ${{ matrix.variant }}:${{ matrix.flavor }}
    needs: generate-matrix
    if: ${{ needs.generate-matrix.outputs.count != '0' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Run live customize and publish overlay
        env:
          VARIANT: ${{ matrix.variant }}
          FLAVOR: ${{ matrix.flavor }}
        run: |
          set -euo pipefail
          IMG="ghcr.io/tuna-os/${VARIANT}:${FLAVOR}"
          OUT="ghcr.io/tuna-os/live-overlay:${VARIANT}-${FLAVOR}"

          for i in 1 2 3; do sudo podman pull "$IMG" && break; sleep $((i*15)); done

          # Exactly tacklebox's CustomizeLive invocation (cap SYS_ADMIN +
          # network; script dir mounted read-only, cwd inside it).
          sudo podman rm -f tbx-overlay 2>/dev/null || true
          sudo podman run --name tbx-overlay \
            --cap-add sys_admin --security-opt label=disable \
            -v "$PWD/live-iso/common/src:/run/tbox-customize/0:ro" \
            --entrypoint /bin/bash "$IMG" \
            -c 'set -eu; cd /run/tbox-customize/0 && bash ./customize-live.sh'

          sudo podman commit \
            --change "LABEL org.tunaos.live-overlay.base=${IMG}" \
            tbx-overlay "$OUT"
          sudo podman rm -f tbx-overlay
          sudo podman push "$OUT"
          echo "published $OUT"
