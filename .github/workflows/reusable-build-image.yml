name: Image
on:
  workflow_call:
    inputs:
      image-name:
        description: "The name of the image to build"
        required: true
        type: string
      image-desc:
        description: "The description of the image to build"
        required: false
        type: string
        default: "Albacore, built on CentOS Stream with bootc"
      flavor:
        description: "The flavor of the image to build"
        required: false
        type: string
        default: "regular"
      platforms:
        description: "The platforms to build the image for"
        required: false
        type: string
        default: "linux/amd64,linux/arm64"
      major-version:
        description: "The version of CentOS to build the image on"
        required: false
        type: string
        default: "10"
      default-tag:
        description: "The default tag to use for the image"
        required: false
        type: string
        default: "lts"
      image-variant:
        description: "The image variant to build (yellowfin, albacore, etc.)"
        required: false
        type: string
        default: "albacore"
      sbom:
        description: "Generate/publish SBOMs for the artifacts"
        required: false
        type: boolean
        default: false
      cleanup_runner:
        description: "Use the ublue cleanup action to clean up the runner before running the build"
        required: false
        type: boolean
        default: true
      publish:
        description: "Publish this image"
        required: false
        type: boolean
        default: true
      remove-unwanted-software:
        description: "Run the remove-unwanted-software action to free up disk space"
        required: false
        type: boolean
        default: false
      chain-base-image:
        description: "Base image to use for chained builds (instead of OS base image)"
        required: false
        type: string
        default: ""
    secrets:
      SIGNING_SECRET:
        description: "The private key used to sign the image"
        required: false


jobs:
  generate_matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Set matrix
        id: set-matrix
        env:
          PLATFORMS: "${{ inputs.platforms }}"
        run: |
          # turn the comma separated string into a list
          platforms=()
          IFS=',' read -r -a platforms <<< "${PLATFORMS}"

          MATRIX="{\"include\":[]}"
          for platform in "${platforms[@]}"; do
            safeplatform="${platform//\//-}" # Replace all / with -
            MATRIX="$(echo "${MATRIX}" | jq ".include += [{\"platform\": \"${platform}\", \"safeplatform\": \"${safeplatform}\"}]")"
          done
          echo "matrix=$(echo "${MATRIX}" | jq -c '.')" >> $GITHUB_OUTPUT

  build_push:
    name: ${{ matrix.safeplatform }}
    runs-on: ${{ contains(matrix.platform, 'amd64') && 'ubuntu-latest' || 'ubuntu-24.04-arm' }}
    timeout-minutes: 60
    needs: generate_matrix
    strategy:
      fail-fast: false
      matrix: ${{fromJson(needs.generate_matrix.outputs.matrix)}}
    permissions:
      contents: read
      packages: write
      id-token: write
    env:
      IMAGE_NAME: ${{ inputs.image-name }}
      IMAGE_DESC: ${{ inputs.image-desc }}
      IMAGE_REGISTRY: ${{ vars.IMAGE_REGISTRY || format('ghcr.io/{0}', github.repository_owner) }}
      DEFAULT_TAG: ${{ inputs.default-tag }}
      MAJOR_VERSION: ${{ inputs.major-version }}
      PLATFORMS: ${{ inputs.platforms }}

    steps:
      - name: Install dependencies
        if: contains(matrix.platform, 'linux/arm64')
        run: |
          sudo apt update -y
          sudo apt install -y \
            podman

      - name: Checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v4
        with:
          submodules: recursive
        if: ${{ !startsWith(inputs.flavor, 'base') }}

      - name: Checkout (no submodules)
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v4
        if: ${{ startsWith(inputs.flavor, 'base') }}

      - name: Setup runner
        uses: projectbluefin/actions/bootc-build/setup-runner@d8f871c0ca7a868339d3c175200a7319492473c7 # v1 as of 2026-07-02
        with:
          storage-backend: btrfs
          update-podman: "true"
          install-tools: '[]'

      - name: Install just and yq
        run: |
          # Pinned versions — /latest/download/ redirects trigger 403
          # rate-limiting on some runner types (e.g. linux/amd64/v2).
          YQ_VERSION="v4.53.3"
          JUST_VERSION="1.55.1"
          ARCH=$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')
          JUST_ARCH=$(uname -m | sed 's/amd64/x86_64/')

          # Retry loop — GitHub CDN transient 403s resolve after a short wait
          for i in 1 2 3; do
            sudo wget -qO /usr/bin/yq \
              "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_${ARCH}" \
              && break || sleep $((i * 2))
          done

          curl -fsSL \
            "https://github.com/casey/just/releases/download/${JUST_VERSION}/just-${JUST_VERSION}-${JUST_ARCH}-unknown-linux-musl.tar.gz" \
            -o /tmp/just.tgz 2>/dev/null \
            || curl -fsSL https://just.systems/install.sh | sudo bash -s -- --to /usr/local/bin

          if [ -f /tmp/just.tgz ]; then sudo tar -xzf /tmp/just.tgz -C /usr/local/bin just; fi
          sudo chmod +x /usr/bin/yq /usr/local/bin/just 2>/dev/null || true
          just --version && yq --version


      # Layer cache lives in a GHCR repo (buildah's native distributed cache):
      # shared across jobs/flavors/arches, no tarball upload each run, no
      # 10 GB actions/cache eviction. Replaces two broken mechanisms — a DNF
      # host-path cache that CI builds never mounted (use_cache=0), and a
      # buildah "local cache" whose env sudo stripped and whose buildx-only
      # type=local syntax buildah doesn't even parse.
      - name: Login to GitHub Container Registry (cache + push)
        if: ${{ inputs.publish }}
        uses: ./.github/actions/ghcr-login

      - name: Configure buildah registry layer cache
        env:
          IS_PR: ${{ github.event_name == 'pull_request' }}
        run: |
          CACHE_REPO="${IMAGE_REGISTRY}/tunaos-buildcache"
          FLAGS="--layers --cache-from ${CACHE_REPO}"
          # Only trusted (non-PR) runs may write cache entries.
          if [ "$IS_PR" != "true" ]; then
            FLAGS="$FLAGS --cache-to ${CACHE_REPO}"
          fi
          echo "BUILDAH_CACHE_FLAGS=${FLAGS}" >> "$GITHUB_ENV"

      - name: Build Image
        id: build-image
        shell: bash
        env:
          FLAVOR: ${{ inputs.flavor }}
          IMAGE_VARIANT: ${{ inputs.image-variant }}
          DEFAULT_TAG: ${{ inputs.default-tag }}
          PLATFORM: ${{ matrix.platform }}
          CHAIN_BASE_IMAGE: ${{ inputs.chain-base-image }}
          # PR builds never publish; skip the two-pass chunkah rechunk +
          # relabel (~10 min) and validate the plain build instead.
          SKIP_RECHUNK: ${{ github.event_name == 'pull_request' && '1' || '0' }}
        run: |
          set -x
          just=$(which just)
          build_start=$(date +%s)
          # --preserve-env: sudo otherwise strips the cache/rechunk knobs
          # (the old layer cache never worked for exactly this reason).
          sudo --preserve-env=BUILDAH_CACHE_FLAGS,SKIP_RECHUNK \
            "$just" build "${IMAGE_VARIANT}" "${FLAVOR}" "${PLATFORM}" 1 "${DEFAULT_TAG}" "${CHAIN_BASE_IMAGE}"
          echo "BUILD_SECONDS=$(( $(date +%s) - build_start ))" >> "$GITHUB_ENV"

      - name: Build telemetry
        if: always()
        env:
          IMAGE_VARIANT: ${{ inputs.image-variant }}
          DEFAULT_TAG: ${{ inputs.default-tag }}
          PLATFORM: ${{ matrix.platform }}
        run: |
          IMAGE="localhost/${IMAGE_VARIANT}:${DEFAULT_TAG}"
          SIZE=$(sudo podman image inspect --format '{{.Size}}' "$IMAGE" 2>/dev/null || echo 0)
          LAYERS=$(sudo podman image inspect --format '{{len .RootFS.Layers}}' "$IMAGE" 2>/dev/null || echo 0)
          {
            echo "### 📊 Build telemetry — ${IMAGE_NAME}:${DEFAULT_TAG} (${PLATFORM})"
            echo ""
            echo "| build time | image size | layers |"
            echo "|---|---|---|"
            echo "| ${BUILD_SECONDS:-?}s | $(numfmt --to=iec "${SIZE}" 2>/dev/null || echo "${SIZE}") | ${LAYERS} |"
          } >> "$GITHUB_STEP_SUMMARY"


      - name: Enable KVM for verification
        if: github.event_name == 'pull_request' && contains(matrix.platform, 'amd64')
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | \
            sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm || true
          sudo apt-get install -y qemu-system-x86 qemu-utils ovmf socat imagemagick

      - name: Boot-verify image (PR gate)
        if: github.event_name == 'pull_request' && contains(matrix.platform, 'amd64')
        shell: bash
        env:
          IMAGE_VARIANT: ${{ inputs.image-variant }}
          DEFAULT_TAG: ${{ inputs.default-tag }}
        run: |
          # The image was built under sudo, so it lives in root podman
          # storage; just qcow2 detects that and skips the save/load sync.
          just qcow2 "localhost/${IMAGE_VARIANT}:${DEFAULT_TAG}"
          QCOW2=$(find . -maxdepth 1 -name "*.qcow2" | head -1)
          mkdir -p verify-out
          sudo ./scripts/iso-e2e.sh "$QCOW2" --disk \
            --output verify-out \
            --timeout 600

      - name: Upload PR verification evidence
        if: always() && github.event_name == 'pull_request' && contains(matrix.platform, 'amd64')
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: pr-boot-verify-${{ inputs.image-name }}-${{ inputs.default-tag }}-${{ matrix.safeplatform }}
          path: |
            verify-out/serial.log
            verify-out/*.ppm
          if-no-files-found: warn
          retention-days: 7

      - name: Push to GHCR
        if: ${{ inputs.publish }}
        id: push
        env:
          IMAGE_REGISTRY: ${{ env.IMAGE_REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          IMAGE_VARIANT: ${{ inputs.image-variant }}
          DEFAULT_TAG: ${{ inputs.default-tag }}
          PLATFORM: ${{ matrix.platform }}
          SAFE_PLATFORM: ${{ matrix.safeplatform }}
          MAX_RETRIES: 3
        run: |
          set -x
          IMAGE="localhost/${IMAGE_VARIANT}:${DEFAULT_TAG}"
          IMAGE_DIGEST="$(sudo podman image inspect --format '{{.Digest}}' "${IMAGE}")"

          sudo podman tag "${IMAGE}" "${IMAGE_REGISTRY}/${IMAGE_NAME}:${DEFAULT_TAG}-${SAFE_PLATFORM}"

          for i in $(seq "${MAX_RETRIES}"); do
            sudo podman push --digestfile=/tmp/digestfile \
              --compression-format=zstd:chunked \
              --compression-level=3 \
              --force-compression \
              "${IMAGE_REGISTRY}/${IMAGE_NAME}:${DEFAULT_TAG}-${SAFE_PLATFORM}" \
              && break || sleep $((5 * i));
          done

          REMOTE_IMAGE_DIGEST=$(sudo cat /tmp/digestfile)
          echo "remote_image_digest=${REMOTE_IMAGE_DIGEST}" >> $GITHUB_OUTPUT
          echo "digest=${IMAGE_DIGEST}" >> $GITHUB_OUTPUT

      - name: Verify rechunk metadata preserved
        if: ${{ inputs.publish }}
        env:
          IMAGE_REGISTRY: ${{ env.IMAGE_REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          DEFAULT_TAG: ${{ inputs.default-tag }}
          SAFE_PLATFORM: ${{ matrix.safeplatform }}
        run: |
          # chunkah packs layers with ostree component annotations; if a
          # podman/skopeo regression strips them during push, client delta
          # updates silently degrade. Advisory check (warn, don't block).
          REF="docker://${IMAGE_REGISTRY}/${IMAGE_NAME}:${DEFAULT_TAG}-${SAFE_PLATFORM}"
          RAW=$(sudo skopeo inspect --raw "$REF")
          LAYERS=$(echo "$RAW" | jq '.layers | length')
          ANNOTATED=$(echo "$RAW" | jq '[.layers[].annotations // {} | keys[]] | map(select(test("ostree|chunkah"))) | length')
          echo "layers=${LAYERS} ostree-annotated-keys=${ANNOTATED}"
          if [ "${ANNOTATED}" = "0" ]; then
            echo "::warning::pushed manifest ${REF} has no ostree/chunkah layer annotations — rechunk metadata may have been stripped"
          fi

      - name: Setup Syft
        if: inputs.sbom && github.event_name != 'pull_request'
        id: setup-syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          syft-version: v1.39.0

      - name: Generate SBOM
        if: inputs.sbom && github.event_name != 'pull_request'
        # Syft mmaps the multi-GB OCI image and can OOM-kill the runner on
        # desktop-sized images; cap Go memory and time-box it, and never
        # fail the build over an SBOM (projectbluefin/actions#294/#300).
        continue-on-error: true
        timeout-minutes: 10
        env:
          SYFT_CMD: ${{ steps.setup-syft.outputs.cmd }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          DEFAULT_TAG: ${{ inputs.default-tag }}
          SAFE_PLATFORM: ${{ matrix.safeplatform }}
          GOMEMLIMIT: 3GiB
          GOGC: "25"
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/${IMAGE_NAME}:${DEFAULT_TAG}-${SAFE_PLATFORM}"
          $SYFT_CMD "$IMAGE" --scope all-layers -o spdx-json="sbom-${IMAGE_NAME}-${DEFAULT_TAG}-${SAFE_PLATFORM}.spdx.json"

      - name: Upload SBOM
        if: inputs.sbom && github.event_name != 'pull_request'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sbom-${{ env.IMAGE_NAME }}-${{ inputs.default-tag }}-${{ matrix.safeplatform }}
          path: sbom-*.spdx.json
          if-no-files-found: warn
          retention-days: 7

      # TODO: reinstate sign-and-publish when key propagation through composite
      # actions is resolved. The COSIGN_PRIVATE_KEY env var is masked but
      # arrives empty at runtime in the composite action.

      - name: PR Testing Instructions
        if: github.event_name == 'pull_request'
        env:
          IMAGE_REGISTRY: ${{ env.IMAGE_REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          DEFAULT_TAG: ${{ env.DEFAULT_TAG }}
          SAFE_PLATFORM: ${{ matrix.safeplatform }}
        run: |
          TEST_IMAGE_REF="${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }}-${{ matrix.safeplatform }}"
          STABLE_IMAGE_REF="${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }}"
          echo "### 🧪 Testing Instructions for ${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }}" >> $GITHUB_STEP_SUMMARY
          echo "To test this image, run the following command:" >> $GITHUB_STEP_SUMMARY
          echo " \`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo " sudo bootc switch --enforce-container-sigpolicy ${TEST_IMAGE_REF}" >> $GITHUB_STEP_SUMMARY
          echo " \`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "To go back to the stable version of this flavor:" >> $GITHUB_STEP_SUMMARY
          echo " \`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo " sudo bootc switch --enforce-container-sigpolicy ${STABLE_IMAGE_REF}" >> $GITHUB_STEP_SUMMARY
          echo " \`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Generate PR Diff
        if: github.event_name == 'pull_request'
        env:
          IMAGE_REGISTRY: ${{ env.IMAGE_REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          DEFAULT_TAG: ${{ env.DEFAULT_TAG }}
          SAFE_PLATFORM: ${{ matrix.safeplatform }}
        run: |
          # Only run diff for one platform to avoid spamming comments (e.g., amd64)
          if [[ "${SAFE_PLATFORM}" != *"amd64"* ]]; then
            echo "Skipping diff for non-amd64 platform"
            exit 0
          fi

          # Pull the stable base flavor image (base for comparison)
          # We assume the default tag exists. If not, we might fail or skip.
          # We'll try to pull it, if it fails, we skip diff.
          BASE_IMAGE="${IMAGE_REGISTRY}/${IMAGE_NAME}:${DEFAULT_TAG}"
          TARGET_IMAGE="${IMAGE_REGISTRY}/${IMAGE_NAME}:${DEFAULT_TAG}-${SAFE_PLATFORM}"

          echo "Pulling base image $BASE_IMAGE..."
          if ! sudo podman pull "$BASE_IMAGE"; then
            echo "Failed to pull $BASE_IMAGE. Skipping diff."
            exit 0
          fi

          echo "Running diff..."
          ./scripts/diff-images.sh "$BASE_IMAGE" "$TARGET_IMAGE" "diff_report.md"

          # Add a header to the report
          sed -i '1s/^/## 🔍 Image Diff Report\n\n/' diff_report.md

      - name: Post Diff Comment
        if: github.event_name == 'pull_request' && hashFiles('diff_report.md') != ''
        uses: thollander/actions-comment-pull-request@fabd468d3a1a0b97feee5f6b9e499eab0dd903f6 # v2.5.0
        with:
          filePath: diff_report.md
          comment_tag: diff-${{ env.IMAGE_NAME }}

      - name: Create Job Outputs
        if: ${{ inputs.publish }}
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          SAFE_PLATFORM: ${{ matrix.safeplatform }}
          DIGEST: ${{ steps.push.outputs.remote_image_digest }}
        run: |
          mkdir -p /tmp/outputs/digests
          echo "${DIGEST}" > "/tmp/outputs/digests/${IMAGE_NAME}-${DEFAULT_TAG}-${SAFE_PLATFORM}.txt"

      - name: Upload Output Artifacts
        if: ${{ inputs.publish }}
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v4
        with:
          name: ${{ env.IMAGE_NAME }}-${{ env.DEFAULT_TAG }}-${{ matrix.safeplatform }}-${{ github.run_id }}
          retention-days: 1
          if-no-files-found: error
          path: |
            /tmp/outputs/digests/*.txt
  manifest:
    name: Manifest
    runs-on: ubuntu-latest
    if: always()
    needs:
      - generate_matrix
      - build_push
    container:
      image: cgr.dev/chainguard/wolfi-base@sha256:0b5fd36c9f36ecc95bf6dbe049fe0a211410e1ba8a9801db0fbe25c7561d81c1  # :latest linux/amd64 as of 2026-06-13
      options: --privileged --security-opt seccomp=unconfined
    permissions:
      contents: read
      packages: write
      id-token: write
    outputs:
      image: ${{ steps.push_manifest.outputs.IMAGE }}
      digest: ${{ steps.push_manifest.outputs.DIGEST }}
      all_platforms_built: ${{ steps.check_platforms.outputs.all_platforms_built }}
    env:
      IMAGE_NAME: ${{ inputs.image-name }}
      IMAGE_DESC: ${{ inputs.image-desc }}
      IMAGE_REGISTRY: ${{ vars.IMAGE_REGISTRY || format('ghcr.io/{0}', github.repository_owner) }}
      DEFAULT_TAG: ${{ inputs.default-tag }}
      MAJOR_VERSION: ${{ inputs.major-version }}
      PLATFORMS: ${{ inputs.platforms }}
    steps:
      - name: Install dependencies
        run: |
          apk update
          # Install necessary packages for building and pushing the image
          apk add jq git podman uutils bash conmon crun netavark fuse-overlayfs libstdc++ yq
          ln -sf /bin/bash /bin/sh
          mkdir -p /etc/containers
          echo '{"default":[{"type":"insecureAcceptAnything"}]}' | jq . > /etc/containers/policy.json

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Exit on failure
        env:
          JOBS: ${{ toJson(needs) }}
        run: |
          echo "Job status:"
          echo $JOBS | jq -r 'to_entries[] | " - \(.key): \(.value.result)"'

          for i in $(echo "${JOBS}" | jq -r 'to_entries[] | .value.result'); do
            if [ "$i" != "success" ] && [ "$i" != "skipped" ]; then
              echo ""
              echo "Status check not okay!"
              exit 1
            fi
          done

      - name: Get current date
        id: date
        run: |
          # Should generate a timestamp like what is defined on the ArtifactHub documentation
          # E.G: 2022-02-08T15:38:15Z'
          # https://artifacthub.io/docs/topics/repositories/container-images/
          # https://linux.die.net/man/1/date
          echo "date=$(date -u +%Y\-%m\-%d\T%H\:%M\:%S\Z)" >> $GITHUB_OUTPUT

      - name: Extract numbers from input
        id: extract-numbers
        env:
          MAJOR_VERSION: ${{ env.MAJOR_VERSION }}
        run: |
          numbers_only=$(echo "${MAJOR_VERSION}" | tr -cd '0-9')
          echo "MAJOR_VERSION_NUMBER=${numbers_only}" >> "${GITHUB_ENV}"

      - name: Image Metadata
        uses: docker/metadata-action@8d8c7c12f7b958582a5cb82ba16d5903cb27976a # v5
        id: metadata
        env:
          README_URL: https://raw.githubusercontent.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/${{ github.sha }}/README.md
          SOURCE_URL: https://github.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/blob/${{ github.sha }}/Containerfile
        with:
          tags: |
            type=raw,value=${{ env.DEFAULT_TAG}}
          labels: |
            io.artifacthub.package.readme-url=${{ env.README_URL }}
            org.opencontainers.image.created=${{ steps.date.outputs.date }}
            org.opencontainers.image.description=${{ env.IMAGE_DESC }}
            org.opencontainers.image.documentation=https://tunaos.org/docs/intro
            org.opencontainers.image.source=${{ env.SOURCE_URL }}
            org.opencontainers.image.title=${{ env.IMAGE_NAME }}
            org.opencontainers.image.url=https://tunaos.org
            org.opencontainers.image.vendor=${{ github.repository_owner }}
            org.opencontainers.image.version=${{ env.MAJOR_VERSION }}
            io.artifacthub.package.deprecated=false
            io.artifacthub.package.keywords=bootc,tunaos
            io.artifacthub.package.license=Apache-2.0
            io.artifacthub.package.logo-url=https://avatars.githubusercontent.com/u/223733964?s=200&v=4
            io.artifacthub.package.maintainers=[{\"name\":\"hanthor\",\"email\":\"jreilly1821@gmail.com\"}]
            io.artifacthub.package.prerelease=true
            containers.bootc=1

      - name: Fetch Build Outputs
        if: ${{ inputs.publish }}
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v4
        with:
          pattern: ${{ env.IMAGE_NAME }}-${{ env.DEFAULT_TAG }}-*
          merge-multiple: true
          path: /tmp/artifacts

      - name: Load Outputs
        if: ${{ inputs.publish }}
        id: load-outputs
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          DEFAULT_TAG: ${{ env.DEFAULT_TAG }}
        run: |
          set -e
          DIGESTS_JSON="$(jq -n '{}')"
          for digest_file in /tmp/artifacts/*.txt; do
            FILENAME_ONLY="$(basename "${digest_file}")"
            # Extract the safeplatform key from the filename (e.g., "bonito-base-linux-amd64-v2.txt" -> "linux-amd64-v2")
            # Remove prefix "${IMAGE_NAME}-${DEFAULT_TAG}-"
            KEY_PART="${FILENAME_ONLY#${IMAGE_NAME}-${DEFAULT_TAG}-}"
            # Remove suffix ".txt"
            PLATFORM_KEY="${KEY_PART%.txt}"
            DIGEST="$(cat "${digest_file}")"
            DIGESTS_JSON="$(echo "${DIGESTS_JSON}" | jq --arg key "${PLATFORM_KEY}" --arg value "${DIGEST}" '. + {($key): $value}')"
          done
          echo "DIGESTS_JSON=$(echo "$DIGESTS_JSON" | jq -c '.')" >> "${GITHUB_OUTPUT}"

      - name: Check Platform Completeness
        if: ${{ inputs.publish }}
        id: check_platforms
        env:
          DIGESTS_JSON: ${{ steps.load-outputs.outputs.DIGESTS_JSON }}
          IMAGE_VARIANT: "${{ inputs.image-variant }}"
        run: |
          set -e

          # Use strenv() for robust environment variable access in yq
          DEFAULT_PLATFORMS=$(yq -r '.variants[] | select(.id == strenv(IMAGE_VARIANT)) | .platforms | join(",")' .github/build-config.yml)


          if [ -z "$DEFAULT_PLATFORMS" ]; then
            echo "Unknown variant: ${IMAGE_VARIANT}"
            DEFAULT_PLATFORMS="linux/arm64,linux/amd64"
          fi

          echo "Variant: ${IMAGE_VARIANT}"
          echo "Default platforms for this variant: ${DEFAULT_PLATFORMS}"

          # Parse expected platforms (use default platforms, not input platforms)
          expected_platforms=()
          IFS=',' read -r -a expected_platforms <<< "${DEFAULT_PLATFORMS}"

          # Check if all expected platforms have digests
          all_platforms_built="true"
          for platform_original in "${expected_platforms[@]}"; do
            platform_key="${platform_original//\//-}"
            digest="$(echo "${DIGESTS_JSON}" | jq -r --arg key "${platform_key}" '.[$key]')"

            if [ "$digest" == "null" ] || [ -z "$digest" ]; then
              echo "Missing platform: ${platform_original} (key: ${platform_key})"
              all_platforms_built="false"
            else
              echo "Found platform: ${platform_original} (key: ${platform_key})"
            fi
          done

          echo "All default platforms built: ${all_platforms_built}"
          echo "all_platforms_built=${all_platforms_built}" >> "${GITHUB_OUTPUT}"

      - name: Create Manifest
        if: ${{ inputs.publish }}
        id: create-manifest
        env:
          IMAGE_REGISTRY: ${{ env.IMAGE_REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          DEFAULT_TAG: ${{ env.DEFAULT_TAG }}
        run: |
          podman manifest create ${IMAGE_REGISTRY}/${IMAGE_NAME}:${DEFAULT_TAG}
          echo "MANIFEST=${IMAGE_REGISTRY}/${IMAGE_NAME}:${DEFAULT_TAG}" >> $GITHUB_OUTPUT

      - name: Populate Manifest
        if: ${{ inputs.publish }}
        env:
          MANIFEST: ${{ steps.create-manifest.outputs.MANIFEST }}
          DIGESTS_JSON: ${{ steps.load-outputs.outputs.DIGESTS_JSON }} # Already confirmed valid JSON
          LABELS: ${{ steps.metadata.outputs.labels }}
          PLATFORMS: "${{ inputs.platforms }}"
        run: |
          set -e # Ensure script exits on error

          # Turn the comma separated inputs.platforms string into a list
          platforms=()
          IFS=',' read -r -a platforms <<< "${PLATFORMS}"

          for platform_original in "${platforms[@]}"; do
            platform_key_for_lookup="${platform_original//\//-}"

            digest="$(echo "${DIGESTS_JSON}" | jq -r --arg key "${platform_key_for_lookup}" '.[$key]')"

            if [ "$digest" == "null" ] || [ -z "$digest" ]; then
                echo "Error: Digest not found for platform ${platform_original}"
                echo "Lookup key: ${platform_key_for_lookup} in DIGESTS_JSON=${DIGESTS_JSON}"
              exit 1
            fi

            arch_for_podman="${platform_original#linux/}"
            podman manifest add "${MANIFEST}" "docker://${IMAGE_REGISTRY}/${IMAGE_NAME}@${digest}" --os linux --arch "${arch_for_podman}"
          done

          # Apply the labels to the manifest (separated by newlines)
          while IFS= read -r label; do
            echo "Applying label ${label} to manifest"
            podman manifest annotate --index --annotation "$label" "${MANIFEST}"
          done <<< "${LABELS}"

      - name: Login to GitHub Container Registry
        if: ${{ inputs.publish }}
        env:
          REGISTRY: ghcr.io
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | podman login -u "${{ github.actor }}" --password-stdin "${REGISTRY}"
          echo "${{ secrets.GITHUB_TOKEN }}" | podman login -u "${{ github.actor }}" --password-stdin "${REGISTRY}"

      - name: Push Manifest
        if: github.event_name != 'pull_request'
        id: push_manifest
        env:
          MANIFEST: ${{ steps.create-manifest.outputs.MANIFEST }}
          TAGS: ${{ steps.metadata.outputs.tags }}
          IMAGE_REGISTRY: ${{ env.IMAGE_REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
        run: |
          # Push every tag under a -testing suffix. The bare tags (the ones
          # users pull and docs reference) are only written by the promote
          # job after the boot gate passes — a broken image can land in
          # GHCR as :<flavor>-testing but never as :<flavor>.
          while IFS= read -r tag; do
            podman manifest push --all=false --digestfile=/tmp/digestfile \
              --compression-format=zstd:chunked \
              --compression-level=3 \
              --force-compression \
              "$MANIFEST" "$IMAGE_REGISTRY/$IMAGE_NAME:${tag}-testing"
          done <<< "$TAGS"

          DIGEST=$(cat /tmp/digestfile)
          echo "DIGEST=$DIGEST" >> $GITHUB_OUTPUT
          echo "IMAGE=$IMAGE_REGISTRY/$IMAGE_NAME" >> $GITHUB_OUTPUT

  # Cosign throws errors when ran inside the Fedora container for one reason or another
  # so we move this to another step in order to run on Ubuntu
  sign:
    name: Sign
    needs: manifest
    if: ${{ inputs.publish && github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      # TODO: reinstate sign-and-publish for manifest when key propagation
      # through composite actions is resolved. Same issue as per-arch signing.
      - run: |
          echo "Manifest signing skipped"
  # ── Boot gate ───────────────────────────────────────────────────────────────
  # Pull the just-pushed :<tag>-testing manifest, install it to a qcow2 with
  # bootc, boot it in QEMU, and require a graphical session (serial marker or
  # screenshot sanity — scripts/iso-e2e.sh --disk). Promotion of the bare
  # tags is blocked while this fails. Skipped for base* flavors (no desktop
  # to verify; they are exercised by every desktop build layered on them).
  verify_boot:
    name: Gate
    needs: manifest
    if: >-
      inputs.publish && github.event_name != 'pull_request' &&
      !startsWith(inputs.flavor, 'base')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: read
    env:
      IMAGE_NAME: ${{ inputs.image-name }}
      IMAGE_REGISTRY: ${{ vars.IMAGE_REGISTRY || format('ghcr.io/{0}', github.repository_owner) }}
      DEFAULT_TAG: ${{ inputs.default-tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v4

      # Reclaim ~25 GB of preinstalled toolchains from the main disk. The qcow2
      # is written to the workspace (main disk), not the container-storage
      # volume, so large desktop/NVIDIA images can exhaust it during `just
      # qcow2`. (Does not touch the node runtime / tool cache used by actions.)
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/boost /opt/hostedtoolcache/CodeQL || true
          df -h /

      - name: Maximize build space
        uses: ublue-os/container-storage-action@dc1f4c8f17b672069e921f001132f7cf98a423a6 # main as of 2026-02-11

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | \
            sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm || true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y just podman jq qemu-system-x86 qemu-utils ovmf socat imagemagick

      - name: Build qcow2 from testing image
        env:
          TEST_IMAGE: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }}-testing
        run: |
          just qcow2 "${TEST_IMAGE}"

      - name: Boot and verify
        run: |
          QCOW2=$(find . -maxdepth 1 -name "*.qcow2" | head -1)
          mkdir -p verify-out
          sudo ./scripts/iso-e2e.sh "$QCOW2" --disk \
            --output verify-out \
            --timeout 900

      - name: Collect evidence
        if: always()
        run: |
          sudo chown -R "$USER:$(id -gn)" verify-out 2>/dev/null || true
          for ppm in verify-out/*.ppm; do
            [[ -f "$ppm" ]] || continue
            convert "$ppm" "${ppm%.ppm}.png" || true
          done

      - name: Upload boot evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: boot-gate-${{ inputs.image-name }}-${{ inputs.default-tag }}
          path: |
            verify-out/serial.log
            verify-out/*.png
          if-no-files-found: warn
          retention-days: 7

  tag-image:
    name: Promote
    needs: [manifest, verify_boot]
    if: >-
      !cancelled() && github.event_name != 'pull_request' &&
      needs.manifest.result == 'success' &&
      (needs.verify_boot.result == 'success' || needs.verify_boot.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    env:
      IMAGE_NAME: ${{ inputs.image-name }}
      IMAGE_DESC: ${{ inputs.image-desc }}
      IMAGE_REGISTRY: ${{ vars.IMAGE_REGISTRY || format('ghcr.io/{0}', github.repository_owner) }}
      DEFAULT_TAG: ${{ inputs.default-tag }}
      MAJOR_VERSION: ${{ inputs.major-version }}
      PLATFORMS: ${{ inputs.platforms }}
    steps:
      - name: Install skopeo
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo

      - name: Login to GitHub Container Registry
        env:
          REGISTRY: ghcr.io
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | podman login -u "${{ github.actor }}" --password-stdin "${REGISTRY}"
          echo "${{ secrets.GITHUB_TOKEN }}" | sudo podman login -u "${{ github.actor }}" --password-stdin "${REGISTRY}"
          # Also login with skopeo
          echo "${{ secrets.GITHUB_TOKEN }}" | sudo skopeo login -u "${{ github.actor }}" --password-stdin "${REGISTRY}"

      - name: Pull Image and Apply Tags
        id: tag
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          IMAGE_REGISTRY: ${{ env.IMAGE_REGISTRY }}
          DEFAULT_TAG: ${{ env.DEFAULT_TAG }}
          MAJOR_VERSION: ${{ env.MAJOR_VERSION }}
          ALL_PLATFORMS_BUILT: ${{ needs.manifest.outputs.all_platforms_built }}
          INPUT_PLATFORMS: ${{ inputs.platforms }}
        run: |
          set -ex
          # Promote the verified -testing manifest to the bare tags users
          # pull. This is the ONLY place the bare :<flavor> tag is written.
          SOURCE_IMAGE="${IMAGE_REGISTRY}/${IMAGE_NAME}:${DEFAULT_TAG}-testing"

          DATE_TAG="$(date +%Y%m%d)"

          if [ "${ALL_PLATFORMS_BUILT}" = "true" ]; then
            echo "All default platforms built and boot gate passed - promoting"

            # Tag with flavor only
            sudo skopeo copy --all "docker://${SOURCE_IMAGE}" "docker://${IMAGE_REGISTRY}/${IMAGE_NAME}:${DEFAULT_TAG}"

            # Tag with flavor-date
            sudo skopeo copy --all "docker://${SOURCE_IMAGE}" "docker://${IMAGE_REGISTRY}/${IMAGE_NAME}:${DEFAULT_TAG}-${DATE_TAG}"

            # Tag each platform with flavor-arch and flavor-arch-date
            IFS=',' read -r -a PLATFORMS <<< "${INPUT_PLATFORMS}"
            for platform in "${PLATFORMS[@]}"; do
              arch="${platform#linux/}"
              arch="${arch//\//-}"
              sudo skopeo copy --all "docker://${SOURCE_IMAGE}" "docker://${IMAGE_REGISTRY}/${IMAGE_NAME}:${DEFAULT_TAG}-${arch}"
              sudo skopeo copy --all "docker://${SOURCE_IMAGE}" "docker://${IMAGE_REGISTRY}/${IMAGE_NAME}:${DEFAULT_TAG}-${arch}-${DATE_TAG}"
            done

            echo "tag=${IMAGE_REGISTRY}/${IMAGE_NAME}:${DEFAULT_TAG}" >> $GITHUB_OUTPUT
          else
            echo "Not all default platforms built - leaving bare tags at last good version"
            echo "tag=${IMAGE_REGISTRY}/${IMAGE_NAME}:${DEFAULT_TAG}" >> $GITHUB_OUTPUT
          fi
