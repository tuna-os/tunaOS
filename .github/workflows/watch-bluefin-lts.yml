---
name: Watch bluefin-lts Upstream

# Bluefin-LTS is Fedora-based GNOME LTS. Catch-up flows into
# build_scripts/gnome.sh and system_files_overrides/gnome/. Thin
# caller of .github/workflows/watch-upstream.yml.

"on":
  schedule:
    - cron: '0 8 * * 1'  # Monday 08:00 UTC
  workflow_dispatch:
    inputs:
      lookback_days:
        description: 'How many days back to look for commits'
        required: false
        default: '7'
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  watch:
    uses: ./.github/workflows/watch-upstream.yml
    with:
      upstream_repo: ublue-os/bluefin-lts
      upstream_pretty: bluefin-lts
      branch_prefix: bluefin-lts-port
      label: upstream-bluefin-lts
      flavor: gnome
      build_script: build_scripts/gnome.sh
      overrides_dir: system_files_overrides/gnome
      prompt_file: .github/prompts/bluefin-lts-port.md
      lookback_days: ${{ inputs.lookback_days || '7' }}
    secrets:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      COPILOT_PAT: ${{ secrets.COPILOT_PAT }}
