  # ── Experimental ───────────────────────────────────────────────────────────
  # RFC 010: Ubuntu 26.04 variant. x86_64-only, manual dispatch only.
  # Desktops: gnome/kde/niri/xfce via the apt branches in build_scripts/*.sh
  # (cosmic has no apt branch yet). No HWE/NVIDIA layers — Ubuntu ships its
  # own kernel stack and the akmods images are RPM-only.
  - id: grouper
    emoji: "🐟"
    description: "Based on Ubuntu 26.04 Resolute Raccoon"
    base_image: "docker.io/library/ubuntu:resolute"
    # Built directly from stock Ubuntu and bootcified in Containerfile.ubuntu
    # (bootc from the bootc-shindig/bootc-deb apt repo). See RFC 010.
    platforms: ["linux/amd64"]
    experimental: true
    flavors:
      - id: base
        stage: 1
        build_image: true
      - id: gnome
        stage: 2
        build_image: true
        build_iso: true
      - id: kde
        stage: 2
        build_image: true
        build_iso: true
      - id: niri
        stage: 2
        build_image: true
        build_iso: true
      - id: xfce
