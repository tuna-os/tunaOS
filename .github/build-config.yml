    flavors:
      # ── Stage 1 ────────────────────────────────────────────────────────────
      - id: base
        stage: 1
        build_image: true
        build_iso: false
        build_qcow2: false

      # ── Stage 2 ────────────────────────────────────────────────────────────
      - id: base-hwe
        stage: 2
        build_image: true
        build_iso: false
        build_qcow2: false
      - id: base-nvidia
        stage: 2
        build_image: true
        build_iso: false
        build_qcow2: false
      - id: gnome
        stage: 2
        build_image: true
        build_iso: true
        build_qcow2: true
      - id: gnome50
        stage: 2
        build_image: true
        build_iso: true
        build_qcow2: false
      - id: cosmic
        stage: 2
        build_image: true
        build_iso: true
        build_qcow2: false
      - id: kde
        stage: 2
        build_image: true
        build_iso: true
        build_qcow2: false
      - id: niri
        stage: 2
        build_image: true
        build_iso: true
        build_qcow2: false

      # ── Stage 3 ────────────────────────────────────────────────────────────
      # HWE: no ISO — install the standard ISO then `bootc switch` to *-hwe
      - id: gnome-hwe
        stage: 3
        build_image: true
        build_iso: false
        build_qcow2: false
      - id: gnome-nvidia
        stage: 3
        build_image: true
        build_iso: true
        build_qcow2: false
      - id: gnome-nvidia-hwe
        stage: 4
        build_image: true
        build_iso: false
        build_qcow2: false
      - id: gnome50-hwe
        stage: 3
        build_image: true
        build_iso: false
        build_qcow2: false
      - id: gnome50-nvidia
        stage: 3
        build_image: true
        build_iso: true
        build_qcow2: false
      - id: cosmic-hwe
        stage: 3
        build_image: true
        build_iso: false
        build_qcow2: false
      - id: cosmic-nvidia
        stage: 3
        build_image: true
        build_iso: true
        build_qcow2: false
      - id: kde-hwe
        stage: 3
        build_image: true
        build_iso: false
        build_qcow2: false
      - id: kde-nvidia
        stage: 3
        build_image: true
        build_iso: true
        build_qcow2: false
      - id: niri-hwe
        stage: 3
        build_image: true
        build_iso: false
        build_qcow2: false
      - id: niri-nvidia
        stage: 3
        build_image: true
