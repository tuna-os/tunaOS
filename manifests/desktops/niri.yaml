# Niri (Tiling Wayland Compositor) + DMS Desktop Manifest

display_manager: greetd

packages:
  fedora:
    copr:
      - repo: yalter/niri-git
        packages:
          - niri
      - repo: avengemedia/danklinux
        packages:
          - quickshell-git
      - repo: avengemedia/dms-git
        packages:
          - dms
          - dms-cli
          - dms-greeter
    packages:
      - greetd
      - greetd-selinux
      - swaylock
      - SwayNotificationCenter
      - waybar
      - fuzzel
      - swayidle
      - wl-clipboard
      - xdg-desktop-portal-gnome
      - xdg-desktop-portal-gtk
      - xdg-user-dirs
      - pipewire
      - wireplumber
      - NetworkManager-tui
      - brightnessctl
      - playerctl
      - blueman
      - pavucontrol
      - gnome-keyring
      - gnome-keyring-pam
      - nautilus
      - adw-gtk3-theme
      - papirus-icon-theme
    optional:
      - polkit-gnome

  el10:
    copr:
      - repo: zirconium/packages
        packages:
          - greetd
          - greetd-selinux
      - repo: yalter/niri-git
        packages:
          - niri
      - repo: yselkowitz/wlroots-epel
        packages:
          - swaylock
          - SwayNotificationCenter
          - waybar
          - fuzzel
          - swayidle
          - wl-clipboard
          # brightnessctl (backlight) and playerctl (media keys) are only
          # packaged for EL10 in this COPR — same source as the sway stack.
          - brightnessctl
          - playerctl
      # adw-gtk3-theme has no EL10 base/EPEL build; pull it from the same COPR
      # the cosmic manifest uses (yselkowitz/cosmic-epel).
      - repo: yselkowitz/cosmic-epel
        packages:
          - adw-gtk3-theme
      - repo: ligenix/enterprise-cosmic
        packages: []  # just enable for deps
      - repo: avengemedia/danklinux
        packages:
          - quickshell-git
      - repo: avengemedia/dms-git
        packages:
          - dms
          - dms-cli
          - dms-greeter
    packages:
      - xdg-desktop-portal-gnome
      - xdg-desktop-portal-gtk
      - xdg-user-dirs
      - pipewire
      - wireplumber
      # polkit-gnome was retired Fedora-wide and has no EL10 build; polkit-kde
      # is the only GUI polkit authentication agent packaged for EL10 (EPEL).
      # It runs fine under any Wayland compositor.
      - polkit-kde
      - NetworkManager-tui
      - nautilus
      - pavucontrol
      - gnome-keyring
      - gnome-keyring-pam
      - papirus-icon-theme
      # NOTE: blueman (Bluetooth applet) has no EL10/EPEL 10 build, so it is
      # intentionally absent here (present in the Fedora section). No packaged
      # standalone Bluetooth GUI exists for EL10 niri yet.

  zypper:
    - niri
    - greetd

  emerge:
    - gui-wm/niri
    - gui-apps/greetd

versionlock:
  - glib2

post_install_inline:
  - "glib-compile-schemas /usr/share/glib-2.0/schemas || true"
  - "if [ -f /etc/pam.d/greetd ]; then sed --sandbox -i -e '/gnome_keyring.so/ s/-auth/auth/ ; /gnome_keyring.so/ s/-session/session/' /etc/pam.d/greetd; fi"
