# XFCE 4.20 Desktop Manifest (Wayland — xfwl4 compositor)

display_manager: gdm

packages:
  fedora:
    groups:
      - xfce-desktop
    packages:
      - gdm
      - xdg-desktop-portal-gtk
      - xdg-user-dirs-gtk
      - thunar
      - mousepad
      - ristretto
      - xfce4-terminal
    optional:
      - xfce4-wayland

  el10:
    groups:
      - xfce-desktop
    packages:
      - gdm
      - xdg-desktop-portal-gtk
      - xdg-user-dirs-gtk
      - thunar
      - mousepad
      - ristretto
      - xfce4-terminal
    optional:
      - xfce4-wayland

  apt:
    - xfce4
    - xfce4-goodies
    - gdm3
    - xdg-desktop-portal-gtk
    - thunar
    - mousepad

  zypper:
    - patterns-xfce-xfce
    - patterns-xfce-xfce_basis
    - lightdm

  emerge:
    - xfce-base/xfce4-meta
    - xfce-base/lightdm

versionlock:
  - glib2
