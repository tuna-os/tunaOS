# XFCE 4.20 Desktop Manifest (Wayland — xfwl4 compositor)

display_manager: gdm

packages:
  fedora:
    groups:
      - xfce-desktop
    packages:
      - gdm
      - xdg-desktop-portal-gtk
      - xdg-user-dirs-gtk
      - thunar
      - mousepad
      - ristretto
      - xfce4-terminal
    optional:
      - xfce4-wayland

  el10:
    # Wayland-only XFCE — the hanthor/xfce-wayland port (xfwl4 Rust/Smithay
    # compositor + Wayland-adapted panel/session/settings/xfdesktop/thunar).
    # No X11 (xfce-desktop group + gdm dropped). Greeter is greetd on a VT,
    # Wayland-native, so the whole session is X11-free.
    #
    # The xfce-wayland RPMs live at their own R2 path, not the main
    # $releasever tree — add it explicitly.
    display_manager: greetd
    repos:
      - name: tunaos-xfce
        baseurl: https://repo.tunaos.org/xfce/10-stream-x86_64/
        priority: 10
    copr:
      # greetd/greetd-selinux have no EL10 base/EPEL build — same COPR the
      # cosmic/niri manifests pull greetd from. --nobest/--allowerasing
      # mirrors those (avoids depsolve conflicts on EL10).
      - repo: yselkowitz/cosmic-epel
        packages:
          - greetd
          - greetd-selinux
        options: "--nobest --allowerasing"
    packages:
      # Meta package: xfwl4 + the whole Wayland-adapted xfce stack (panel,
      # session, settings, xfdesktop, thunar, terminal, plugins) via Requires.
      # Its Requires pull whatever theme/runtime deps xfwl4 needs — do NOT
      # list xfwm4 explicitly (it is X11 and not built for EL10 / not in the
      # xfce-wayland repo, which is what broke run 29646563977).
      - xfce4-wayland
      - xdg-desktop-portal-gtk
      - xdg-user-dirs-gtk
    optional:
      # Best-effort niceties. Plugins/apps live in the xfce-wayland repo;
      # mousepad/ristretto may come from EPEL. install_available skips any
      # that do not resolve, so a miss never fails the build.
      - xfce4-notifyd
      - xfce4-power-manager
      - xfce4-screenshooter
      - xfce4-appfinder
      - mousepad
      - ristretto

  apt:
    - xfce4
    - xfce4-goodies
    - gdm3
    - xdg-desktop-portal-gtk
    - thunar
    - mousepad

  zypper:
    - patterns-xfce-xfce
    - patterns-xfce-xfce_basis
    - lightdm

  emerge:
    - xfce-base/xfce4-meta
    - xfce-base/lightdm

versionlock:
  - glib2

# Post-install scripts to source (relative to build_scripts/)
post_install:
  - tuna-flatpak-remote.sh
