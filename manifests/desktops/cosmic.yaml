# COSMIC Desktop Manifest

display_manager: greetd

packages:
  # ── APT (Ubuntu via PPA, Debian Sid has native packages) ───────────
  apt:
    ppa:
      - repo: "ppa:hepp3n/cosmic-epoch"
        condition: "ubuntu"  # only add PPA on Ubuntu; Debian Sid has native pkgs
    packages:
      - cosmic-session
      - cosmic-comp
      - cosmic-panel
      - cosmic-app-library
      - cosmic-applets
      - cosmic-bg
      - cosmic-files
      - cosmic-idle
      - cosmic-launcher
      - cosmic-notifications
      - cosmic-osd
      - cosmic-randr
      - cosmic-screenshot
      - cosmic-settings
      - cosmic-settings-daemon
      - cosmic-term
      - cosmic-wallpapers
      - cosmic-workspaces
      - cosmic-greeter
      - cosmic-icon-theme
      - greetd
      - xdg-desktop-portal-cosmic

  fedora:
    packages:
      - cosmic-session
      - cosmic-comp
      - cosmic-panel
      - cosmic-app-library
      - cosmic-applets
      - cosmic-bg
      - cosmic-files
      - cosmic-idle
      - cosmic-launcher
      - cosmic-notifications
      - cosmic-osd
      - cosmic-randr
      - cosmic-screenshot
      - cosmic-settings
      - cosmic-settings-daemon
      - cosmic-term
      - cosmic-wallpapers
      - cosmic-workspaces
      - cosmic-greeter
      - cosmic-icon-theme
      - greetd
      - xdg-desktop-portal-cosmic
      - pop-icon-theme

  el10:
    copr:
      - repo: yselkowitz/cosmic-epel
        packages:
          - cosmic-comp
          - cosmic-panel
          - cosmic-app-library
          - cosmic-applets
          - cosmic-bg
          - cosmic-files
          - cosmic-idle
          - cosmic-launcher
          - cosmic-notifications
          - cosmic-osd
          - cosmic-randr
          - cosmic-screenshot
          - cosmic-settings
          - cosmic-settings-daemon
          - cosmic-term
          - cosmic-wallpapers
          - cosmic-workspaces
          - cosmic-icon-theme
          - xdg-desktop-portal-cosmic
          - adw-gtk3-theme
      - repo: yselkowitz/cosmic-epel
        packages:
          - cosmic-session
          - greetd
          - cosmic-greeter
        options: "--nobest --allowerasing"
    packages:
      - flatpak
      - pipewire
      - wireplumber
      - wl-clipboard
      - xdg-user-dirs
      - zram-generator
      # Keyring is essential: the greetd PAM patch below wires gnome-keyring into
      # the login flow. Both are in EL10 appstream, so require (not best-effort).
      - gnome-keyring
      - gnome-keyring-pam
    optional:
      - brightnessctl
      - playerctl

post_install_inline:
  - "glib-compile-schemas /usr/share/glib-2.0/schemas || true"
  - "if [ -f /etc/pam.d/greetd ]; then sed --sandbox -i -e '/gnome_keyring.so/ s/-auth/auth/ ; /gnome_keyring.so/ s/-session/session/' /etc/pam.d/greetd; fi"

# Post-install scripts to source (relative to build_scripts/)
post_install:
  - installer-frontend.sh
